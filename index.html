const getSeason = (turn) => SEASONS[(turn - 1) % 4];
const getYear   = (turn) => 1848 + Math.floor((turn - 1) / 4);

// Integer literacy: 1 = Low, 2 = Average, 3 = High
const litLevel = (data, col) => {
  const raw = data[5][col] * 3 + data[1][col] - data[4][col] * 0.5 + 5;
  const score = raw / 15;
  if (score < 0.75) return { n:1, label:"Low",     color:"#c47a5a" };
  if (score < 1.35) return { n:2, label:"Average",  color:"#c9a84c" };
  return                    { n:3, label:"High",    color:"#6db87a" };
};

// National unrest: auto-derived from agitation
// Restless (3-4) = +1 each, Agitated (5-6) = +2 each, capped 0-10
const calcNatUnrest = (agitation) => {
  const restless = agitation.filter(a => a >= 3 && a < 5).length;
  const agitated = agitation.filter(a => a >= 5).length;
  return Math.min(10, restless + agitated * 2);
};

const unrestInfo = (u) => {
  if (u <= 1) return { label:"Calm",     color:"#6db87a", desc:"No effect" };
  if (u <= 3) return { label:"Tense",    color:"#c9a84c", desc:"Campaign actions cost +1 action" };
  if (u <= 6) return { label:"Volatile", color:"#c47a5a", desc:"-2 popularity for all candidates nationally" };
  return             { label:"Crisis",   color:"#c4605a", desc:"Laws cause double agitation -- revolution risk" };
};

const agitPhase = (s) => {
  if (s <= 2) return { label:"Content",  color:"#6db87a", bg:"rgba(80,160,100,0.12)",  border:"rgba(80,160,100,0.35)"  };
  if (s <= 4) return { label:"Restless", color:"#c9a84c", bg:"rgba(201,168,76,0.12)",  border:"rgba(201,168,76,0.35)"  };
  return             { label:"Agitated", color:"#c4605a", bg:"rgba(200,80,60,0.12)",   border:"rgba(200,80,60,0.35)"   };
};

const popColor = (v) => {
  if (v > 8)   return "#6db87a";
  if (v > 4)   return "#8fae7a";
  if (v > 0)   return "#c4a96b";
  if (v === 0) return "#a09070";
  if (v > -4)  return "#c4a84c";
  if (v > -8)  return "#c47a5a";
  return "#c4605a";
};

const calcPopularity = (cand, data, agitation, natUnrest) =>
  REGIONS.map((_, rIdx) => {
    let score = 0;
    const lit  = litLevel(data, rIdx).n;
    const base = cand.classBase || [];
    cand.laws.forEach(law => law.effects.forEach(({classIdx, type}) => {
      const inf  = data[classIdx][rIdx];
      const agit = agitation[classIdx] >= 5;
      const mult = base.includes(classIdx) ? 2 : 1;
      if (type === "bonus") score += inf * mult;
      if (type === "malus") score -= (agit ? inf : Math.floor(inf / 2)) * mult;
    }));
    (cand.actions || []).forEach(a => {
      score += (a.bonuses[rIdx] || 0) * lit;
    });
    const ur = unrestInfo(natUnrest);
    if (ur.label === "Volatile" || ur.label === "Crisis") score -= 2;
    return Math.round(score);
  });

    .sort((a,b) => b.score - a.score);

  return (
    <div onClick={onClose}
      style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:"#1e1a12",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"8px",padding:"28px 32px",minWidth:"300px",maxWidth:"480px",width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.8)"}}>
        <div style={{textAlign:"center",marginBottom:"20px"}}>
          <div style={{fontSize:"10px",letterSpacing:"5px",color:GOLD,textTransform:"uppercase",opacity:.7,marginBottom:"6px"}}>Kingdom of Azzuria</div>
          <div style={{fontSize:"24px",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"10px"}}>{region}</div>
          <div style={{display:"flex",justifyContent:"center",gap:"10px",flexWrap:"wrap"}}>
            <span style={{fontSize:"10px",color:lit.color,letterSpacing:"2px",textTransform:"uppercase",border:`1px solid ${lit.color}44`,padding:"2px 8px",borderRadius:"3px"}}>Literacy {lit.label} (x{lit.n})</span>
            <span style={{fontSize:"10px",color:ur.color,letterSpacing:"2px",textTransform:"uppercase",border:`1px solid ${ur.color}44`,padding:"2px 8px",borderRadius:"3px"}}>Unrest {natUnrest}/10</span>
          </div>
        </div>
        {rows.length === 0 ? (
          <div style={{textAlign:"center",color:DIM,fontSize:"11px",letterSpacing:"2px",padding:"16px"}}>No candidates yet</div>
        ) : rows.map(({c, score}, i) => (
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",marginBottom:"6px",
            background:i===0?"rgba(201,168,76,0.08)":"rgba(255,255,255,0.02)",
            border:`1px solid ${i===0?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.06)"}`,borderRadius:"4px"}}>
            <span style={{fontSize:"14px",minWidth:"24px",textAlign:"center",color:i===0?GOLD:DIM}}>{i===0?"*":"#"+(i+1)}</span>
            <span style={{display:"inline-block",width:"8px",height:"8px",borderRadius:"50%",background:c.color,flexShrink:0}}/>
            <span style={{flex:1,fontSize:"13px",color:c.color,letterSpacing:"1px"}}>{c.name}</span>
            <span style={{fontSize:"22px",fontWeight:"bold",color:popColor(score)}}>{score>0?"+"+score:score}</span>
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:"16px"}}>
          <button onClick={onClose} style={{padding:"7px 20px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",color:SOFT,cursor:"pointer",fontSize:"11px",letterSpacing:"2px",fontFamily:"Georgia,serif"}}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ── REGIONS TAB ───────────────────────────────────────────────────────────────

function RegionsTab({candidates, data, agitation, natUnrest}) {
  const [selRegion, setSelRegion] = useState(null);

  return (
    <div style={{padding:"28px 24px",maxWidth:"1000px",margin:"0 auto"}}>
      {selRegion !== null && (
        <RegionModal rIdx={selRegion} candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} onClose={() => setSelRegion(null)}/>
      )}

      <div style={{textAlign:"center",marginBottom:"28px"}}>
        <div style={{fontSize:"10px",letterSpacing:"6px",color:GOLD,textTransform:"uppercase",marginBottom:"6px",opacity:.8}}>Electoral Map</div>
        <div style={{fontSize:"28px",fontWeight:"normal",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"4px"}}>Kingdom of Azzuria</div>
        <div style={{fontSize:"10px",color:SOFT,letterSpacing:"3px",textTransform:"uppercase"}}>Click any region to see candidate standings</div>
        <div style={{width:"80px",height:"1px",background:"linear-gradient(to right,transparent,"+GOLD+",transparent)",margin:"14px auto 0"}}/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"10px"}}>

          const lit    = litLevel(data, rIdx);
          const allPops = candidates.map(c => ({c, score: calcPopularity(c, data, agitation, natUnrest)[rIdx]})).sort((a,b) => b.score-a.score);
          const leader  = allPops[0];
          const ur      = unrestInfo(natUnrest);

          return (

              onMouseEnter={e => { e.currentTarget.style.borderColor="rgba(201,168,76,0.5)"; e.currentTarget.style.background="rgba(201,168,76,0.06)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"; e.currentTarget.style.background="rgba(255,255,255,0.02)"; }}
              style={{
                background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:"6px", padding:"16px", cursor:"pointer", transition:"all 0.15s",
              }}>
              <div style={{fontSize:"14px",color:"#e8dcc8",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px"}}>{r}</div>
              <div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>
                <span style={{fontSize:"9px",color:lit.color,letterSpacing:"2px",textTransform:"uppercase",padding:"1px 6px",border:`1px solid ${lit.color}44`,borderRadius:"3px"}}>Lit {lit.label}</span>
              </div>
              {leader ? (
                <div>
                  <div style={{fontSize:"9px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Leading</div>
                  <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                    <span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:leader.c.color}}/>
                    <span style={{fontSize:"11px",color:leader.c.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{leader.c.name}</span>
                    <span style={{fontSize:"15px",fontWeight:"bold",color:popColor(leader.score)}}>{leader.score>0?"+"+leader.score:leader.score}</span>
                  </div>
                  {allPops.length > 1 && (
                    <div style={{marginTop:"8px",display:"flex",flexDirection:"column",gap:"3px"}}>
                      {allPops.slice(1).map(({c, score}) => (
                        <div key={c.id} style={{display:"flex",alignItems:"center",gap:"6px",opacity:.65}}>
                          <span style={{display:"inline-block",width:"5px",height:"5px",borderRadius:"50%",background:c.color}}/>
                          <span style={{fontSize:"10px",color:c.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                          <span style={{fontSize:"11px",fontWeight:"bold",color:popColor(score)}}>{score>0?"+"+score:score}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ) : (
                <div style={{fontSize:"10px",color:"#5a4a30",letterSpacing:"2px",fontStyle:"italic"}}>No candidates</div>
              )}
              <div style={{marginTop:"10px",display:"flex",justifyContent:"flex-end"}}>
                <span style={{fontSize:"9px",color:DIM,letterSpacing:"2px"}}>Click to expand</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* head to head mini table */}
      {candidates.length > 0 && (
        <div style={{marginTop:"36px"}}>
          <SecBar>All Regions at a Glance</SecBar>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"3px"}}>
              <thead>
                <tr>
                  <th style={{padding:"8px 12px",textAlign:"left",fontSize:"10px",letterSpacing:"2px",color:DIM,textTransform:"uppercase",fontWeight:"normal",minWidth:"100px"}}>Candidate</th>
                  {REGIONS.map((r,i) => (
                    <th key={r}
                      onClick={() => setSelRegion(i)}
                      onMouseEnter={e => { e.currentTarget.style.color=GOLD; e.currentTarget.style.cursor="pointer"; }}
                      onMouseLeave={e => { e.currentTarget.style.color=DIM; }}
                      style={{padding:"8px 4px",textAlign:"center",fontSize:"10px",letterSpacing:"1px",color:DIM,textTransform:"uppercase",fontWeight:"normal",minWidth:"72px",cursor:"pointer"}}>
                      {r}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {candidates.map(c => {
                  const pops = calcPopularity(c, data, agitation, natUnrest);
                  return (
                    <tr key={c.id}>
                      <td style={{padding:"3px 12px",fontSize:"11px",color:c.color,whiteSpace:"nowrap"}}>
                        <span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",background:c.color,marginRight:"7px",verticalAlign:"middle"}}/>{c.name}
                      </td>
                      {pops.map((score, i) => (
                        <td key={i} style={{padding:"3px"}}>
                          <div
                            onClick={() => setSelRegion(i)}
                            style={{textAlign:"center",padding:"8px 4px",borderRadius:"4px",background:popColor(score)+"15",border:`1px solid ${popColor(score)}33`,fontSize:"13px",fontWeight:"bold",color:popColor(score),cursor:"pointer"}}>
                            {score > 0 ? "+"+score : score}
                          </div>
                        </td>
                      ))}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


// ── CANDIDATES TAB ────────────────────────────────────────────────────────────

function CandidatesTab({data, setData, candidates, setCandidates, activeCand, setActiveCand, agitation, setAgitation, natUnrest, pendingParties, setPendingParties}) {
  const [newCandName, setNewCandName] = useState("");
  const [newLawName,  setNewLawName]  = useState("");
  const [newLawDesc,  setNewLawDesc]  = useState("");
  const [newLawFx,    setNewLawFx]    = useState(CLASSES.map(() => "neutral"));
  const [showLawForm, setShowLawForm] = useState(false);
  const [showActForm, setShowActForm] = useState(false);
  const [newActName,  setNewActName]  = useState("");
  const [newActType,  setNewActType]  = useState("Newspaper");
  const [newActBon,   setNewActBon]   = useState(REGIONS.map(() => 0));
  const [selRegion,   setSelRegion]   = useState(null);

  const addCand = () => {
    const name = newCandName.trim(); if (!name) return;
    const id = Date.now(), color = CAND_COLORS[candidates.length % CAND_COLORS.length];
    setCandidates(p => [...p, {id,name,color,laws:[],actions:[],actionsLeft:BASE_ACTIONS}]);
    setActiveCand(id); setNewCandName("");
  };
  const removeCand = id => setCandidates(p => {
    const n = p.filter(c => c.id !== id);
    if (activeCand === id && n.length > 0) setActiveCand(n[0].id);
    return n;
  });
  const updateCandColor = (id, color) => setCandidates(p => p.map(c => c.id===id ? {...c, color} : c));
  const updateCandName  = (id, name)  => setCandidates(p => p.map(c => c.id===id ? {...c, name}  : c));
  const addLaw = () => {
    if (!newLawName.trim()) return;
    const effects = newLawFx.map((e,i) => ({classIdx:i,type:e})).filter(e => e.type !== "neutral");
    if (!effects.length) return;
    setCandidates(p => p.map(c => c.id===activeCand
      ? {...c, laws:[...c.laws,{id:Date.now(),name:newLawName.trim(),desc:newLawDesc.trim(),effects}]} : c));
    // Apply agitation deltas immediately: bonus=-1, malus=+2, capped 0-6
    setAgitation(prev => {
      const next = [...prev];
      effects.forEach(({classIdx, type}) => {
        const delta = type==="bonus" ? -1 : +2;
        next[classIdx] = Math.max(0, Math.min(6, next[classIdx] + delta));
      });
      return next;
    });
    // Apply influence delta: bonus=+1 to all regions, malus=-1, capped 1-10
    setData(prev => {
      const next = prev.map(row => [...row]);
      effects.forEach(({classIdx, type}) => {
        const delta = type==="bonus" ? +1 : -1;
        next[classIdx] = next[classIdx].map(v => Math.max(1, Math.min(10, v + delta)));
      });
      return next;
    });
    setNewLawName(""); setNewLawDesc(""); setNewLawFx(CLASSES.map(()=>"neutral")); setShowLawForm(false);
  };
  const removeLaw    = lid => setCandidates(p => p.map(c => c.id===activeCand ? {...c, laws:c.laws.filter(l=>l.id!==lid)} : c));
  const addAction = () => {
    if (!newActName.trim() || newActBon.every(b=>b===0)) return;
    setCandidates(p => p.map(c => c.id===activeCand
      ? {...c, actions:[...(c.actions||[]),{id:Date.now(),name:newActName.trim(),type:newActType,bonuses:[...newActBon]}]} : c));
    setNewActName(""); setNewActType("Newspaper"); setNewActBon(REGIONS.map(()=>0)); setShowActForm(false);
  };
  const removeAction = aid => setCandidates(p => p.map(c => c.id===activeCand
    ? {...c, actions:(c.actions||[]).filter(a=>a.id!==aid)} : c));

  const cand    = candidates.find(c => c.id === activeCand);
  const myPop   = c => calcPopularity(c, data, agitation, natUnrest);
  const hasContent = c => c.laws.length > 0 || (c.actions||[]).length > 0;

  // Projected agitation after the current law form selections
  const projectedAgit = CLASSES.map((_, i) => {
    const fx = newLawFx[i];
    const delta = fx==="bonus" ? -1 : fx==="malus" ? +2 : 0;
    return Math.max(0, Math.min(6, agitation[i] + delta));
  });

  // Mini agitation bar used in law form
  const AgitBar = ({current, projected, classIdx}) => {
    const curPh  = agitPhase(current);
    const projPh = agitPhase(projected);
    const delta  = projected - current;
    const changed = delta !== 0;
    return (
      <div style={{display:"flex",alignItems:"center",gap:"6px",flex:1}}>
        {/* bar */}
        <div style={{position:"relative",flex:1,height:"5px",background:"rgba(255,255,255,0.06)",borderRadius:"3px",overflow:"hidden"}}>
          {/* current fill */}
          <div style={{
            position:"absolute",left:0,top:0,height:"100%",borderRadius:"3px",
            width:(current/6*100)+"%",
            background:curPh.color,
            opacity: changed ? 0.35 : 0.9,
            transition:"width .3s",
          }}/>
          {/* projected fill overlay */}
          {changed && (
            <div style={{
              position:"absolute",left:0,top:0,height:"100%",borderRadius:"3px",
              width:(projected/6*100)+"%",
              background:projPh.color,
              opacity:0.9,
              transition:"width .3s",
            }}/>
          )}
        </div>
        {/* label */}
        {changed ? (
          <span style={{fontSize:"9px",whiteSpace:"nowrap",color:delta>0?"#c4605a":"#6db87a",fontWeight:"bold"}}>
            {delta>0?"+"+delta:delta} → {projPh.label.slice(0,4)}
          </span>
        ) : (
          <span style={{fontSize:"9px",whiteSpace:"nowrap",color:curPh.color,opacity:.7}}>{curPh.label.slice(0,4)}</span>
        )}
      </div>
    );
  };

  // Agitation impact summary for an enacted law
  const lawAgitSummary = law => law.effects.map(({classIdx, type}) => {
    const delta = type==="bonus" ? -1 : +2;
    return {classIdx, delta, label: CLASSES[classIdx]};
  });

  const smBtn = (active, onClick, label) => (
    <button onClick={onClick} style={{
      padding:"5px 12px", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:"10px",
      letterSpacing:"2px", textTransform:"uppercase", borderRadius:"4px",
      background:active?"rgba(201,168,76,0.18)":"rgba(255,255,255,0.03)",
      border:`1px solid ${active?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.08)"}`,
      color:active?GOLD:SOFT,
    }}>{label}</button>
  );

  return (
    <div style={{padding:"24px 20px"}}>
      {selRegion !== null && (
        <RegionModal rIdx={selRegion} candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} onClose={() => setSelRegion(null)}/>
      )}

      {/* ── pending parties ── */}
      {(pendingParties||[]).length > 0 && (
        <div style={{marginBottom:"24px",padding:"16px",background:"rgba(196,120,60,0.04)",border:"1px solid rgba(196,120,60,0.18)",borderRadius:"6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
            <span style={{fontSize:"9px",letterSpacing:"5px",color:"#c47a5a",textTransform:"uppercase"}}>Pending Approval</span>
            <span style={{fontSize:"9px",color:"#c47a5a",border:"1px solid rgba(196,122,90,0.3)",borderRadius:"3px",padding:"1px 6px"}}>{pendingParties.length}</span>
            <button onClick={async () => {
              try {
                const res = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
                  headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
                });
                const d = await res.json();
                if (d.record && Array.isArray(d.record.pendingParties)) {
                  const localIds = new Set(pendingParties.map(p => p.id));
                  const merged   = [...pendingParties, ...d.record.pendingParties.filter(p => !localIds.has(p.id))];
                  setPendingParties(merged);
                }
              } catch(e) {}
            }} style={{marginLeft:"auto",padding:"2px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",background:"rgba(196,122,90,0.08)",border:"1px solid rgba(196,122,90,0.2)",borderRadius:"3px",color:"#c47a5a"}}>
              ↻ Refresh
            </button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {pendingParties.map(party => (
              <div key={party.id} style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderLeft:"3px solid "+party.color,borderRadius:"4px"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px",marginBottom:"8px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px"}}>
                      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:party.color,flexShrink:0}}/>
                      <span style={{fontSize:"14px",color:party.color,letterSpacing:"1px"}}>{party.name}</span>
                    </div>
                    {party.desc && <div style={{fontSize:"11px",color:SOFT,fontStyle:"italic",marginBottom:"5px"}}>{party.desc}</div>}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"3px"}}>
                      {(party.classBase||[]).map(i => (
                        <span key={i} style={{fontSize:"8px",padding:"1px 7px",borderRadius:"3px",fontFamily:"Georgia,serif",
                          background:CLASS_COLORS[i]+"18",border:"1px solid "+CLASS_COLORS[i]+"44",color:CLASS_COLORS[i]}}>
                          {CLASSES[i]}
                        </span>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"3px"}}>
                      {(party.regions||[]).map(i => (
                        <span key={i} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.2)",color:GOLD}}>{REGIONS[i]}</span>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                      {(party.tags||[]).map(t => (
                        <span key={t} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:SOFT}}>{t}</span>
                      ))}
                    </div>
                    {(party.chars||[]).length > 0 && (
                      <div style={{marginTop:"6px",paddingTop:"6px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                        {party.chars.map(ch => (
                          <div key={ch.name} style={{fontSize:"10px",color:SOFT,display:"flex",gap:"6px"}}>
                            <span style={{color:"#e8dcc8"}}>{ch.name}</span>
                            {ch.role && <span style={{color:DIM,fontStyle:"italic"}}>{ch.role}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",gap:"7px"}}>
                  <button onClick={() => {
                    const c = {id:party.id, name:party.name, color:party.color, classBase:party.classBase||[], laws:[], actions:[], actionsLeft:3};
                    setCandidates(p => [...p, c]);
                    setPendingParties(p => p.filter(x => x.id !== party.id));
                    setActiveCand(c.id);
                  }} style={{padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                    background:"rgba(80,160,100,0.12)",border:"1px solid rgba(80,160,100,0.35)",borderRadius:"4px",color:"#6db87a"}}>
                    ✓ Approve
                  </button>
                  <button onClick={async () => {
                    const updated = pendingParties.filter(x => x.id !== party.id);
                    setPendingParties(updated);
                    // Write removal back to JSONbin immediately so it doesn't reappear on next poll
                    try {
                      const pr = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
                        headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
                      });
                      const pd = await pr.json();
                      const current = pd.record || {};
                      await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID, {
                        method:"PUT",
                        headers:{"Content-Type":"application/json","X-Access-Key":JSONBIN_ACCESS_KEY},
                        body: JSON.stringify({...current, pendingParties: updated}),
                      });
                    } catch(e) { console.error("Deny sync failed:", e); }
                  }} style={{
                    padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                    background:"rgba(200,80,60,0.08)",border:"1px solid rgba(200,80,60,0.22)",borderRadius:"4px",color:"#c4605a"}}>
                    ✗ Deny
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── candidate switcher ── */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center",marginBottom:"24px",alignItems:"flex-start"}}>
        {candidates.map(c => (
          <div key={c.id} style={{
            display:"flex",flexDirection:"column",alignItems:"stretch",gap:"4px",
            padding:"10px 12px",
            background:activeCand===c.id?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.01)",
            border:`1px solid ${activeCand===c.id?c.color+"55":"rgba(255,255,255,0.07)"}`,
            borderRadius:"6px",minWidth:"160px",cursor:"pointer",
          }} onClick={() => setActiveCand(c.id)}>
            {/* top row: color swatch + editable name + delete */}
            <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
              {/* color picker — clicking the swatch opens native color input */}
              <div style={{position:"relative",flexShrink:0}}>
                <div style={{width:"14px",height:"14px",borderRadius:"50%",background:c.color,border:"2px solid rgba(255,255,255,0.15)",cursor:"pointer"}}/>
                <input
                  type="color"
                  value={c.color}
                  onChange={e => { e.stopPropagation(); updateCandColor(c.id, e.target.value); }}
                  onClick={e => e.stopPropagation()}
                  style={{position:"absolute",top:0,left:0,width:"14px",height:"14px",opacity:0,cursor:"pointer",padding:0,border:"none"}}
                />
              </div>
              {/* editable name */}
              <input
                value={c.name}
                onChange={e => { e.stopPropagation(); updateCandName(c.id, e.target.value); }}
                onClick={e => e.stopPropagation()}
                style={{
                  background:"transparent",border:"none",outline:"none",
                  fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",
                  color:activeCand===c.id?c.color:SOFT,
                  flex:1,minWidth:0,cursor:"text",
                }}
              />
              {candidates.length > 1 && (
                <button onClick={e => { e.stopPropagation(); removeCand(c.id); }} style={{background:"none",border:"none",color:"#5a3a30",cursor:"pointer",fontSize:"13px",padding:"0 2px",flexShrink:0}}>×</button>
              )}
            </div>
            {/* actions remaining pip row */}
            <div style={{display:"flex",gap:"3px",alignItems:"center"}}>
              {Array.from({length: BASE_ACTIONS}).map((_,i) => (
                <div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:i < (c.actionsLeft??BASE_ACTIONS)?c.color:"rgba(255,255,255,0.07)"}}/>
              ))}
              <span style={{fontSize:"8px",color:DIM,marginLeft:"4px",letterSpacing:"1px"}}>{c.actionsLeft??BASE_ACTIONS} left</span>
            </div>
          </div>
        ))}
        {/* add new */}
        <div style={{display:"flex",flexDirection:"column",gap:"4px",justifyContent:"center",padding:"10px 12px",border:"1px dashed rgba(255,255,255,0.06)",borderRadius:"6px",minWidth:"130px"}}>
          <input value={newCandName} onChange={e=>setNewCandName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCand()}
            placeholder="New candidate..." style={{...INPUT,width:"100%",padding:"5px 8px",fontSize:"11px",background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.1)",borderRadius:0,outline:"none"}}/>
          <button onClick={addCand} style={{padding:"5px",background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"10px",fontFamily:"Georgia,serif",letterSpacing:"2px",textTransform:"uppercase"}}>+ Add</button>
        </div>
      </div>

      {cand && (
        <div style={{maxWidth:"720px",margin:"0 auto"}}>

          {/* ── LAWS SECTION ── */}
          <div style={{marginBottom:"28px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>Laws & Policies</span>
              {smBtn(showLawForm, () => { setShowLawForm(f=>!f); setShowActForm(false); }, showLawForm?"Cancel":"+ New Law")}
            </div>

            {/* law form */}
            {showLawForm && (
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:"6px",padding:"16px",marginBottom:"12px"}}>
                <input value={newLawName} onChange={e=>setNewLawName(e.target.value)}
                  placeholder="Law name..." style={{...INPUT,marginBottom:"8px"}}/>
                <textarea value={newLawDesc} onChange={e=>setNewLawDesc(e.target.value)}
                  placeholder="Description (optional)" rows={2}
                  style={{...INPUT,color:SOFT,fontSize:"12px",marginBottom:"14px",resize:"vertical",lineHeight:"1.5"}}></textarea>

                <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Class Reactions & Agitation Impact</div>

                <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"14px"}}>
                  {CLASSES.map((cls, i) => {
                    const fx = newLawFx[i];
                    return (
                      <div key={cls} style={{
                        display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",
                        background:"rgba(255,255,255,0.015)",
                        border:`1px solid ${agitation[i]>=5?"rgba(200,80,60,0.2)":agitation[i]>=3?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.05)"}`,
                        borderRadius:"4px",
                      }}>
                        <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0}}/>
                        <span style={{fontSize:"10px",color:"#b0a080",width:"100px",flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cls}</span>
                        <AgitBar current={agitation[i]} projected={projectedAgit[i]} classIdx={i}/>
                        {newLawFx[i] !== "neutral" && (
                          <span style={{
                            fontSize:"8px",whiteSpace:"nowrap",flexShrink:0,
                            padding:"1px 5px",borderRadius:"3px",
                            background:newLawFx[i]==="bonus"?"rgba(80,160,100,0.12)":"rgba(200,80,60,0.12)",
                            border:`1px solid ${newLawFx[i]==="bonus"?"rgba(80,160,100,0.3)":"rgba(200,80,60,0.3)"}`,
                            color:newLawFx[i]==="bonus"?"#6db87a":"#c4605a",
                          }}>inf {newLawFx[i]==="bonus"?"+1":"−1"}</span>
                        )}
                        <div style={{display:"flex",gap:"2px",flexShrink:0}}>
                          {["bonus","neutral","malus"].map(type => {
                            const isA = fx === type;
                            const col = type==="bonus"?"#6db87a":type==="malus"?"#c4605a":SOFT;
                            const lbl = type==="bonus"?"Y":type==="malus"?"N":"–";
                            return (
                              <button key={type} onClick={() => setNewLawFx(p=>{const n=[...p];n[i]=type;return n;})} style={{
                                width:"24px",height:"24px",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif",padding:0,borderRadius:"3px",
                                background:isA?col+"28":"transparent",
                                border:`1px solid ${isA?col:"rgba(255,255,255,0.08)"}`,
                                color:isA?col:"#5a4a30",
                              }}>{lbl}</button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"9px",color:DIM}}>Y = +pop, inf+1, agit−1 · N = −pop, inf−1, agit+2</span>
                  <button onClick={addLaw} style={{padding:"6px 18px",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.35)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif"}}>Enact</button>
                </div>
              </div>
            )}

            {/* enacted laws list */}
            {cand.laws.length === 0 ? (
              <div style={{textAlign:"center",padding:"14px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>No laws enacted</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {cand.laws.map(law => {
                  const agitSummary = lawAgitSummary(law);
                  const gains  = agitSummary.filter(x=>x.delta<0);
                  const losses = agitSummary.filter(x=>x.delta>0);
                  return (
                    <div key={law.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"5px",padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"7px"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"12px",color:"#e8dcc8",marginBottom:law.desc?"2px":"0"}}>{law.name}</div>
                          {law.desc && <div style={{fontSize:"10px",color:SOFT,fontStyle:"italic"}}>{law.desc}</div>}
                        </div>
                        <button onClick={() => removeLaw(law.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"12px",padding:"1px 5px",flexShrink:0}}>×</button>
                      </div>
                      {/* popularity tags */}
                      <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom: agitSummary.length?"6px":"0"}}>
                        {law.effects.map(({classIdx,type}) => {
                          const isAg = agitation[classIdx]>=5;
                          return (
                            <span key={classIdx} style={{fontSize:"9px",padding:"1px 7px",borderRadius:"3px",
                              background:type==="bonus"?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                              border:`1px solid ${type==="bonus"?"rgba(80,160,100,0.25)":isAg?"rgba(200,80,60,0.5)":"rgba(200,80,60,0.25)"}`,
                              color:type==="bonus"?"#80c890":isAg?"#ff8070":"#e08060",
                            }}>{type==="bonus"?"+":"-"} {CLASSES[classIdx]}{type==="malus"&&isAg?" (!)":""}</span>
                          );
                        })}
                      </div>
                      {/* agitation impact row */}
                      {agitSummary.length > 0 && (
                        <div style={{display:"flex",gap:"3px",flexWrap:"wrap",alignItems:"center",paddingTop:"5px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginRight:"3px"}}>Agit</span>
                          {gains.map(x => (
                            <span key={x.classIdx} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(80,160,100,0.1)",border:"1px solid rgba(80,160,100,0.2)",color:"#6db87a"}}>
                              {x.label.slice(0,4)} −1
                            </span>
                          ))}
                          {losses.map(x => {
                            const cur = agitation[x.classIdx];
                            const isAg = cur>=5;
                            return (
                              <span key={x.classIdx} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:isAg?"rgba(200,80,60,0.15)":"rgba(200,80,60,0.08)",border:`1px solid ${isAg?"rgba(200,80,60,0.5)":"rgba(200,80,60,0.2)"}`,color:isAg?"#ff8070":"#e08060"}}>
                                {x.label.slice(0,4)} +2{isAg?" (!)":""}
                              </span>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── CAMPAIGN ACTIONS SECTION ── */}
          <div style={{marginBottom:"28px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>Campaign Actions</span>
              {smBtn(showActForm, () => { setShowActForm(f=>!f); setShowLawForm(false); }, showActForm?"Cancel":"+ New Action")}
            </div>

            {/* literacy strip */}
            <div style={{display:"flex",gap:"3px",flexWrap:"wrap",marginBottom:"10px",padding:"6px 10px",background:"rgba(100,160,200,0.04)",border:"1px solid rgba(100,160,200,0.12)",borderRadius:"4px",alignItems:"center"}}>
              <span style={{fontSize:"8px",color:"#7ab0d0",letterSpacing:"2px",textTransform:"uppercase",marginRight:"4px",flexShrink:0}}>Literacy</span>
              {REGIONS.map((r,i) => {
                const lit = litLevel(data,i);
                return <span key={r} style={{fontSize:"8px",color:lit.color,padding:"1px 5px",borderRadius:"3px",background:lit.color+"12",border:`1px solid ${lit.color}25`}}>{r.slice(0,3)} ×{lit.n}</span>;
              })}
            </div>

            {/* action form */}
            {showActForm && (
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(100,160,200,0.18)",borderRadius:"6px",padding:"16px",marginBottom:"12px"}}>
                <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
                  <input value={newActName} onChange={e=>setNewActName(e.target.value)}
                    placeholder="Action name..." style={{...INPUT,flex:"2 1 120px",width:"auto"}}/>
                  <select value={newActType} onChange={e=>setNewActType(e.target.value)}
                    style={{flex:"1 1 90px",padding:"9px 8px",background:"#1e1a12",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",color:"#e8dcc8",fontSize:"11px",fontFamily:"Georgia,serif",outline:"none",cursor:"pointer"}}>
                    {ACTION_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div style={{fontSize:"9px",letterSpacing:"2px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Bonus per region (0–3) × literacy multiplier</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"12px"}}>
                  {REGIONS.map((r,i) => {
                    const lit = litLevel(data,i);
                    const base = newActBon[i];
                    return (
                      <div key={r} style={{display:"flex",alignItems:"center",gap:"6px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"4px",padding:"5px 8px"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"10px",color:"#b0a080"}}>{r}</div>
                          {base > 0 && <div style={{fontSize:"8px",color:"#7ab0d0"}}>→ +{base*lit.n}</div>}
                        </div>
                        <div style={{display:"flex",gap:"2px"}}>
                          {[0,1,2,3].map(v => {
                            const isA = newActBon[i]===v;
                            return (
                              <button key={v} onClick={() => setNewActBon(p=>{const n=[...p];n[i]=v;return n;})} style={{
                                width:"20px",height:"20px",cursor:"pointer",fontSize:"10px",fontFamily:"Georgia,serif",padding:0,borderRadius:"3px",
                                background:isA?(v===0?"rgba(255,255,255,0.04)":"rgba(100,200,120,0.2)"):"transparent",
                                border:`1px solid ${isA?(v===0?"rgba(255,255,255,0.12)":"rgba(100,200,120,0.45)"):"rgba(255,255,255,0.06)"}`,
                                color:isA?(v===0?DIM:"#80c890"):SOFT,
                              }}>{v}</button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",justifyContent:"flex-end"}}>
                  <button onClick={addAction} style={{padding:"6px 18px",background:"rgba(100,160,200,0.12)",border:"1px solid rgba(100,160,200,0.35)",borderRadius:"4px",color:"#7ab0d0",cursor:"pointer",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif"}}>Add</button>
                </div>
              </div>
            )}

            {(cand.actions||[]).length === 0 ? (
              <div style={{textAlign:"center",padding:"14px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>No campaign actions</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                {(cand.actions||[]).map(action => (
                  <div key={action.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(100,160,200,0.1)",borderRadius:"5px",padding:"9px 12px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"8px",color:"#7ab0d0",letterSpacing:"1px",textTransform:"uppercase",border:"1px solid rgba(100,160,200,0.2)",borderRadius:"3px",padding:"1px 5px",flexShrink:0}}>{action.type}</span>
                    <span style={{fontSize:"12px",color:"#e8dcc8",flex:1,minWidth:"70px"}}>{action.name}</span>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                      {action.bonuses.map((b,i) => b > 0 ? (
                        <span key={i} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"3px",background:"rgba(100,200,120,0.1)",border:"1px solid rgba(100,200,120,0.25)",color:"#80c890"}}>+{b*litLevel(data,i).n} {REGIONS[i]}</span>
                      ) : null)}
                    </div>
                    <button onClick={() => removeAction(action.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"12px",padding:"1px 5px"}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ── POPULARITY TABLE ── */}
          {hasContent(cand) && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
                <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>{cand.name} — Popularity</span>
                <span style={{fontSize:"9px",color:DIM}}>Click region to compare all candidates</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"2px"}}>
                  <thead>
                    <tr>
                      {REGIONS.map((r,i) => (
                        <th key={r} onClick={() => setSelRegion(i)}
                          onMouseEnter={e=>{e.currentTarget.style.color=GOLD;}}
                          onMouseLeave={e=>{e.currentTarget.style.color=DIM;}}
                          style={{padding:"5px 3px",textAlign:"center",fontSize:"8px",letterSpacing:"1px",color:DIM,textTransform:"uppercase",fontWeight:"normal",cursor:"pointer",minWidth:"58px"}}>
                          {r}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      {myPop(cand).map((score,i) => (
                        <td key={i} style={{padding:"2px"}}>
                          <div onClick={() => setSelRegion(i)} style={{textAlign:"center",padding:"10px 2px",borderRadius:"4px",background:popColor(score)+"12",border:`1px solid ${popColor(score)}33`,fontSize:"16px",fontWeight:"bold",color:popColor(score),cursor:"pointer"}}>
                            {score>0?"+"+score:score}
                          </div>
                        </td>
                      ))}
                    </tr>
                    {cand.laws.map(law => {
                      const scores = REGIONS.map((_,rIdx) => {
                        let s=0;
                        law.effects.forEach(({classIdx,type}) => {
                          const inf=data[classIdx][rIdx], isAg=agitation[classIdx]>=5;
                          if(type==="bonus") s+=inf;
                          if(type==="malus") s-=isAg?inf:Math.floor(inf/2);
                        });
                        return Math.round(s);
                      });
                      return [
                        <tr key={law.id+"-h"}>
                          <td colSpan={REGIONS.length} style={{paddingTop:"4px",paddingBottom:"1px"}}>
                            <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",paddingLeft:"3px"}}>↳ {law.name}</div>
                          </td>
                        </tr>,
                        <tr key={law.id+"-r"}>
                          {scores.map((s,i) => (
                            <td key={i} style={{padding:"1px 2px"}}>
                              <div style={{textAlign:"center",padding:"3px",borderRadius:"3px",background:"rgba(255,255,255,0.015)",fontSize:"9px",color:popColor(s)}}>{s>0?"+"+s:s===0?"·":""+s}</div>
                            </td>
                          ))}
                        </tr>
                      ];
                    })}
                    {(cand.actions||[]).map(action => {
                      const scores = action.bonuses.map((b,i) => b*litLevel(data,i).n);
                      return [
                        <tr key={action.id+"-h"}>
                          <td colSpan={REGIONS.length} style={{paddingTop:"4px",paddingBottom:"1px"}}>
                            <div style={{fontSize:"8px",color:"#5a8aaa",letterSpacing:"2px",textTransform:"uppercase",paddingLeft:"3px"}}>↳ {action.name}</div>
                          </td>
                        </tr>,
                        <tr key={action.id+"-r"}>
                          {scores.map((s,i) => (
                            <td key={i} style={{padding:"1px 2px"}}>
                              <div style={{textAlign:"center",padding:"3px",borderRadius:"3px",background:"rgba(255,255,255,0.015)",fontSize:"9px",color:s>0?"#80c890":DIM}}>{s>0?"+"+s:"·"}</div>
                            </td>
                          ))}
                        </tr>
                      ];
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ── GAME STATE TAB ────────────────────────────────────────────────────────────

function GameStateTab({agitation, setAgitation, natUnrest, turn, setTurn, candidates, setCandidates, senateHolder}) {
  const [confirmEnd, setConfirmEnd] = useState(false);

  const adjAgit = (i,d) => setAgitation(p => { const n=[...p]; n[i]=Math.max(0,Math.min(6,n[i]+d)); return n; });
  const adjAct  = (id,d) => setCandidates(p => p.map(c => c.id===id ? {...c, actionsLeft:Math.max(0,Math.min(10,(c.actionsLeft??BASE_ACTIONS)+d))} : c));

  const endTurn = () => {
    setAgitation(p => p.map(a => Math.max(0, a - (a <= 2 ? 0 : 0))));
    setCandidates(p => p.map(c => ({
      ...c,
      actionsLeft: BASE_ACTIONS + (senateHolder === c.id ? 1 : 0) + (government.pm === c.id ? 1 : 0)
    })));
    setTurn(t => t+1);
    setConfirmEnd(false);
  };

  const ur = unrestInfo(natUnrest);

  return (
    <div style={{padding:"28px 24px",maxWidth:"900px",margin:"0 auto"}}>
      {/* banner */}
      <div style={{marginBottom:"28px",padding:"20px 24px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:"20px",justifyContent:"space-between"}}>
        <div style={{flex:1,minWidth:"220px"}}>
          <div style={{fontSize:"11px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Current Period</div>
          <div style={{fontSize:"26px",color:"#e8dcc8",marginBottom:"4px",letterSpacing:"1px"}}>
            {getSeason(turn)} {getYear(turn)}
          </div>
          <div style={{fontSize:"11px",color:SOFT,letterSpacing:"2px",marginBottom:"12px"}}>Turn {turn}</div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px",flexWrap:"wrap"}}>
            <span style={{fontSize:"10px",letterSpacing:"2px",color:DIM,textTransform:"uppercase"}}>National Unrest</span>
            <div style={{width:"100px",height:"5px",background:"rgba(255,255,255,0.07)",borderRadius:"3px",overflow:"hidden"}}>
              <div style={{width:(natUnrest/10*100)+"%",height:"100%",background:ur.color,borderRadius:"3px",transition:"width 0.4s"}}/>
            </div>
            <span style={{fontSize:"14px",fontWeight:"bold",color:ur.color}}>{natUnrest}/10</span>
            <span style={{fontSize:"10px",color:ur.color,letterSpacing:"2px",textTransform:"uppercase",border:`1px solid ${ur.color}44`,padding:"2px 8px",borderRadius:"3px"}}>{ur.label}</span>
          </div>
          {natUnrest > 0 && (
            <div style={{fontSize:"10px",color:ur.color,padding:"4px 8px",background:ur.color+"10",border:`1px solid ${ur.color}22`,borderRadius:"3px",display:"inline-block",marginBottom:"6px"}}>{ur.desc}</div>
          )}
          <div style={{fontSize:"10px",color:DIM,lineHeight:"1.6"}}>
            Unrest = Restless classes x1 + Agitated classes x2 (auto-calculated)<br/>
            On End Turn: all actions reset to {BASE_ACTIONS} (+1 for Senate majority holder)
          </div>
        </div>
        {!confirmEnd ? (

                    <AdjBtn onClick={() => adjAct(c.id,-1)} red>-</AdjBtn>

          <SecBar>Turn Calendar</SecBar>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>
            {Array.from({length:8},(_,i) => {

              const y = getYear(t);

              const isPast = t < turn;

              return (

                  opacity:isPast?.5:1}}>
                  <div style={{fontSize:"9px",color:isCur?GOLD:sc,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"2px"}}>{isCur?">>> ":""}{s}</div>
                  <div style={{fontSize:"13px",color:isCur?"#e8dcc8":SOFT,letterSpacing:"1px"}}>{y}</div>

        </div>

      </div>
    </div>
  );
}

// ── INFLUENCE EDITOR ──────────────────────────────────────────────────────────

function InfluenceTab({data, setData}) {
  const [hov, setHov] = useState(null);
  const total = col => data.reduce((s,r) => s+r[col], 0);
  const adj   = (row,col,d) => setData(p => {
    const n = p.map(r => [...r]);
    const v = n[row][col]+d;
    if (v < 0) return p;
    n[row][col] = v;
    return n;
  });
  const tc = t => { const d=Math.abs(t-TARGET); return d===0?"#6db87a":d<=2?GOLD:"#c4605a"; };

  return (
    <div style={{padding:"28px 24px"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:"10px",justifyContent:"center",marginBottom:"24px"}}>
        {CLASSES.map((cls,i) => (
          <div key={cls} style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"11px",color:"#b0a080"}}>
            <div style={{width:"9px",height:"9px",borderRadius:"2px",background:CLASS_COLORS[i]}}/>{cls}
          </div>
        ))}
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{margin:"0 auto",borderCollapse:"separate",borderSpacing:"3px",minWidth:"900px"}}>
          <thead>
            <tr>
              <th style={{width:"130px",padding:"8px 12px",textAlign:"left",fontSize:"10px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",fontWeight:"normal"}}>Class / Region</th>
              {REGIONS.map(r => (
                <th key={r} style={{padding:"8px 6px",textAlign:"center",fontSize:"10px",letterSpacing:"2px",color:GOLD,textTransform:"uppercase",fontWeight:"normal",minWidth:"80px"}}>{r}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {CLASSES.map((cls,row) => (
              <tr key={cls}>
                <td style={{padding:"4px 12px",fontSize:"12px",color:CLASS_COLORS[row],whiteSpace:"nowrap"}}>
                  <span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"2px",background:CLASS_COLORS[row],marginRight:"8px",opacity:.7,verticalAlign:"middle"}}/>
                  {cls}
                </td>
                {REGIONS.map((_,col) => {
                  const val = data[row][col];
                  const isH = hov && hov[0]===row && hov[1]===col;

                    <td key={col} style={{padding:"3px"}}>
                      <div
                        onMouseEnter={() => setHov([row,col])}

                        style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"4px",
                          background:isH?"rgba(201,168,76,0.1)":"rgba(255,255,255,0.03)",
                          border:`1px solid ${isH?"rgba(201,168,76,0.35)":"rgba(255,255,255,0.06)"}`,
                          borderRadius:"4px",padding:"5px 4px"}}>
                        <button onClick={() => adj(row,col,-1)} style={{width:"16px",height:"16px",background:"rgba(200,100,80,0.25)",border:"1px solid rgba(200,100,80,0.3)",borderRadius:"2px",color:"#e08060",cursor:"pointer",fontSize:"12px",lineHeight:"1",padding:0}}>-</button>
                        <span style={{fontSize:"14px",fontWeight:"bold",color:CLASS_COLORS[row],minWidth:"20px",textAlign:"center"}}>{val}</span>
                        <button onClick={() => adj(row,col,1)} style={{width:"16px",height:"16px",background:"rgba(80,160,100,0.25)",border:"1px solid rgba(80,160,100,0.3)",borderRadius:"2px",color:"#80c890",cursor:"pointer",fontSize:"12px",lineHeight:"1",padding:0}}>+</button>
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
            <tr>
              <td style={{padding:"8px 12px 2px",fontSize:"10px",letterSpacing:"3px",color:DIM,textTransform:"uppercase"}}>Total</td>
              {REGIONS.map((_,col) => {

                return (
                  <td key={col} style={{padding:"0 3px 6px"}}>
