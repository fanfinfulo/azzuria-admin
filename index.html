                const oId = d.aId===nation.id ? d.bId : d.aId;
                const oName = oId==="azzuria"?"Azzuria":nations.find(n=>n.id===oId)?.name||oId;
                return (
                  <div key={d.id} style={{marginBottom:"4px",padding:"5px 10px",
                    background:"rgba(74,154,106,0.05)",border:"1px solid rgba(74,154,106,0.18)",borderRadius:"3px",
                    fontSize:"10px",color:SOFT,display:"flex",justifyContent:"space-between"}}>
                    <span>🤝 <span style={{color:"#e8dcc8"}}>{oName}</span></span>
                    <span style={{color:"#6db87a"}}>{d.turnsLeft} turns left</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Condemnation log */}
          {(nation.condemnLog||[]).length > 0 && (
            <div style={{marginBottom:"10px",paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:"8px",color:"#c4605a",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Condemnation Log</div>
              {(nation.condemnLog||[]).map((cl,i) => (
                <div key={i} style={{fontSize:"9px",color:SOFT,lineHeight:"1.7",marginBottom:"2px"}}>
                  <span style={{color:"#c47a5a",marginRight:"6px"}}>T{cl.turn}:</span>{cl.reason}
                </div>
              ))}
            </div>
          )}

          {/* Event history */}
          {(nation.events||[]).length > 0 && (
            <div style={{paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>History</div>
              {(nation.events||[]).slice(0,6).map((ev,i) => (
                <div key={i} style={{fontSize:"10px",color:ev.action?.startsWith("REVOLUTION")?"#c47a5a":SOFT,lineHeight:"1.6"}}>
                  <span style={{color:DIM}}>{ev.season} {ev.year}: </span>{ev.action}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── NATIONS TAB ────────────────────────────────────────────────────────────────
function NationsTab({nations, setNations, pendingNations, setPendingNations, wars, setWars, deals, setDeals, gmEvents, setGmEvents, randomEventDeck, setRandomEventDeck, turnLog}) {
  const [panel, setPanel] = useState("nations"); // "nations"|"diplo"|"events"|"log"

  // Nation CRUD
  const addNation = () => {
    const id = `nat_${Date.now()}`;
    const color = NATION_COLORS[nations.length % NATION_COLORS.length];
    setNations(p => [...p, {
      id, name:"New Nation", color,
      regime:"Absolute Monarchy",
      regions:[], productivity:2,
      milInvest:2, unrest:2,
      diplo:{azzuria:0}, events:[], desc:""
    }]);
  };
  const updateNation = (id, patch) => setNations(p => p.map(n => n.id===id ? {...n,...patch} : n));
  const deleteNation = id => setNations(p=>p.filter(n=>n.id!==id));

  // Pending nations (from Nation Creator tool)
  const approvePending = pn => {
    // Convert old-format nation to new format
    const converted = {
      ...pn,
      regions: (pn.regions||[]).length > 0
        ? pn.regions.map((r,i) => typeof r==="number"
            ? {id:Date.now()+i, name:`Region ${i+1}`, pop:2}
            : r)
        : [{id:Date.now(), name:"Capital Region", pop: pn.pop||3}],
      productivity: pn.prod || 2,
      milInvest: pn.milInvest || 0,
      unrest: pn.unrest || 0,
    };
    setNations(prev => [...prev, converted]);
    denyPending(pn);
  };
  const denyPending = async pn => {
    const updated = pendingNations.filter(x=>x.id!==pn.id);
    setPendingNations(updated);
    try {
      const pr = await fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN_ID+"/latest?t="+Date.now(),
        {headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"},cache:"no-store"});
      const pd = await pr.json();
      await fetch("https://api.jsonbin.io/v3/b/"+JSONBIN_BIN_ID, {
        method:"PUT", headers:{"Content-Type":"application/json","X-Access-Key":JSONBIN_ACCESS_KEY},
        body: JSON.stringify({...(pd.record||{}), pendingNations:updated}),
      });
    } catch(e){}
  };

  // Warnings
  const warnings = nations.map(n => {
    const {eco,avail} = calcNationEco(n);
    const msgs = [];
    if ((n.unrest||0) >= 8)          msgs.push({type:"REVOLUTION", msg:`unrest ${n.unrest} — revolution risk`});
    else if ((n.unrest||0) >= 6)     msgs.push({type:"CRISIS",    msg:`volatile (unrest ${n.unrest})`});
    if (eco <= 0)                    msgs.push({type:"ECONOMY",   msg:`negative economy (${eco})`});
    if ((n.diplo?.azzuria??0)<=-2 && avail>=6) msgs.push({type:"THREAT", msg:`hostile + capable (${avail} avail)`});
    return msgs.map(m => ({n, ...m}));
  }).flat();

  // Active wars display helpers
  const nationName = id => id==="azzuria" ? "Azzuria" : nations.find(n=>n.id===id)?.name||id;

  return (
    <div style={{padding:"16px 14px", maxWidth:"1040px", margin:"0 auto"}}>

      {/* Warnings */}
      {warnings.length > 0 && (
        <div style={{marginBottom:"16px",padding:"12px 16px",background:"rgba(196,122,90,0.05)",
          border:"1px solid rgba(196,122,90,0.2)",borderRadius:"5px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:"#c47a5a",textTransform:"uppercase",marginBottom:"8px"}}>⚠ Intelligence Briefing</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
            {warnings.map((w,i) => (
              <div key={i} style={{display:"flex",gap:"6px",alignItems:"center",fontSize:"10px",
                padding:"4px 8px",background:"rgba(255,255,255,0.02)",borderRadius:"3px",border:`1px solid ${w.n.color||"#c47a5a"}22`}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:w.n.color||"#c47a5a",flexShrink:0,display:"inline-block"}}/>
                <span style={{color:"#e8dcc8",minWidth:"70px"}}>{w.n.name}</span>
                <span style={{fontSize:"8px",color:w.type==="REVOLUTION"?"#c47a5a":w.type==="THREAT"?"#c46060":"#a09060",
                  border:"1px solid currentColor",borderRadius:"2px",padding:"0 4px",opacity:.8}}>{w.type}</span>
                <span style={{color:SOFT}}>{w.msg}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Sub-nav */}
      <div style={{display:"flex",gap:0,marginBottom:"20px",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"4px",overflow:"hidden"}}>
        {[["nations","Nations"],["diplo","Diplomacy"],["events","GM Events"],["log","Turn Log"]].map(([key,label])=>(
          <button key={key} onClick={()=>setPanel(key)}
            style={{flex:1,padding:"9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
              letterSpacing:"2px",textTransform:"uppercase",background:panel===key?"rgba(255,255,255,0.05)":"none",
              border:"none",color:panel===key?"#e8dcc8":DIM,
              borderRight:key!=="log"?"1px solid rgba(255,255,255,0.07)":"none"}}>
            {label}
            {key==="nations"&&nations.length>0&&<span style={{marginLeft:"5px",fontSize:"8px",color:SOFT,border:"1px solid rgba(255,255,255,0.15)",borderRadius:"8px",padding:"1px 5px"}}>{nations.length}</span>}
            {key==="events"&&(gmEvents||[]).length>0&&<span style={{marginLeft:"5px",fontSize:"8px",color:"#9b7fba",border:"1px solid rgba(155,127,186,0.4)",borderRadius:"8px",padding:"1px 5px"}}>{(gmEvents||[]).length}</span>}
          </button>
        ))}
      </div>

      {/* ── NATIONS PANEL ── */}
      {panel==="nations" && (
        <div>
          {/* Pending */}
          {pendingNations.length > 0 && (
            <div style={{marginBottom:"20px"}}>
              <div style={{fontSize:"9px",letterSpacing:"3px",color:"#c47a5a",textTransform:"uppercase",marginBottom:"8px"}}>
                Pending Registration — {pendingNations.length}
              </div>
              {pendingNations.map(pn => {
                const az = pn.diplo?.azzuria??0;
                return (
                  <div key={pn.id} style={{marginBottom:"6px",padding:"12px 14px",
                    background:"rgba(196,122,90,0.04)",border:`1px solid ${pn.color||"#c47a5a"}30`,
                    borderLeft:`3px solid ${pn.color||"#c47a5a"}`,borderRadius:"4px",
                    display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                    <span style={{fontFamily:"Georgia,serif",fontSize:"13px",color:pn.color,flex:1}}>{pn.name}</span>
                    <span style={{fontSize:"9px",color:SOFT,border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",padding:"2px 6px"}}>{pn.regime}</span>
                    <span style={{fontSize:"10px",color:DIPLO_COLORS[az+3]}}>{DIPLO_LABELS[az+3]}</span>
                    <button onClick={()=>approvePending(pn)} style={{padding:"4px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",background:"rgba(80,160,100,0.12)",border:"1px solid rgba(80,160,100,0.35)",borderRadius:"3px",color:"#6db87a"}}>✓ Register</button>
                    <button onClick={()=>denyPending(pn)} style={{padding:"4px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",background:"rgba(200,80,60,0.08)",border:"1px solid rgba(200,80,60,0.22)",borderRadius:"3px",color:"#c4605a"}}>✗ Deny</button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Add nation button */}
          <div style={{marginBottom:"16px"}}>
            <button onClick={addNation}
              style={{padding:"8px 20px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
                letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",
                background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.35)",color:GOLD}}>
              + Create Nation
            </button>
          </div>

          {/* Nation editors */}
          {nations.length === 0 && pendingNations.length === 0 && (
            <div style={{textAlign:"center",padding:"50px",color:DIM,fontSize:"11px",fontStyle:"italic"}}>
              No nations yet. Click "Create Nation" to add a foreign power.
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {nations.map(n => (
              <NationEditor
                key={n.id}
                nation={n}
                onChange={patch => updateNation(n.id, patch)}
                onDelete={() => deleteNation(n.id)}
                wars={wars} deals={deals} nations={nations}
              />
            ))}
          </div>
        </div>
      )}

      {/* ── DIPLOMACY PANEL ── */}
      {panel==="diplo" && (
        <DiplomacyPanel
          nations={nations} setNations={setNations}
          wars={wars} setWars={setWars}
          deals={deals} setDeals={setDeals}
        />
      )}

      {/* ── EVENTS PANEL ── */}
      {panel==="events" && (
        <EventBuilderPanel
          nations={nations}
          gmEvents={gmEvents} setGmEvents={setGmEvents}
          randomEventDeck={randomEventDeck} setRandomEventDeck={setRandomEventDeck}
        />
      )}

      {/* ── LOG PANEL ── */}
      {panel==="log" && (
        <div>
          {(turnLog||[]).length===0 && (
            <div style={{textAlign:"center",padding:"30px",color:DIM,fontSize:"11px",fontStyle:"italic"}}>No turns completed yet.</div>
          )}
          {(turnLog||[]).map((log,i) => (
            <div key={i} style={{marginBottom:"12px",background:"rgba(255,255,255,0.015)",
              border:"1px solid rgba(255,255,255,0.07)",borderRadius:"4px",overflow:"hidden"}}>
              <div style={{padding:"7px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)",
                display:"flex",alignItems:"center",gap:"12px"}}>
                <span style={{fontSize:"9px",color:"#9b7fba",letterSpacing:"3px",textTransform:"uppercase"}}>Turn {log.turn}</span>
                <span style={{fontSize:"10px",color:SOFT}}>{log.season} {log.year}</span>
              </div>
              <div style={{padding:"8px 14px"}}>
                {(log.entries||[]).map((e,j)=>(
                  <div key={j} style={{fontSize:"10px",lineHeight:"1.6",marginBottom:"1px",
                    color:e.startsWith("GM EVENT")||e.startsWith("DECK EVENT")?"#9b7fba":
                          e.startsWith("REVOLUTION")?"#c47a5a":
                          e.includes("standing")?"#4a90c0":SOFT}}>
                    · {e}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── HOME TAB ──────────────────────────────────────────────────────────────────

function HomeTab({turn, natUnrest, agitation, candidates, data, government, nations, wars, deals, electionHistory, senateHolder, coalitions}) {
  const season = getSeason(turn);
  const year   = getYear(turn);
  const ur     = unrestInfo(natUnrest);

  // Most agitated class
  const maxAgit = Math.max(...agitation, 0);
  const maxAgitIdx = agitation.indexOf(maxAgit);

  // Cabinet fill rate
  const ministryIds = ["pm","interior","trade","war","works","foreign","church","justice","education"];
  const filled = ministryIds.filter(id => government[id]).length;

  // Latest election
  const lastElection = (electionHistory||[])[0];

  // Active conflicts
  const activeWars  = (wars||[]).length;
  const activeDeals = (deals||[]).length;

  // Parliament grid helper


  const Stat = ({label, value, color="#e8dcc8", sub}) => (
    <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.03)",
      border:"1px solid rgba(255,255,255,0.09)",borderRadius:"4px",minWidth:"80px"}}>
      <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"3px"}}>{label}</div>
      <div style={{fontSize:"18px",color,fontFamily:"Georgia,serif",fontWeight:"normal"}}>{value}</div>
      {sub&&<div style={{fontSize:"9px",color:DIM,marginTop:"2px"}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{padding:"16px 12px",maxWidth:"1000px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"22px"}}>

      {/* ── Season header ── */}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:"10px",
        borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:"16px"}}>
        <div>
          <div style={{fontSize:"9px",letterSpacing:"5px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Kingdom of Azzuria</div>
          <div style={{fontSize:"32px",color:"#e8dcc8",letterSpacing:"2px"}}>{season} <span style={{color:GOLD}}>{year}</span></div>
          <div style={{fontSize:"11px",color:SOFT,marginTop:"2px",letterSpacing:"1px"}}>Turn {turn} · {SEASONS[(turn)%4]} next</div>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"flex-end"}}>
          <Stat label="National Unrest" value={`${natUnrest}/10`} color={ur.color} sub={ur.label}/>
          <Stat label="Agitated Classes" value={agitation.filter(a=>a>=5).length} color={agitation.filter(a=>a>=5).length>0?"#c4605a":"#6db87a"}/>
          <Stat label="Cabinet" value={`${filled}/${ministryIds.length}`} color={filled===ministryIds.length?"#6db87a":GOLD} sub="ministries filled"/>
          <Stat label="Active Wars" value={activeWars} color={activeWars>0?"#c4605a":"#6db87a"}/>
          <Stat label="Trade Deals" value={activeDeals} color={activeDeals>0?"#4a90c0":"#6a5a3a"}/>
        </div>
      </div>

      {/* ── Two-col layout ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"16px",alignItems:"start"}}>

        {/* LEFT: Current parliament (last saved chamber election) */}
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
          {(() => {
            const lastChamber = (electionHistory||[]).find(e=>e.type==="chamber");
            if (!lastChamber) return (
              <div>
                <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Chamber of Deputies</div>
                <div style={{color:DIM,fontSize:"10px",fontStyle:"italic",padding:"20px 0",textAlign:"center"}}>
                  No election held yet.
                </div>
              </div>
            );
            const el = lastChamber;
            const sortedR = [...(el.ranked||[])].sort((a,b)=>(el.seatTotals[b.id]||0)-(el.seatTotals[a.id]||0));
            const winner = el.winner;
            const winSeats = el.seatTotals[winner.id]||0;
            return (
              <>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                  <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",flex:1}}>Chamber · {el.season} {el.year}</div>
                  {el.hasMajority && <span style={{fontSize:"8px",color:"#6db87a",border:"1px solid rgba(109,184,122,0.3)",borderRadius:"3px",padding:"1px 6px",letterSpacing:"1px"}}>MAJORITY</span>}
                </div>
                <div style={{marginBottom:"12px"}}><SemiParliament seatTotals={el.seatTotals} cands={el.ranked} total={el.totalSeats} coalitions={coalitions}/></div>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",padding:"8px 12px",
                  background:"rgba(255,255,255,0.02)",border:`1px solid ${winner.color}30`,borderRadius:"4px"}}>
                  <span style={{width:"9px",height:"9px",borderRadius:"50%",background:winner.color,flexShrink:0,display:"inline-block"}}/>
                  <span style={{fontSize:"13px",color:winner.color,flex:1}}>{winner.name}</span>
                  <span style={{fontSize:"20px",fontWeight:"bold",color:"#e8dcc8"}}>{winSeats}</span>
                  <span style={{fontSize:"9px",color:DIM}}>/ {el.totalSeats}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                  {sortedR.map(r => {
                    const seats = el.seatTotals[r.id]||0;
                    const pct = Math.round(seats/el.totalSeats*100);
                    return (
                      <div key={r.id}>
                        <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px"}}>
                          <span style={{width:"7px",height:"7px",borderRadius:"50%",background:r.color,flexShrink:0,display:"inline-block"}}/>
                          <span style={{fontSize:"10px",color:r.color,flex:1}}>{r.name}</span>
                          <span style={{fontSize:"11px",color:"#e8dcc8",fontWeight:"bold"}}>{seats}</span>
                          <span style={{fontSize:"9px",color:DIM}}>{pct}%</span>
                        </div>
                        <div style={{height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                          <div style={{width:pct+"%",height:"100%",background:r.color,borderRadius:"2px"}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            );
          })()}
        </div>

        {/* RIGHT: Class agitation + unrest */}
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Class Agitation</div>
            <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
              {CLASSES.map((cls,i) => {
                const ph = agitPhase(agitation[i]);
                return (
                  <div key={cls} style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{width:"7px",height:"7px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0,display:"inline-block"}}/>
                    <span style={{fontSize:"10px",color:"#b0a080",flex:1}}>{cls}</span>
                    <div style={{width:"80px",height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                      <div style={{width:(agitation[i]/6*100)+"%",height:"100%",background:ph.color,borderRadius:"2px"}}/>
                    </div>
                    <span style={{fontSize:"9px",color:ph.color,width:"18px",textAlign:"right"}}>{agitation[i]}</span>
                    <span style={{fontSize:"8px",color:ph.color,width:"48px",letterSpacing:"1px"}}>{ph.label.slice(0,4)}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Cabinet quick-view */}
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Cabinet</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"4px"}}>
              {ministryIds.map(id => {
                const m   = (function(){const mn=["pm","interior","trade","war","works","foreign","church","justice","education"];
                  const titles=["Prime Minister","Interior","Trade","War","Public Works","Foreign Affairs","Religion","Justice","Education"];
                  return {title:titles[mn.indexOf(id)]||id}; })();
                const holder = government[id] ? candidates.find(c=>c.id===government[id]) : null;
                return (
                  <div key={id} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 7px",
                    background:holder?"rgba(255,255,255,0.02)":"transparent",
                    border:`1px solid ${holder?holder.color+"22":"rgba(255,255,255,0.04)"}`,borderRadius:"3px"}}>
                    {holder
                      ? <><span style={{width:"5px",height:"5px",borderRadius:"50%",background:holder.color,display:"inline-block",flexShrink:0}}/><span style={{fontSize:"9px",color:holder.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{holder.name}</span></>
                      : <span style={{fontSize:"9px",color:DIM,fontStyle:"italic",flex:1}}>Vacant</span>
                    }
                    <span style={{fontSize:"8px",color:DIM}}>{m.title.split(" ")[0]}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* ── Regions strip ── */}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
        <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Regions — At a Glance</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:"6px"}}>
          {REGIONS.map((r, rIdx) => {
            const rd   = REGION_DATA[rIdx];
            const lit  = litLevel(data, rIdx);
            const pops = candidates.map(c => ({c, score:calcPopularity(c,data,agitation,natUnrest,government?.tariffs||0,turn,candidates)[rIdx]}));
            const lead = pops.reduce((a,b)=>a.score>=b.score?a:b, {score:-999,c:null});
            const colSum = data.reduce((s,row)=>s+row[rIdx],0);
            const domClass = data.reduce((best,_,ri)=>data[ri][rIdx]>data[best][rIdx]?ri:best,0);
            return (
              <div key={r} style={{padding:"10px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"4px"}}>
                <div style={{fontSize:"11px",color:"#e8dcc8",marginBottom:"2px",fontFamily:"Georgia,serif"}}>{r}</div>
                <div style={{fontSize:"8px",color:DIM,marginBottom:"5px",letterSpacing:"1px"}}>{rd.capital} · {REGION_SEATS[rIdx]} seats</div>
                <div style={{display:"flex",gap:"3px",flexWrap:"wrap",marginBottom:"4px"}}>
                  <span style={{fontSize:"7px",padding:"1px 5px",borderRadius:"2px",
                    background:CLASS_COLORS[domClass]+"18",border:"1px solid "+CLASS_COLORS[domClass]+"33",color:CLASS_COLORS[domClass]}}>
                    {CLASSES[domClass].split(" ").pop()}
                  </span>
                  <span style={{fontSize:"7px",padding:"1px 5px",borderRadius:"2px",
                    background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:lit.color}}>
                    Lit {lit.label}
                  </span>
                </div>
                {lead.c && <div style={{fontSize:"8px",color:lead.c.color}}>
                  ▶ {lead.c.name} {lead.score>0?"+":""}{lead.score}
                </div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Active Coalitions ── */}
      {(coalitions||[]).length > 0 && (() => {
        const lastChamber = (electionHistory||[]).find(e=>e.type==="chamber");
        const seatTotals  = lastChamber?.seatTotals || {};
        const totalSeats  = lastChamber?.totalSeats  || TOTAL_SEATS;
        return (
          <div style={{background:"rgba(155,127,186,0.04)",border:"1px solid rgba(155,127,186,0.18)",borderRadius:"5px",padding:"16px"}}>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:"#9b7fba",textTransform:"uppercase",marginBottom:"12px"}}>Active Coalitions</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {coalitions.map(coal => {
                const seats   = (coal.memberIds||[]).reduce((s,id) => s+(seatTotals[id]||0), 0);
                const pct     = totalSeats ? Math.round(seats/totalSeats*100) : 0;
                const hasMaj  = seats >= MAJORITY;
                const members = candidates.filter(c => (coal.memberIds||[]).includes(c.id));
                return (
                  <div key={coal.id} style={{padding:"10px 12px",background:"rgba(255,255,255,0.02)",
                    border:`1px solid ${coal.color}33`,borderLeft:`3px solid ${coal.color}`,borderRadius:"4px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px",flexWrap:"wrap"}}>
                      <span style={{fontSize:"12px",color:coal.color,flex:1}}>{coal.name}</span>
                      {lastChamber && <>
                        <span style={{fontSize:"14px",fontWeight:"bold",color:hasMaj?"#6db87a":"#e8dcc8"}}>{seats}</span>
                        <span style={{fontSize:"9px",color:DIM}}>/ {totalSeats}</span>
                        <span style={{fontSize:"9px",color:hasMaj?"#6db87a":DIM}}>{pct}%</span>
                        {hasMaj && <span style={{fontSize:"8px",color:"#6db87a",border:"1px solid rgba(109,184,122,0.35)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>MAJORITY</span>}
                      </>}
                    </div>
                    {lastChamber && (
                      <div style={{height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden",marginBottom:"7px"}}>
                        <div style={{width:pct+"%",height:"100%",background:hasMaj?"#6db87a":coal.color,borderRadius:"2px",transition:"width 0.3s"}}/>
                      </div>
                    )}
                    <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                      {members.map(c => (
                        <div key={c.id} style={{display:"flex",alignItems:"center",gap:"4px",padding:"2px 8px",
                          background:c.color+"14",border:`1px solid ${c.color}33`,borderRadius:"3px"}}>
                          <span style={{width:"5px",height:"5px",borderRadius:"50%",background:c.color,display:"inline-block"}}/>
                          <span style={{fontSize:"9px",color:c.color}}>{c.name}</span>
                          {lastChamber && <span style={{fontSize:"8px",color:DIM,marginLeft:"1px"}}>{seatTotals[c.id]||0}</span>}
                        </div>
                      ))}
                      {members.length === 0 && <span style={{fontSize:"9px",color:DIM,fontStyle:"italic"}}>No members yet</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── Last election + Nations row ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"16px",alignItems:"start"}}>

        {/* Last election */}
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Last Election</div>
          {!lastElection ? (
            <div style={{color:DIM,fontSize:"10px",fontStyle:"italic"}}>No elections on record.</div>
          ) : (
            <>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
                <span style={{fontSize:"9px",color:DIM,border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",padding:"1px 6px",textTransform:"uppercase",letterSpacing:"1px"}}>{lastElection.type}</span>
                <span style={{fontSize:"10px",color:SOFT}}>{lastElection.season} {lastElection.year}</span>
                {lastElection.hasMajority&&<span style={{fontSize:"8px",color:"#6db87a",border:"1px solid rgba(109,184,122,0.35)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>MAJORITY</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                <span style={{width:"9px",height:"9px",borderRadius:"50%",background:lastElection.winner.color,display:"inline-block"}}/>
                <span style={{fontSize:"13px",color:lastElection.winner.color}}>{lastElection.winner.name}</span>
                <span style={{fontSize:"18px",fontWeight:"bold",color:"#e8dcc8"}}>{lastElection.seatTotals?.[lastElection.winner.id]||0}</span>
                <span style={{fontSize:"9px",color:DIM}}>/ {lastElection.totalSeats}</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {[...(lastElection.ranked||[])].sort((a,b)=>(lastElection.seatTotals?.[b.id]||0)-(lastElection.seatTotals?.[a.id]||0)).map(r=>{
                  const s=lastElection.seatTotals?.[r.id]||0;
                  return s>0&&<div key={r.id} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"9px"}}>
                    <div style={{width:"6px",height:"6px",borderRadius:"2px",background:r.color}}/>
                    <span style={{color:r.color}}>{r.name}</span>
                    <span style={{color:"#e8dcc8"}}>{s}</span>
                  </div>;
                })}
              </div>
            </>
          )}
        </div>

        {/* Nations */}
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px",padding:"16px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Foreign Powers</div>
          {(!nations||nations.length===0) ? (
            <div style={{color:DIM,fontSize:"10px",fontStyle:"italic"}}>No nations registered.</div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
              {nations.map(n => {
                const az   = n.diplo?.azzuria ?? 0;
                const dCol = DIPLO_COLORS[az+3];
                const dLbl = DIPLO_LABELS[az+3];
                const atWar   = (wars||[]).some(w=>w.attId===n.id||w.defId===n.id);
                const hasDeal = (deals||[]).some(d=>d.aId===n.id||d.bId===n.id);
                const {eco, milStr} = calcNationEco(n);
                return (
                  <div key={n.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 9px",
                    background:`${n.color}08`,border:`1px solid ${n.color}22`,borderRadius:"3px"}}>
                    <span style={{width:"7px",height:"7px",borderRadius:"50%",background:n.color,flexShrink:0,display:"inline-block"}}/>
                    <span style={{fontSize:"11px",color:n.color,flex:1}}>{n.name}</span>
                    <span style={{fontSize:"9px",color:DIM}}>{n.regime?.split(" ")[0]}</span>
                    <span style={{fontSize:"9px",color:dCol,border:`1px solid ${dCol}44`,borderRadius:"3px",padding:"1px 5px"}}>{dLbl}</span>
                    {atWar   && <span style={{fontSize:"8px",color:"#c4605a"}}>⚔</span>}
                    {hasDeal && <span style={{fontSize:"8px",color:"#4a90c0"}}>🤝</span>}
                    <span style={{fontSize:"8px",color:DIM}}>eco {eco}</span>
                  </div>
                );
              })}
              {activeWars>0&&(
                <div style={{marginTop:"4px",padding:"6px 9px",background:"rgba(196,96,90,0.05)",border:"1px solid rgba(196,96,90,0.15)",borderRadius:"3px",fontSize:"9px",color:"#c4605a"}}>
                  {wars.map(w=>{
                    const aN=(nations||[]).find(n=>n.id===w.attId)?.name||(w.attId==="azzuria"?"Azzuria":w.attId);
                    const dN=(nations||[]).find(n=>n.id===w.defId)?.name||(w.defId==="azzuria"?"Azzuria":w.defId);
                    return <div key={w.id}>⚔ {aN} vs {dN} · score {w.score>0?"+":""}{w.score||0} · T{w.turns||0}</div>;
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

// ── MILITARY & REVOLT SYSTEM ─────────────────────────────────────────────────
// State shape:
//   revolts:      [{id, regionIdx, classIdx, strength:1-6, turn, suppressed:bool}]
//   paramilitaries:[{id, partyId, name, strength:1-5, regionIdx, type:"paramilitary"|"police"}]
//   azzuriaArmy:  {strength:1-10, morale:1-5, deployed:[{regionIdx, units}]}

const REVOLT_CAUSES = [
  "Bread riots — hunger drives the workers into the streets",
  "Tax revolt — the burden falls hardest on those least able to bear it",
  "Conscription protests — families resist sending sons to a distant war",
  "Land enclosures — common land seized by noble decree",
  "Strike action — factory workers walk out and hold the gates",
  "Religious procession turns violent — a spark becomes a blaze",
  "Electoral fraud alleged — crowds demand justice at the prefect's door",
  "Harvest failure — rural communities reach breaking point",
];

const revoltPhase = s => {
  if (s <= 2) return { label:"Unrest",    color:"#c9a84c", bg:"rgba(201,168,76,0.08)" };
  if (s <= 4) return { label:"Rising",    color:"#c47a5a", bg:"rgba(196,96,90,0.08)"  };
  return             { label:"Revolt",    color:"#c4605a", bg:"rgba(200,60,60,0.12)"  };
};

function MilitaryTab({
  revolts, setRevolts,
  paramilitaries, setParamilitaries,
  azzuriaArmy, setAzzuriaArmy,
  agitation, setAgitation,
  natUnrest, candidates, government, turn,
}) {
  const [panel, setPanel] = useState("revolts");
  const [revForm, setRevForm] = useState({regionIdx:0, classIdx:0, strength:3, cause:0});
  const [pmForm,  setPmForm]  = useState({partyId:"", name:"", strength:2, regionIdx:0, type:"paramilitary"});
  const [showRevForm, setShowRevForm] = useState(false);
  const [showPmForm,  setShowPmForm]  = useState(false);

  // ── Army helpers ──
  const adjArmy = (key, d, lo=0, hi=10) =>
    setAzzuriaArmy(a => ({...a, [key]: Math.max(lo, Math.min(hi, (a[key]||0) + d))}));

  // ── Revolt: GM spawns ──
  const addRevolt = () => {
    const r = {
      id: Date.now(),
      regionIdx:  revForm.regionIdx,
      classIdx:   revForm.classIdx,
      strength:   revForm.strength,
      cause:      REVOLT_CAUSES[revForm.cause],
      turn,
      suppressed: false,
    };
    setRevolts(p => [...p, r]);
    // Spawning a revolt raises agitation for that class
    setAgitation(p => { const n=[...p]; n[r.classIdx]=Math.min(6,n[r.classIdx]+2); return n; });
    setShowRevForm(false);
  };

  // ── Suppress revolt ──
  // Options: Army (−strength by army morale), Paramilitary (−strength by pm strength), Police (−1 only)
  const suppress = (revId, method, pmId) => {
    setRevolts(prev => prev.map(r => {
      if (r.id !== revId) return r;
      let reduce = 0;
      if (method === "army")  reduce = Math.min(r.strength, azzuriaArmy?.morale || 1);
      if (method === "pm")    reduce = Math.min(r.strength, (paramilitaries.find(p=>p.id===pmId)?.strength||1));
      if (method === "police")reduce = 1;
      const ns = r.strength - reduce;
      if (ns <= 0) {
        // Revolt crushed — lower agitation
        setAgitation(ag => { const n=[...ag]; n[r.classIdx]=Math.max(0,n[r.classIdx]-2); return n; });
        return {...r, strength:0, suppressed:true};
      }
      return {...r, strength:ns};
    }));
    // Army suppression damages morale
    if (method === "army") setAzzuriaArmy(a => ({...a, morale:Math.max(1,(a.morale||3)-1)}));
  };

  const removeRevolt = id => setRevolts(p => p.filter(r => r.id !== id));

  // ── Paramilitary CRUD ──
  const addPm = () => {
    if (!pmForm.name.trim()) return;
    setParamilitaries(p => [...p, {id:Date.now(), ...pmForm, name:pmForm.name.trim()}]);
    setPmForm({partyId:"", name:"", strength:2, regionIdx:0, type:"paramilitary"});
    setShowPmForm(false);
  };
  const removePm  = id => setParamilitaries(p => p.filter(x => x.id !== id));
  const adjPm     = (id,d) => setParamilitaries(p => p.map(x =>
    x.id===id ? {...x, strength:Math.max(1,Math.min(5,x.strength+d))} : x));

  // ── Deploy army to region ──
  const deployArmy = (regionIdx) => {
    setAzzuriaArmy(a => {
      const deployed = [...(a.deployed||[])];
      const idx = deployed.findIndex(d=>d.regionIdx===regionIdx);
      if (idx >= 0) { deployed.splice(idx,1); } // toggle off
      else { deployed.push({regionIdx, units:1}); }
      return {...a, deployed};
    });
  };

  const activeRevolts = (revolts||[]).filter(r=>!r.suppressed);
  const crushed       = (revolts||[]).filter(r=>r.suppressed);
  const army          = azzuriaArmy || {strength:3, morale:3, deployed:[]};
  const deployedIdx   = new Set((army.deployed||[]).map(d=>d.regionIdx));

  const S_inp = {padding:"5px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px"};

  return (
    <div style={{padding:"16px 14px", maxWidth:"900px", margin:"0 auto"}}>

      {/* Sub-nav */}
      <div style={{display:"flex",gap:0,marginBottom:"20px",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"4px",overflow:"hidden"}}>
        {[["revolts","Revolts"],["army","Royal Army"],["paramilitaries","Factions"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPanel(k)}
            style={{flex:1,padding:"9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
              letterSpacing:"2px",textTransform:"uppercase",background:panel===k?"rgba(255,255,255,0.05)":"none",
              border:"none",color:panel===k?"#e8dcc8":DIM,
              borderRight:k!=="paramilitaries"?"1px solid rgba(255,255,255,0.07)":"none"}}>
            {l}
            {k==="revolts"&&activeRevolts.length>0&&<span style={{marginLeft:"6px",fontSize:"8px",color:"#c4605a",border:"1px solid rgba(200,60,60,0.4)",borderRadius:"8px",padding:"1px 5px"}}>{activeRevolts.length}</span>}
          </button>
        ))}
      </div>

      {/* ── REVOLTS PANEL ── */}
      {panel==="revolts" && (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
            <div>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:"#c4605a",textTransform:"uppercase",marginBottom:"3px"}}>Active Revolts — {activeRevolts.length}</div>
              <div style={{fontSize:"10px",color:DIM}}>Unresolved revolts raise agitation by 1 each turn until suppressed.</div>
            </div>
            <button onClick={()=>setShowRevForm(f=>!f)}
              style={{padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",
                textTransform:"uppercase",borderRadius:"4px",
                background:showRevForm?"rgba(200,60,60,0.15)":"rgba(255,255,255,0.03)",
                border:`1px solid ${showRevForm?"rgba(200,60,60,0.4)":"rgba(255,255,255,0.1)"}`,
                color:showRevForm?"#c4605a":DIM}}>
              {showRevForm?"Cancel":"+ Spawn Revolt"}
            </button>
          </div>

          {/* Revolt form */}
          {showRevForm && (
            <div style={{marginBottom:"16px",padding:"14px",background:"rgba(200,60,60,0.04)",border:"1px solid rgba(200,60,60,0.2)",borderRadius:"5px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"8px",marginBottom:"10px"}}>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Region</div>
                  <select value={revForm.regionIdx} onChange={e=>setRevForm(p=>({...p,regionIdx:Number(e.target.value)}))} style={{...S_inp,width:"100%"}}>
                    {REGIONS.map((r,i)=><option key={i} value={i}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Class</div>
                  <select value={revForm.classIdx} onChange={e=>setRevForm(p=>({...p,classIdx:Number(e.target.value)}))} style={{...S_inp,width:"100%"}}>
                    {CLASSES.map((c,i)=><option key={i} value={i}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Strength (1–6)</div>
                  <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                    <AdjBtn onClick={()=>setRevForm(p=>({...p,strength:Math.max(1,p.strength-1)}))} red>-</AdjBtn>
                    <span style={{fontSize:"16px",color:"#c4605a",flex:1,textAlign:"center"}}>{revForm.strength}</span>
                    <AdjBtn onClick={()=>setRevForm(p=>({...p,strength:Math.min(6,p.strength+1)}))}>+</AdjBtn>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Cause</div>
                  <select value={revForm.cause} onChange={e=>setRevForm(p=>({...p,cause:Number(e.target.value)}))} style={{...S_inp,width:"100%"}}>
                    {REVOLT_CAUSES.map((c,i)=><option key={i} value={i}>{c.split("—")[0].trim()}</option>)}
                  </select>
                </div>
              </div>
              <div style={{fontSize:"10px",color:DIM,fontStyle:"italic",marginBottom:"10px",padding:"6px 8px",background:"rgba(255,255,255,0.02)",borderRadius:"3px"}}>
                "{REVOLT_CAUSES[revForm.cause]}"
              </div>
              <button onClick={addRevolt} style={{padding:"6px 18px",cursor:"pointer",background:"rgba(200,60,60,0.15)",border:"1px solid rgba(200,60,60,0.4)",borderRadius:"4px",color:"#c4605a",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase"}}>
                Spawn Revolt
              </button>
            </div>
          )}

          {/* Active revolts */}
          {activeRevolts.length===0 && !showRevForm && (
            <div style={{textAlign:"center",padding:"30px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>
              No active revolts
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {activeRevolts.map(r => {
              const ph  = revoltPhase(r.strength);
              const reg = REGIONS[r.regionIdx];
              const cls = CLASSES[r.classIdx];
              const myPms = (paramilitaries||[]).filter(p=>p.regionIdx===r.regionIdx);
              const armyHere = deployedIdx.has(r.regionIdx);
              return (
                <div key={r.id} style={{padding:"12px 14px",background:ph.bg,border:`1px solid ${ph.color}44`,borderLeft:`4px solid ${ph.color}`,borderRadius:"5px"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px",flexWrap:"wrap"}}>
                        <span style={{fontSize:"13px",color:"#e8dcc8"}}>{reg}</span>
                        <span style={{fontSize:"9px",color:CLASS_COLORS[r.classIdx],border:`1px solid ${CLASS_COLORS[r.classIdx]}44`,borderRadius:"3px",padding:"1px 6px"}}>{cls}</span>
                        <span style={{fontSize:"9px",color:ph.color,border:`1px solid ${ph.color}44`,borderRadius:"3px",padding:"1px 6px",letterSpacing:"1px"}}>{ph.label}</span>
                        <span style={{fontSize:"9px",color:DIM}}>T{r.turn}</span>
                      </div>
                      <div style={{fontSize:"10px",color:DIM,fontStyle:"italic",marginBottom:"6px"}}>"{r.cause}"</div>
                      {/* Strength bar */}
                      <div style={{display:"flex",gap:"3px",marginBottom:"4px"}}>
                        {Array.from({length:6},(_,i)=>(
                          <div key={i} style={{width:"20px",height:"8px",borderRadius:"2px",background:i<r.strength?ph.color:"rgba(255,255,255,0.07)"}}/>
                        ))}
                        <span style={{fontSize:"10px",color:ph.color,marginLeft:"5px",fontWeight:"bold"}}>Str {r.strength}</span>
                      </div>
                    </div>
                    <button onClick={()=>removeRevolt(r.id)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:DIM,cursor:"pointer",fontSize:"10px",padding:"2px 7px",flexShrink:0}}>×</button>
                  </div>

                  {/* Suppression options */}
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"6px"}}>Suppression</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {armyHere && (
                      <button onClick={()=>suppress(r.id,"army")}
                        style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"1px",
                          background:"rgba(196,122,90,0.15)",border:"1px solid rgba(196,122,90,0.4)",borderRadius:"3px",color:"#c47a5a"}}>
                        ⚔ Army (−{Math.min(r.strength,army.morale||1)} str)
                      </button>
                    )}
                    {myPms.map(pm=>(
                      <button key={pm.id} onClick={()=>suppress(r.id,"pm",pm.id)}
                        style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"1px",
                          background:"rgba(155,127,186,0.12)",border:"1px solid rgba(155,127,186,0.3)",borderRadius:"3px",
                          color:pm.type==="police"?"#7ab0d0":"#9b7fba"}}>
                        {pm.type==="police"?"🔒":"🗡"} {pm.name} (−{Math.min(r.strength,pm.strength)})
                      </button>
                    ))}
                    <button onClick={()=>suppress(r.id,"police")}
                      style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"1px",
                        background:"rgba(74,154,106,0.08)",border:"1px solid rgba(74,154,106,0.25)",borderRadius:"3px",color:"#6db87a"}}>
                      Negotiate (−1 str)
                    </button>
                    {!armyHere && (
                      <button onClick={()=>deployArmy(r.regionIdx)}
                        style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"1px",
                          background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:SOFT}}>
                        Deploy Army Here
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Crushed revolts log */}
          {crushed.length>0 && (
            <div style={{marginTop:"20px"}}>
              <div style={{fontSize:"8px",color:DIM,letterSpacing:"3px",textTransform:"uppercase",marginBottom:"8px"}}>Suppressed Revolts</div>
              <div style={{display:"flex",flexDirection:"column",gap:"3px"}}>
                {crushed.map(r=>(
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 10px",background:"rgba(255,255,255,0.01)",border:"1px solid rgba(255,255,255,0.05)",borderLeft:"3px solid #6db87a",borderRadius:"3px",opacity:.7}}>
                    <span style={{fontSize:"10px",color:"#6db87a",flexShrink:0}}>✓</span>
                    <span style={{fontSize:"10px",color:SOFT,flex:1}}>{REGIONS[r.regionIdx]} — {CLASSES[r.classIdx]}</span>
                    <span style={{fontSize:"9px",color:DIM}}>T{r.turn}</span>
                    <button onClick={()=>removeRevolt(r.id)} style={{background:"none",border:"none",color:DIM,cursor:"pointer",fontSize:"10px"}}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── ROYAL ARMY PANEL ── */}
      {panel==="army" && (
        <div>
          <div style={{marginBottom:"20px",padding:"16px",background:"rgba(196,122,90,0.05)",border:"1px solid rgba(196,122,90,0.2)",borderRadius:"5px"}}>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:"#c47a5a",textTransform:"uppercase",marginBottom:"12px"}}>Royal Army of Azzuria</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:"8px",marginBottom:"14px"}}>
              {[
                {label:"Strength",key:"strength",lo:0,hi:10,color:"#c47a5a",hint:"Combat power"},
                {label:"Morale",  key:"morale",  lo:1,hi:5, color:"#c9a84c",hint:"Suppression per action"},
              ].map(s=>(
                <div key={s.key} style={{padding:"10px",background:"rgba(0,0,0,0.2)",borderRadius:"4px",textAlign:"center"}}>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"6px"}}>{s.label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:"5px",justifyContent:"center",marginBottom:"4px"}}>
                    <AdjBtn onClick={()=>adjArmy(s.key,-1,s.lo,s.hi)} red>-</AdjBtn>
                    <span style={{fontSize:"22px",color:s.color,fontFamily:"Georgia,serif",minWidth:"28px",textAlign:"center"}}>{army[s.key]||0}</span>
                    <AdjBtn onClick={()=>adjArmy(s.key,+1,s.lo,s.hi)}>+</AdjBtn>
                  </div>
                  <div style={{fontSize:"8px",color:DIM}}>{s.hint}</div>
                </div>
              ))}
            </div>

            {/* Morale bar */}
            <div style={{marginBottom:"10px"}}>
              <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px"}}>ARMY MORALE</div>
              <div style={{display:"flex",gap:"3px"}}>
                {Array.from({length:5},(_,i)=>(
                  <div key={i} style={{flex:1,height:"6px",borderRadius:"2px",background:i<(army.morale||3)?"#c9a84c":"rgba(255,255,255,0.08)"}}/>
                ))}
              </div>
            </div>

            <div style={{fontSize:"10px",color:DIM,lineHeight:"1.7"}}>
              Strength = combat power in wars. Morale = how much revolt strength is reduced per army suppression action. Deploying to suppress revolts costs 1 morale. Morale recovers by 1 each turn automatically.
            </div>
          </div>

          {/* Region deployment map */}
          <div style={{marginBottom:"8px",fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase"}}>Regional Deployment — Click to toggle</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"5px"}}>
            {REGIONS.map((r,i)=>{
              const here  = deployedIdx.has(i);
              const rData = (revolts||[]).filter(rv=>rv.regionIdx===i&&!rv.suppressed);
              return (
                <div key={r} onClick={()=>deployArmy(i)}
                  style={{padding:"8px 10px",cursor:"pointer",borderRadius:"4px",
                    background:here?"rgba(196,122,90,0.1)":"rgba(255,255,255,0.02)",
                    border:`1px solid ${here?"rgba(196,122,90,0.4)":"rgba(255,255,255,0.07)"}`,
                    transition:"all 0.15s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px"}}>
                    {here&&<span style={{fontSize:"10px"}}>⚔</span>}
                    <span style={{fontSize:"11px",color:here?"#c47a5a":"#e8dcc8"}}>{r}</span>
                  </div>
                  {rData.length>0&&<span style={{fontSize:"8px",color:"#c4605a"}}>{rData.length} revolt{rData.length>1?"s":""}</span>}
                  {here&&<div style={{fontSize:"8px",color:"#c47a5a",letterSpacing:"1px"}}>DEPLOYED</div>}
                </div>
              );
            })}
          </div>

          {/* Army morale auto-recovery note */}
          <div style={{marginTop:"14px",padding:"8px 12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"4px",fontSize:"10px",color:DIM,lineHeight:"1.7"}}>
            <strong style={{color:SOFT}}>End of Turn:</strong> Army morale recovers +1 automatically (up to max 5). Unsuppressed revolts each raise their class's agitation by +1.
          </div>
        </div>
      )}

      {/* ── PARAMILITARIES / POLICE PANEL ── */}
      {panel==="paramilitaries" && (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
            <div>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:"#9b7fba",textTransform:"uppercase",marginBottom:"3px"}}>Political Factions & Police</div>
              <div style={{fontSize:"10px",color:DIM}}>Paramilitaries are tied to parties. Police are Crown instruments. Both can suppress revolts in their region.</div>
            </div>
            <button onClick={()=>setShowPmForm(f=>!f)}
              style={{padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",
                textTransform:"uppercase",borderRadius:"4px",
                background:showPmForm?"rgba(155,127,186,0.15)":"rgba(255,255,255,0.03)",
                border:`1px solid ${showPmForm?"rgba(155,127,186,0.4)":"rgba(255,255,255,0.1)"}`,
                color:showPmForm?"#9b7fba":DIM}}>
              {showPmForm?"Cancel":"+ Add Faction"}
            </button>
          </div>

          {showPmForm && (
            <div style={{marginBottom:"16px",padding:"14px",background:"rgba(155,127,186,0.04)",border:"1px solid rgba(155,127,186,0.2)",borderRadius:"5px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"8px",marginBottom:"10px"}}>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Name</div>
                  <input value={pmForm.name} onChange={e=>setPmForm(p=>({...p,name:e.target.value}))}
                    placeholder="e.g. Fasci dei Lavoratori" style={{...S_inp,width:"100%"}}/>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Type</div>
                  <div style={{display:"flex",gap:"4px"}}>
                    {[["paramilitary","🗡 Paramilitary"],["police","🔒 Police"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setPmForm(p=>({...p,type:v}))}
                        style={{flex:1,padding:"5px",cursor:"pointer",fontSize:"9px",borderRadius:"3px",
                          background:pmForm.type===v?"rgba(155,127,186,0.2)":"rgba(255,255,255,0.02)",
                          border:`1px solid ${pmForm.type===v?"rgba(155,127,186,0.4)":"rgba(255,255,255,0.08)"}`,
                          color:pmForm.type===v?"#9b7fba":DIM}}>{l}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Party</div>
                  <select value={pmForm.partyId} onChange={e=>setPmForm(p=>({...p,partyId:e.target.value}))} style={{...S_inp,width:"100%"}}>
                    <option value="">Crown / Independent</option>
                    {candidates.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Region</div>
                  <select value={pmForm.regionIdx} onChange={e=>setPmForm(p=>({...p,regionIdx:Number(e.target.value)}))} style={{...S_inp,width:"100%"}}>
                    {REGIONS.map((r,i)=><option key={i} value={i}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",marginBottom:"4px",textTransform:"uppercase"}}>Strength (1–5)</div>
                  <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                    <AdjBtn onClick={()=>setPmForm(p=>({...p,strength:Math.max(1,p.strength-1)}))} red>-</AdjBtn>
                    <span style={{fontSize:"16px",color:"#9b7fba",flex:1,textAlign:"center"}}>{pmForm.strength}</span>
                    <AdjBtn onClick={()=>setPmForm(p=>({...p,strength:Math.min(5,p.strength+1)}))}>+</AdjBtn>
                  </div>
                </div>
              </div>
              <button onClick={addPm} disabled={!pmForm.name.trim()}
                style={{padding:"6px 18px",cursor:"pointer",background:"rgba(155,127,186,0.15)",border:"1px solid rgba(155,127,186,0.4)",
                  borderRadius:"4px",color:"#9b7fba",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                  opacity:!pmForm.name.trim()?.4:1}}>
                Add Faction
              </button>
            </div>
          )}

          {(paramilitaries||[]).length===0 && !showPmForm && (
            <div style={{textAlign:"center",padding:"30px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>
              No factions registered
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            {(paramilitaries||[]).map(pm=>{
              const party = pm.partyId ? candidates.find(c=>String(c.id)===String(pm.partyId)) : null;
              const isPolice = pm.type==="police";
              const acol = isPolice?"#7ab0d0":"#9b7fba";
              const activeHere = activeRevolts.filter(r=>r.regionIdx===pm.regionIdx);
              return (
                <div key={pm.id} style={{padding:"10px 14px",background:"rgba(255,255,255,0.02)",
                  border:`1px solid ${acol}33`,borderLeft:`3px solid ${acol}`,borderRadius:"4px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"10px",color:acol}}>{isPolice?"🔒":"🗡"}</span>
                    <span style={{fontSize:"13px",color:"#e8dcc8",flex:1}}>{pm.name}</span>
                    {party&&<div style={{display:"flex",alignItems:"center",gap:"4px"}}><div style={{width:6,height:6,borderRadius:"50%",background:party.color}}/><span style={{fontSize:"9px",color:party.color}}>{party.name}</span></div>}
                    <span style={{fontSize:"9px",color:DIM,border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px",padding:"1px 6px"}}>{REGIONS[pm.regionIdx]}</span>
                    <div style={{display:"flex",gap:"3px",alignItems:"center"}}>
                      <AdjBtn onClick={()=>adjPm(pm.id,-1)} red>-</AdjBtn>
                      <div style={{display:"flex",gap:"2px"}}>
                        {Array.from({length:5},(_,i)=>(
                          <div key={i} style={{width:"8px",height:"8px",borderRadius:"2px",background:i<pm.strength?acol:"rgba(255,255,255,0.08)"}}/>
                        ))}
                      </div>
                      <AdjBtn onClick={()=>adjPm(pm.id,+1)}>+</AdjBtn>
                    </div>
                    <button onClick={()=>removePm(pm.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"10px",padding:"2px 6px"}}>×</button>
                  </div>
                  {activeHere.length>0&&(
                    <div style={{marginTop:"6px",fontSize:"9px",color:"#c4605a"}}>
                      ⚠ {activeHere.length} revolt{activeHere.length>1?"s":""} active in this region — can suppress from Revolts tab
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Design note */}
          <div style={{marginTop:"20px",padding:"12px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"4px",fontSize:"10px",color:DIM,lineHeight:"1.8"}}>
            <strong style={{color:SOFT}}>Design:</strong> Paramilitary factions belong to parties and can be deployed to suppress revolts or intimidate rivals. Military police are Crown instruments — effective but politically costly if overused. Strength depletes with use and recovers by 1 per turn.
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────

function App() {
  const [loaded,       setLoaded]       = useState(false);
  const [tab,          setTab]          = useState(9);
  const [data,         setData]         = useState(INITIAL_DATA.map(r => [...r]));
  const [candidates,   setCandidates]   = useState([{id:1,name:"Candidate A",color:"#7a9cc4",laws:[],actions:[],actionsLeft:BASE_ACTIONS}]);
  const [activeCand,   setActiveCand]   = useState(1);
  const [agitation,    setAgitation]    = useState(Array(8).fill(0));
  const [turn,         setTurn]         = useState(1);
  const [senateHolder, setSenateHolder] = useState(null);
  const [government,     setGovernment]     = useState({pm:null,interior:null,finance:null,war:null,church:null,justice:null,foreign:null,education:null,decrees:[],coalition:null});
  const [pendingParties, setPendingParties] = useState([]);
  const [nations,        setNations]        = useState([]);
  const [pendingNations, setPendingNations] = useState([]);
  const [wars,           setWars]           = useState([]);  // [{id, attId, defId, score, turns, attMilLost, defMilLost, battleLog}]
  const [deals,          setDeals]          = useState([]);  // [{id, aId, bId, turnsLeft}]
  const [gmEvents,       setGmEvents]       = useState([]);  // [{id, name, desc, patches:{nationId:{stat:delta}}}] – fires next turn
  const [randomEventDeck,setRandomEventDeck]= useState([]);  // same shape but repeatable random deck
  const [electionHistory, setElectionHistory] = useState([]); // [{id,season,year,turn,type,ranked,seatTotals,winner,hasMajority}]
  const [coalitions,      setCoalitions]      = useState([]); // [{id, name, color, memberIds:[]}]
  const [turnLog,        setTurnLog]        = useState([]);  // [{turn, season, year, events:[string]}]
  const [regionDescs,  setRegionDescs]  = useState(REGION_DATA.map(r => r.desc));
  const [revolts,      setRevolts]      = useState([]);
  const [paramilitaries,setParamilitaries]=useState([]);
  const [azzuriaArmy,  setAzzuriaArmy]  = useState({strength:3,morale:3,deployed:[]});
  const [syncStatus,   setSyncStatus]   = useState("idle");
  const [binId,        setBinId]        = useState(typeof JSONBIN_BIN_ID !== "undefined" ? JSONBIN_BIN_ID : "");
  const saveTimer = useRef(null);
  const isFirstRender = useRef(true);


  // Load saved state on mount
  useEffect(() => {
    (async () => {
      try {
        // Try Claude shared storage first, fall back to localStorage
        let s = null;
        // Try localStorage first (fastest)
        const raw = localStorage.getItem("azzuria-gamestate");
        if (raw) { try { s = JSON.parse(raw); } catch(e) {} }
        // If nothing local, try JSONbin
        if (!s) { try { s = await jsonbinLoad(); } catch(e) {} }
        // Also try Claude storage
        if (!s) { try { const r = await window.storage.get("azzuria-gamestate",true); if(r&&r.value) s=JSON.parse(r.value); } catch(e) {} }
        if (s) {
          if (s.data)       setData(s.data);
          if (s.candidates) { setCandidates(s.candidates); setActiveCand(s.candidates[0]?.id ?? 1); }
          if (s.agitation)  setAgitation(s.agitation);
          if (s.turn)       setTurn(s.turn);
          if (s.senateHolder !== undefined) setSenateHolder(s.senateHolder);
          if (s.government)       setGovernment(s.government);
          if (s.pendingParties)   setPendingParties(s.pendingParties);
          if (s.nations)          setNations(s.nations);
          if (s.pendingNations)   setPendingNations(s.pendingNations);
          if (s.wars)             setWars(s.wars);
          if (s.deals)            setDeals(s.deals);
          if (s.randomEventDeck)  setRandomEventDeck(s.randomEventDeck);
          if (s.electionHistory)  setElectionHistory(s.electionHistory);
          if (s.coalitions)       setCoalitions(s.coalitions);
          if (s.regionDescs)     setRegionDescs(s.regionDescs);
          if (s.revolts)        setRevolts(s.revolts);
          if (s.paramilitaries) setParamilitaries(s.paramilitaries);
          if (s.azzuriaArmy)    setAzzuriaArmy(s.azzuriaArmy);
        }
      } catch(e) { /* no saved state, use defaults */ }
      setLoaded(true);
    })();
  }, []);

  // Poll JSONbin for new pending parties every 20s
  useEffect(() => {
    if (!loaded) return;
    const t = setInterval(async () => {
      try {
        const res  = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
          headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
        });
        const d = await res.json();
        if (d.record && d.record.pendingParties) {
          // Filter out any party that's already been approved (exists in candidates)
          const approvedIds = new Set((candidates||[]).map(c=>c.id));
          setPendingParties(d.record.pendingParties.filter(p=>!approvedIds.has(p.id)));
        }
      } catch(e) {}
    }, 10000);
    return () => clearInterval(t);
  }, [loaded]);

  // Auto-save whenever tracked state changes
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSyncStatus("saving");
      try {
        // Read electionHistory fresh from localStorage so we never overwrite
        // a result that handleSaveElection already wrote synchronously
        let savedHistory = electionHistory;
        try {
          const raw = localStorage.getItem("azzuria-gamestate");
          if (raw) {
            const parsed = JSON.parse(raw);
            // Use whichever is longer — the one with more entries is more up to date
            if ((parsed.electionHistory||[]).length > (electionHistory||[]).length) {
              savedHistory = parsed.electionHistory;
            }
          }
        } catch(e) {}

        let livePending = pendingParties;
        if (window.location.protocol !== "file:") {
          try {
            const pr = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
              headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
            });
            const pd = await pr.json();
            if (pd.record && Array.isArray(pd.record.pendingParties)) {
              const localIds    = new Set(pendingParties.map(p => p.id));
              const approvedIds = new Set((candidates||[]).map(c => c.id));
              const merged      = [...pendingParties, ...pd.record.pendingParties.filter(p => !localIds.has(p.id) && !approvedIds.has(p.id))];
              livePending = merged;
              if (merged.length !== pendingParties.length) setPendingParties(merged);
            }
            if (pd.record && Array.isArray(pd.record.pendingNations)) {
              const localNIds = new Set(pendingNations.map(n => n.id));
              const mergedN   = [...pendingNations, ...pd.record.pendingNations.filter(n => !localNIds.has(n.id))];
              if (mergedN.length !== pendingNations.length) setPendingNations(mergedN);
            }
          } catch(e) {}
        }
        const state = { turn, agitation, candidates, data, senateHolder, government,
          pendingParties: livePending, nations, pendingNations,
          wars, deals, randomEventDeck, electionHistory: savedHistory,
          coalitions, regionDescs, revolts, paramilitaries, azzuriaArmy, savedAt: Date.now() };
        const json = JSON.stringify(state);
        localStorage.setItem("azzuria-gamestate", json);
        if (window.location.protocol !== "file:") {
          try { await jsonbinSave(state); setBinId(JSONBIN_BIN_ID); } catch(e) {}
        }
        try { await window.storage.set("azzuria-gamestate", json, true); } catch(e) {}
        setSyncStatus("saved");
        setTimeout(() => setSyncStatus("idle"), 2000);
      } catch(e) { setSyncStatus("error"); }
    }, 800);
  }, [turn, agitation, candidates, data, loaded, nations, wars, deals, randomEventDeck, coalitions, regionDescs, revolts, paramilitaries, azzuriaArmy]);

  const syncDot = {
    idle:   { color:"#5a4a30", label:"" },
    saving: { color:"#c9a84c", label:"Saving..." },
    saved:  { color:"#6db87a", label:"Saved" },
    error:  { color:"#c4605a", label:"Save error" },
  }[syncStatus];

  const natUnrest = calcNatUnrest(agitation);

  // handleSaveElection: called by ElectionTab with a finished entry object.
  // Writes to localStorage synchronously — no React state async, no effects, no timers.
  const handleSaveElection = (entry) => {
    const newHistory = [entry, ...(electionHistory||[]).slice(0, 19)];
    // 1. Update React state so the UI reflects it
    setElectionHistory(newHistory);
    // 2. Write to localStorage right now, synchronously, before anything else runs
    try {
      const blob = JSON.parse(localStorage.getItem("azzuria-gamestate") || "{}");
      blob.electionHistory = newHistory;
      blob.savedAt = Date.now();
      localStorage.setItem("azzuria-gamestate", JSON.stringify(blob));
    } catch(e) { console.error("Election localStorage save failed:", e); }
    // 3. JSONbin in background — fire and forget
    if (window.location.protocol !== "file:") {
      fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
        headers: {"X-Access-Key": JSONBIN_ACCESS_KEY, "Cache-Control": "no-cache"},
        cache: "no-store",
      }).then(r => r.json()).then(pd => {
        const merged = {...(pd.record || {}), electionHistory: newHistory, savedAt: Date.now()};
        return fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID, {
          method: "PUT",
          headers: {"Content-Type": "application/json", "X-Access-Key": JSONBIN_ACCESS_KEY},
          body: JSON.stringify(merged),
        });
      }).catch(() => {});
    }
  };

  const handleDeleteElection = (electionId) => {
    const newHistory = (electionHistory||[]).filter(e => e.id !== electionId);
    setElectionHistory(newHistory);
    try {
      const blob = JSON.parse(localStorage.getItem("azzuria-gamestate") || "{}");
      blob.electionHistory = newHistory;
      blob.savedAt = Date.now();
      localStorage.setItem("azzuria-gamestate", JSON.stringify(blob));
    } catch(e) { console.error("Election localStorage delete failed:", e); }
    if (window.location.protocol !== "file:") {
      fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
        headers: {"X-Access-Key": JSONBIN_ACCESS_KEY, "Cache-Control": "no-cache"},
        cache: "no-store",
      }).then(r => r.json()).then(pd => {
        const merged = {...(pd.record || {}), electionHistory: newHistory, savedAt: Date.now()};
        return fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID, {
          method: "PUT",
          headers: {"Content-Type": "application/json", "X-Access-Key": JSONBIN_ACCESS_KEY},
          body: JSON.stringify(merged),
        });
      }).catch(() => {});
    }
  };

  if (!loaded) return (
    <div style={{...PAGE, display:"flex", alignItems:"center", justifyContent:"center"}}>
      <div style={{fontSize:"10px", letterSpacing:"6px", color:"#5a4a30", textTransform:"uppercase"}}>Loading saved state...</div>
    </div>
  );

  return (
    <div style={PAGE}>
      <AppNav
        active={tab} onChange={setTab}
        turn={turn} natUnrest={natUnrest} agitation={agitation} candidates={candidates}
        syncDot={syncDot}
      />
      {binId && (
        <div onClick={() => { navigator.clipboard?.writeText(binId); alert("Bin ID copied: " + binId); }}
          style={{position:"fixed",bottom:"70px",left:"10px",zIndex:150,cursor:"pointer",
            padding:"4px 9px",background:"rgba(20,16,10,0.92)",border:"1px solid rgba(155,127,186,0.3)",
            borderRadius:"12px",fontSize:"8px",color:"#9b7fba",letterSpacing:"1px",
            textTransform:"uppercase",backdropFilter:"blur(6px)",
            // Push above mobile tab bar on narrow screens
            bottom:"clamp(14px,calc(env(safe-area-inset-bottom,0px) + 62px),80px)"}}>
          📋 BIN
        </div>
      )}
      {/* Index: 9=Home 0=Turn 1=Parties 2=Candidates 3=Regions 4=Influence 5=Election 6=Laws 7=Government 8=Nations */}
      {tab===9 && <HomeTab turn={turn} natUnrest={natUnrest} agitation={agitation} candidates={candidates} data={data} government={government} nations={nations} wars={wars} deals={deals} electionHistory={electionHistory} senateHolder={senateHolder} coalitions={coalitions}/>}
      {tab===0 && <GameStateTab agitation={agitation} setAgitation={setAgitation} natUnrest={natUnrest} turn={turn} setTurn={setTurn} candidates={candidates} setCandidates={setCandidates} senateHolder={senateHolder} nations={nations} setNations={setNations} government={government} setGovernment={setGovernment} setData={setData} wars={wars} setWars={setWars} deals={deals} setDeals={setDeals} gmEvents={gmEvents} setGmEvents={setGmEvents} randomEventDeck={randomEventDeck} turnLog={turnLog} setTurnLog={setTurnLog} coalitions={coalitions} revolts={revolts} setRevolts={setRevolts} setAzzuriaArmy={setAzzuriaArmy} setParamilitaries={setParamilitaries}/>}
      {tab===1 && <PartyRegistry candidates={candidates} setCandidates={setCandidates} data={data} agitation={agitation} natUnrest={natUnrest} government={government} turn={turn} coalitions={coalitions} setCoalitions={setCoalitions} electionHistory={electionHistory}/>}
      {tab===2 && <CandidatesTab data={data} setData={setData} candidates={candidates} setCandidates={setCandidates} activeCand={activeCand} setActiveCand={setActiveCand} agitation={agitation} setAgitation={setAgitation} natUnrest={natUnrest} tariffs={government.tariffs||0} turn={turn} pendingParties={pendingParties} setPendingParties={setPendingParties}/>}
      {tab===3 && <RegionsTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} regionDescs={regionDescs} setRegionDescs={setRegionDescs} tariffs={government.tariffs||0} turn={turn}/>}
      {tab===4 && <InfluenceTab data={data} setData={setData}/>}
      {tab===5 && <ElectionTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} tariffs={government.tariffs||0} turn={turn} senateHolder={senateHolder} setSenateHolder={setSenateHolder} onSaveElection={handleSaveElection} onDeleteElection={handleDeleteElection} electionHistory={electionHistory} coalitions={coalitions}/>}
      {tab===6 && <LawRegistryTab candidates={candidates} government={government}/>}
      {tab===7 && <GovernmentTab candidates={candidates} government={government} setGovernment={setGovernment} setData={setData} turn={turn} agitation={agitation} setAgitation={setAgitation} nations={nations} setNations={setNations} wars={wars} setWars={setWars} deals={deals} setDeals={setDeals}/>}
      {tab===8 && <NationsTab nations={nations} setNations={setNations} pendingNations={pendingNations} setPendingNations={setPendingNations} wars={wars} setWars={setWars} deals={deals} setDeals={setDeals} gmEvents={gmEvents} setGmEvents={setGmEvents} randomEventDeck={randomEventDeck} setRandomEventDeck={setRandomEventDeck} turnLog={turnLog}/>}
      {tab===10 && <MilitaryTab revolts={revolts} setRevolts={setRevolts} paramilitaries={paramilitaries} setParamilitaries={setParamilitaries} azzuriaArmy={azzuriaArmy} setAzzuriaArmy={setAzzuriaArmy} agitation={agitation} setAgitation={setAgitation} natUnrest={natUnrest} candidates={candidates} government={government} turn={turn}/>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
