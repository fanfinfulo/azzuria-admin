// ── LAW REGISTRY ─────────────────────────────────────────────────────────────

function LawRegistryTab({candidates, government}) {
  const [filter, setFilter] = useState("all");
  const CROWN = {id:"crown", name:"The Crown", color:"#9b7fba"};
  const passedDecrees = (government?.decrees||[])
    .filter(d => d.status==="passed")
    .map(d => ({...d, candidate:CROWN, isDecree:true}));
  const allLaws  = [
    ...candidates.flatMap(c => c.laws.map(law => ({...law, candidate:c}))),
    ...passedDecrees,
  ].sort((a,b) => (b.id||0)-(a.id||0));
  const filtered = filter==="all" ? allLaws
    : filter==="crown" ? allLaws.filter(l=>l.isDecree)
    : allLaws.filter(l => !l.isDecree && l.candidate.id===Number(filter));
  const typeInfo = effects => {
    const b = effects.filter(e=>e.type==="bonus").length, m = effects.filter(e=>e.type==="malus").length;
    if (b>0&&m>0) return {label:"Reform",      bg:"rgba(160,140,80,0.15)", border:"rgba(160,140,80,0.4)", color:"#c4a96b"};
    if (b>0)      return {label:"Progressive", bg:"rgba(80,160,100,0.12)", border:"rgba(80,160,100,0.35)",color:"#80c890"};
    return               {label:"Restrictive", bg:"rgba(200,80,60,0.12)",  border:"rgba(200,80,60,0.35)", color:"#e08060"};
  };

  return (
    <div style={{padding:"28px 24px"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",justifyContent:"center",marginBottom:"24px",alignItems:"center"}}>
        <span style={{fontSize:"10px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginRight:"8px"}}>Filter</span>
        <button onClick={()=>setFilter("all")} style={{padding:"6px 13px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",background:filter==="all"?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)",border:`1px solid ${filter==="all"?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.08)"}`,color:filter==="all"?GOLD:SOFT}}>All</button>
        {candidates.map(c => (
          <button key={c.id} onClick={()=>setFilter(String(c.id))} style={{padding:"6px 13px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",background:filter===String(c.id)?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.03)",border:`1px solid ${filter===String(c.id)?c.color+"88":"rgba(255,255,255,0.08)"}`,color:filter===String(c.id)?c.color:SOFT}}>
            <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",background:c.color,marginRight:"6px",verticalAlign:"middle"}}/>{c.name}
          </button>
        ))}
        {passedDecrees.length > 0 && (
          <button onClick={()=>setFilter("crown")} style={{padding:"6px 13px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",background:filter==="crown"?"rgba(155,127,186,0.15)":"rgba(255,255,255,0.03)",border:`1px solid ${filter==="crown"?"rgba(155,127,186,0.5)":"rgba(255,255,255,0.08)"}`,color:filter==="crown"?"#9b7fba":SOFT}}>
            👑 Crown
          </button>
        )}
      </div>
      <div style={{textAlign:"center",fontSize:"10px",color:DIM,letterSpacing:"3px",textTransform:"uppercase",marginBottom:"20px"}}>{filtered.length} {filtered.length===1?"law":"laws"} on record</div>
      {filtered.length === 0 ? (
        <div style={{textAlign:"center",padding:"40px",color:"#5a4a30",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.06)",borderRadius:"6px",maxWidth:"560px",margin:"0 auto"}}>No laws enacted yet</div>
      ) : (
        <div style={{maxWidth:"780px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
          {filtered.map((law,idx) => {
            const ti = typeInfo(law.effects);
            return (
              <div key={law.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderLeft:`3px solid ${law.candidate.color}`,borderRadius:"4px",padding:"18px 22px"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:"12px",marginBottom:"8px",flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:"140px"}}>
                    <div style={{fontSize:"15px",color:"#e8dcc8",marginBottom:"4px"}}>{law.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:"5px",fontSize:"10px",color:law.candidate.color,letterSpacing:"2px",textTransform:"uppercase"}}>
                        <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",background:law.candidate.color}}/>{law.candidate.name}
                      </span>
                      <span style={{fontSize:"9px",padding:"2px 7px",borderRadius:"3px",background:ti.bg,border:`1px solid ${ti.border}`,color:ti.color,letterSpacing:"1px"}}>{ti.label}</span>
                    </div>
                  </div>
                  <div style={{fontSize:"10px",color:DIM,opacity:.5}}>#{idx+1}</div>
                </div>
                {law.desc ? (
                  <div style={{fontSize:"12px",color:SOFT,lineHeight:"1.7",fontStyle:"italic",marginBottom:"12px",paddingLeft:"10px",borderLeft:"1px solid rgba(255,255,255,0.07)"}}>{law.desc}</div>
                ) : (
                  <div style={{fontSize:"10px",color:"#5a4a30",fontStyle:"italic",marginBottom:"12px"}}>No description.</div>
                )}
                <div style={{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"flex-start"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px",flex:2}}>
                    {law.effects.map(({classIdx,type}) => (
                      <span key={classIdx} style={{fontSize:"9px",padding:"2px 8px",borderRadius:"3px",
                        background:type==="bonus"?"rgba(80,160,100,0.12)":"rgba(200,80,60,0.12)",
                        border:`1px solid ${type==="bonus"?"rgba(80,160,100,0.3)":"rgba(200,80,60,0.3)"}`,
                        color:type==="bonus"?"#80c890":"#e08060",
                      }}>{type==="bonus"?"+":"-"} {CLASSES[classIdx]}</span>
                    ))}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px",flex:1}}>
                    {law.effects.map(({classIdx,type},ii) => {
                      const d = type==="bonus"?-1:+2;
                      return (
                        <span key={ii} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"3px",
                          background:d>0?"rgba(200,80,60,0.08)":"rgba(80,160,100,0.08)",
                          border:`1px solid ${d>0?"rgba(200,80,60,0.2)":"rgba(80,160,100,0.2)"}`,
                          color:d>0?"#c47a5a":"#6db87a",
                        }}>{d>0?"+"+d:""+d} agit {CLASSES[classIdx]}</span>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}



// ── GOVERNMENT TAB ────────────────────────────────────────────────────────────

const MINISTRIES = [
  { id:"pm",       title:"Prime Minister",         desc:"Heads the government. +1 action per season." },
  { id:"interior", title:"Interior Minister",      desc:"Oversees internal order and administration." },
  { id:"finance",  title:"Finance Minister",       desc:"Controls the treasury and economic policy." },
  { id:"war",      title:"War Minister",           desc:"Commands the armed forces." },
  { id:"church",   title:"Church Affairs",         desc:"Manages relations with the Church." },
  { id:"justice",  title:"Justice Minister",       desc:"Oversees courts and the legal system." },
  { id:"foreign",  title:"Foreign Affairs",        desc:"Manages diplomatic relations with foreign powers." },
  { id:"education",title:"Education Minister",     desc:"Oversees public instruction and universities." },
];

function GovernmentTab({candidates, government, setGovernment, setData, turn}) {
  const season = getSeason(turn), year = getYear(turn);
  const [editMinistry, setEditMinistry] = useState(null); // ministry id being assigned
  const [showDecreeForm, setShowDecreeForm] = useState(false);
  const [decreeName,  setDecreeName]  = useState("");
  const [decreeDesc,  setDecreeDesc]  = useState("");
  const [decreeFx,    setDecreeFx]    = useState(CLASSES.map(() => "neutral"));
  const [decreeRegion, setDecreeRegion] = useState("all");
  const [vetoed,      setVetoed]      = useState(null); // null | "passed" | "vetoed"

  const pm = government.pm ? candidates.find(c => c.id === government.pm) : null;

  const assignMinistry = (ministryId, candId) => {
    setGovernment(g => ({...g, [ministryId]: candId || null}));
    setEditMinistry(null);
  };

  const addDecree = () => {
    if (!decreeName.trim()) return;
    const effects = decreeFx.map((e,i) => ({classIdx:i,type:e})).filter(e => e.type !== "neutral");
    const decree  = {
      id: Date.now(),
      name: decreeName.trim(),
      desc: decreeDesc.trim(),
      effects,
      region: decreeRegion,
      status: "pending",
      turn,
    };
    setGovernment(g => ({...g, decrees:[...(g.decrees||[]), decree]}));
    setDecreeName(""); setDecreeDesc(""); setDecreeFx(CLASSES.map(()=>"neutral")); setDecreeRegion("all"); setShowDecreeForm(false);
  };

  const resolveDecree = (did, resolution) => {
    const decree = (government.decrees||[]).find(d => d.id===did);
    if (resolution==="passed" && decree && decree.effects.length) {
      setData(prev => {
        const next = prev.map(row => [...row]);
        decree.effects.forEach(({classIdx, type}) => {
          const delta = type==="bonus" ? +1 : -1;
          if (decree.region === "all") {
            next[classIdx] = next[classIdx].map(v => Math.max(1, Math.min(10, v + delta)));
          } else {
            next[classIdx][decree.region] = Math.max(1, Math.min(10, next[classIdx][decree.region] + delta));
          }
        });
        return next;
      });
    }
    setGovernment(g => ({
      ...g,
      decrees: (g.decrees||[]).map(d => d.id===did ? {...d, status:resolution} : d),
    }));
  };

  const removeDecree = did => setGovernment(g => ({...g, decrees:(g.decrees||[]).filter(d=>d.id!==did)}));

  const pendingDecrees  = (government.decrees||[]).filter(d => d.status==="pending");
  const resolvedDecrees = (government.decrees||[]).filter(d => d.status!=="pending");

  return (
    <div style={{maxWidth:"720px",margin:"0 auto",padding:"24px 16px"}}>

      {/* ── header ── */}
      <div style={{textAlign:"center",marginBottom:"28px"}}>
        <div style={{fontSize:"9px",letterSpacing:"6px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Royal Government</div>
        <div style={{fontSize:"22px",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase"}}>Kingdom of Azzuria</div>
        <div style={{fontSize:"10px",color:GOLD,letterSpacing:"3px",marginTop:"4px"}}>{season} {year}</div>
        <div style={{width:"60px",height:"1px",background:"linear-gradient(to right,transparent,"+GOLD+",transparent)",margin:"12px auto 0"}}/>
      </div>

      {/* ── cabinet ── */}
      <div style={{marginBottom:"32px"}}>
        <div style={{fontSize:"9px",letterSpacing:"5px",color:DIM,textTransform:"uppercase",marginBottom:"14px"}}>Cabinet</div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
          {MINISTRIES.map(m => {
            const holder = government[m.id] ? candidates.find(c=>c.id===government[m.id]) : null;
            const isEditing = editMinistry === m.id;
            const isPM = m.id === "pm";
            return (
              <div key={m.id} style={{
                padding:"10px 14px",
                background: holder ? "rgba(255,255,255,0.025)" : "rgba(255,255,255,0.01)",
                border:`1px solid ${holder?(isPM?"rgba(201,168,76,0.3)":holder.color+"33"):"rgba(255,255,255,0.06)"}`,
                borderLeft: holder ? `3px solid ${isPM?GOLD:holder.color}` : "3px solid rgba(255,255,255,0.08)",
                borderRadius:"5px",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px"}}>
                      {isPM && <span style={{fontSize:"9px",color:GOLD}}>👑</span>}
                      <span style={{fontSize:"11px",color:"#e8dcc8",letterSpacing:"1px"}}>{m.title}</span>
                      {isPM && holder && <span style={{fontSize:"8px",color:GOLD,border:"1px solid rgba(201,168,76,0.3)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>+1 ACTION</span>}
                    </div>
                    <div style={{fontSize:"9px",color:DIM}}>{m.desc}</div>
                  </div>
                  {holder ? (
                    <div style={{display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
                      <div style={{width:"7px",height:"7px",borderRadius:"50%",background:holder.color}}/>
                      <span style={{fontSize:"10px",color:holder.color}}>{holder.name}</span>
                      <button onClick={()=>setEditMinistry(isEditing?null:m.id)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:SOFT,cursor:"pointer",fontSize:"9px",padding:"2px 6px",fontFamily:"Georgia,serif"}}>✎</button>
                      <button onClick={()=>assignMinistry(m.id,null)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"9px",padding:"2px 6px",fontFamily:"Georgia,serif"}}>×</button>
                    </div>
                  ) : (
                    <button onClick={()=>setEditMinistry(isEditing?null:m.id)} style={{
                      padding:"5px 12px",background:"rgba(255,255,255,0.03)",border:"1px dashed rgba(255,255,255,0.12)",
                      borderRadius:"4px",color:DIM,cursor:"pointer",fontSize:"9px",fontFamily:"Georgia,serif",letterSpacing:"1px",flexShrink:0,
                    }}>Appoint</button>
                  )}
                </div>
                {/* candidate picker */}
                {isEditing && (
                  <div style={{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"5px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                    {candidates.map(c => (
                      <button key={c.id} onClick={()=>assignMinistry(m.id,c.id)} style={{
                        padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"1px",
                        background:government[m.id]===c.id?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",
                        border:`1px solid ${government[m.id]===c.id?c.color+"66":"rgba(255,255,255,0.1)"}`,
                        borderRadius:"4px",color:c.color,
                      }}>{c.name}</button>
                    ))}
                    <button onClick={()=>assignMinistry(m.id,null)} style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",background:"transparent",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"4px",color:"#c4605a",letterSpacing:"1px"}}>Vacate</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── royal decrees ── */}
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
          <div style={{fontSize:"9px",letterSpacing:"5px",color:DIM,textTransform:"uppercase"}}>Royal Decrees</div>
          <button onClick={()=>setShowDecreeForm(f=>!f)} style={{
            padding:"5px 12px",background:showDecreeForm?"rgba(155,127,186,0.1)":"rgba(255,255,255,0.03)",
            border:`1px solid ${showDecreeForm?"rgba(155,127,186,0.4)":"rgba(255,255,255,0.1)"}`,
            borderRadius:"4px",color:showDecreeForm?"#9b7fba":SOFT,cursor:"pointer",fontSize:"9px",
            fontFamily:"Georgia,serif",letterSpacing:"2px",textTransform:"uppercase",
          }}>{showDecreeForm?"Cancel":"+ Issue Decree"}</button>
        </div>

        {/* decree form */}
        {showDecreeForm && (
          <div style={{background:"rgba(155,127,186,0.04)",border:"1px solid rgba(155,127,186,0.2)",borderRadius:"6px",padding:"16px",marginBottom:"14px"}}>
            <input value={decreeName} onChange={e=>setDecreeName(e.target.value)}
              placeholder="Decree name..." style={{...INPUT,marginBottom:"8px"}}/>
            <textarea value={decreeDesc} onChange={e=>setDecreeDesc(e.target.value)}
              placeholder="Description (optional)" rows={2}
              style={{...INPUT,color:SOFT,fontSize:"12px",marginBottom:"12px",resize:"vertical",lineHeight:"1.5"}}></textarea>

            {/* region scope */}
            <div style={{marginBottom:"12px"}}>
              <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>Scope</div>
              <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                <button onClick={()=>setDecreeRegion("all")} style={{
                  padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",borderRadius:"3px",
                  background:decreeRegion==="all"?"rgba(201,168,76,0.15)":"transparent",
                  border:`1px solid ${decreeRegion==="all"?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.08)"}`,
                  color:decreeRegion==="all"?GOLD:SOFT,
                }}>National</button>
                {REGIONS.map((r,i) => (
                  <button key={r} onClick={()=>setDecreeRegion(i)} style={{
                    padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",borderRadius:"3px",
                    background:decreeRegion===i?"rgba(155,127,186,0.15)":"transparent",
                    border:`1px solid ${decreeRegion===i?"rgba(155,127,186,0.5)":"rgba(255,255,255,0.06)"}`,
                    color:decreeRegion===i?"#9b7fba":DIM,
                  }}>{r}</button>
                ))}
              </div>
            </div>

            {/* class effects */}
            <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Class Effects</div>
            <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"12px"}}>
              {CLASSES.map((cls,i) => {
                const fx = decreeFx[i];
                return (
                  <div key={cls} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",background:"rgba(255,255,255,0.015)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"4px"}}>
                    <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0}}/>
                    <span style={{fontSize:"10px",color:"#b0a080",width:"120px",flexShrink:0}}>{cls}</span>
                    <div style={{display:"flex",gap:"2px",flexShrink:0}}>
                      {["bonus","neutral","malus"].map(type => {
                        const isA = fx===type;
                        const col = type==="bonus"?"#6db87a":type==="malus"?"#c4605a":SOFT;
                        const lbl = type==="bonus"?"Y":type==="malus"?"N":"–";
                        return (
                          <button key={type} onClick={()=>setDecreeFx(p=>{const n=[...p];n[i]=type;return n;})} style={{
                            width:"24px",height:"24px",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif",padding:0,borderRadius:"3px",
                            background:isA?col+"28":"transparent",
                            border:`1px solid ${isA?col:"rgba(255,255,255,0.08)"}`,
                            color:isA?col:SOFT,
                          }}>{lbl}</button>
                        );
                      })}
                    </div>
                    {fx!=="neutral" && (
                      <span style={{fontSize:"8px",padding:"1px 5px",borderRadius:"3px",
                        background:fx==="bonus"?"rgba(80,160,100,0.12)":"rgba(200,80,60,0.12)",
                        border:`1px solid ${fx==="bonus"?"rgba(80,160,100,0.3)":"rgba(200,80,60,0.3)"}`,
                        color:fx==="bonus"?"#6db87a":"#c4605a"}}>inf {fx==="bonus"?"+1":"−1"}</span>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:"9px",color:DIM}}>
                {decreeRegion==="all" ? "Affects all regions" : "Affects " + REGIONS[decreeRegion] + " only"}
              </span>
              <button onClick={addDecree} style={{padding:"6px 18px",background:"rgba(155,127,186,0.15)",border:"1px solid rgba(155,127,186,0.4)",borderRadius:"4px",color:"#9b7fba",cursor:"pointer",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif"}}>Issue</button>
            </div>
          </div>
        )}

        {/* pending decrees */}
        {pendingDecrees.length > 0 && (
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"8px",letterSpacing:"3px",color:"#c9a84c",textTransform:"uppercase",marginBottom:"8px"}}>Awaiting Cabinet Response</div>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {pendingDecrees.map(decree => {
                const relevantMinistries = MINISTRIES.filter(m => m.id!=="pm" && government[m.id]);
                return (
                  <div key={decree.id} style={{padding:"12px 14px",background:"rgba(201,168,76,0.04)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"5px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"8px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"12px",color:"#e8dcc8",marginBottom:"2px"}}>{decree.name}</div>
                        {decree.desc && <div style={{fontSize:"10px",color:SOFT,fontStyle:"italic",marginBottom:"4px"}}>{decree.desc}</div>}
                        <div style={{fontSize:"8px",color:DIM,letterSpacing:"1px"}}>{decree.region==="all"?"National decree":"Regional: "+REGIONS[decree.region]} · Turn {decree.turn}</div>
                      </div>
                      <button onClick={()=>removeDecree(decree.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"9px",padding:"2px 6px",flexShrink:0}}>×</button>
                    </div>
                    {/* effects */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"10px"}}>
                      {decree.effects.map(({classIdx,type}) => (
                        <span key={classIdx} style={{fontSize:"9px",padding:"1px 7px",borderRadius:"3px",
                          background:type==="bonus"?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                          border:`1px solid ${type==="bonus"?"rgba(80,160,100,0.25)":"rgba(200,80,60,0.25)"}`,
                          color:type==="bonus"?"#80c890":"#e08060"}}>
                          {type==="bonus"?"+":"−"} {CLASSES[classIdx]}
                        </span>
                      ))}
                    </div>
                    {/* veto / pass buttons */}
                    <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:"8px",color:DIM,letterSpacing:"1px",marginRight:"4px"}}>Cabinet:</span>
                      <button onClick={()=>resolveDecree(decree.id,"passed")} style={{
                        padding:"5px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                        borderRadius:"4px",background:"rgba(80,160,100,0.12)",border:"1px solid rgba(80,160,100,0.35)",color:"#6db87a",
                      }}>✓ Pass</button>
                      <button onClick={()=>resolveDecree(decree.id,"vetoed")} style={{
                        padding:"5px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                        borderRadius:"4px",background:"rgba(200,80,60,0.1)",border:"1px solid rgba(200,80,60,0.3)",color:"#c4605a",
                      }}>✗ Veto</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* resolved decrees */}
        {resolvedDecrees.length > 0 && (
          <div>
            <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Decree History</div>
            <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
              {resolvedDecrees.slice().reverse().map(decree => {
                const passed = decree.status==="passed";
                return (
                  <div key={decree.id} style={{
                    padding:"8px 12px",display:"flex",alignItems:"center",gap:"10px",
                    background:"rgba(255,255,255,0.01)",
                    border:`1px solid ${passed?"rgba(80,160,100,0.12)":"rgba(200,80,60,0.1)"}`,
                    borderLeft:`3px solid ${passed?"#6db87a":"#c4605a"}`,
                    borderRadius:"4px",opacity:.8,
                  }}>
                    <span style={{fontSize:"10px",color:passed?"#6db87a":"#c4605a",flexShrink:0}}>{passed?"✓":"✗"}</span>
                    <span style={{fontSize:"10px",color:"#b0a080",flex:1}}>{decree.name}</span>
                    <span style={{fontSize:"8px",color:DIM,flexShrink:0}}>{decree.region==="all"?"National":REGIONS[decree.region]}</span>
                    <span style={{fontSize:"8px",color:passed?"#6db87a":"#c4605a",letterSpacing:"1px",textTransform:"uppercase",flexShrink:0}}>{decree.status}</span>
                    <button onClick={()=>removeDecree(decree.id)} style={{background:"none",border:"none",color:DIM,cursor:"pointer",fontSize:"11px",padding:"0 2px",flexShrink:0}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {pendingDecrees.length===0 && resolvedDecrees.length===0 && (
          <div style={{textAlign:"center",padding:"20px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>No decrees issued</div>
        )}
      </div>
    </div>
  );
}

// ── ELECTION TAB ──────────────────────────────────────────────────────────────

function ElectionTab({candidates, data, agitation, natUnrest, turn, senateHolder, setSenateHolder}) {
  const [results,      setResults]      = useState(null);
  const [rolling,      setRolling]      = useState(false);
  const [showRolls,    setShowRolls]    = useState(false);
  const [filterR,      setFilterR]      = useState(null);
  const [senResults,   setSenResults]   = useState(null);
  const [senRolling,   setSenRolling]   = useState(false);
  const [showSenRolls, setShowSenRolls] = useState(false);

  const season = getSeason(turn);
  const year   = getYear(turn);

  const runElection = () => {
    setRolling(true);
    setTimeout(() => {
      // Pre-compute popularity per candidate per region
      const popByRegion = candidates.map(c => ({
        c,
        regionPop: calcPopularity(c, data, agitation, natUnrest),
      }));

      // Roll each of the 204 colleges
      const collegeResults = COLLEGES.map((col, idx) => {
        const rIdx = col.r;
        const rolls = popByRegion.map(({c, regionPop}) => {
          const pop   = regionPop[rIdx];
          const d20   = Math.floor(Math.random() * 20) + 1;
          return {c, d20, pop, total: d20 + pop};
        });
        rolls.sort((a,b) => b.total - a.total || Math.random() - 0.5);
        return {idx: idx+1, name: col.n, rIdx, winner: rolls[0], rolls};
      });

      // Tally seats per candidate total and per region
      const seatTotals = {};
      const regionSeats = REGIONS.map(() => {
        const obj = {};
        candidates.forEach(c => { obj[c.id] = 0; });
        return obj;
      });
      candidates.forEach(c => { seatTotals[c.id] = 0; });
      collegeResults.forEach(cr => {
        seatTotals[cr.winner.c.id]++;
        regionSeats[cr.rIdx][cr.winner.c.id]++;
      });

      const ranked = [...candidates].sort((a,b) => (seatTotals[b.id]||0) - (seatTotals[a.id]||0));
      const winner = ranked[0];
      const hasMajority = (seatTotals[winner.id]||0) >= MAJORITY;

      setResults({collegeResults, seatTotals, regionSeats, ranked, winner, hasMajority});
      setRolling(false);
    }, 400);
  };

  const reset = () => { setResults(null); setShowRolls(false); setFilterR(null); };
  const resetSenate = () => { setSenResults(null); setShowSenRolls(false); };

  const runSenateElection = () => {
    setSenRolling(true);
    setTimeout(() => {
      const pops = candidates.map(c => ({
        c, regionPop: calcPopularity(c, data, agitation, natUnrest),
      }));
      // 2 senate seats per region, same d20+pop mechanic
      const senColleges = REGIONS.flatMap((region, rIdx) =>
        Array.from({length: SENATE_SEATS_PER_REGION}, (_, sIdx) => {
          const rolls = pops.map(({c, regionPop}) => {
            const pop = regionPop[rIdx];
            const d20 = Math.floor(Math.random() * 20) + 1;
            return {c, d20, pop, total: d20 + pop};
          });
          rolls.sort((a,b) => b.total - a.total || Math.random() - 0.5);
          return {region, rIdx, seat: sIdx+1, winner: rolls[0], rolls};
        })
      );
      const senTotals = {};
      candidates.forEach(c => { senTotals[c.id] = 0; });
      senColleges.forEach(col => { senTotals[col.winner.c.id]++; });
      const senRanked = [...candidates].sort((a,b) => (senTotals[b.id]||0) - (senTotals[a.id]||0));
      const senWinner = senRanked[0];
      const hasSenMajority = (senTotals[senWinner.id]||0) >= SENATE_MAJORITY;
      if (hasSenMajority) setSenateHolder(senWinner.id);
      else setSenateHolder(null);
      setSenResults({senColleges, senTotals, senRanked, senWinner, hasSenMajority});
      setSenRolling(false);
    }, 400);
  };

  const ParliamentGrid = ({seatTotals}) => {
    const squares = [];
    const sorted = [...candidates].sort((a,b) => (seatTotals[b.id]||0) - (seatTotals[a.id]||0));
    sorted.forEach(c => {
      for (let i = 0; i < (seatTotals[c.id]||0); i++) squares.push(c.color);
    });
    return (
      <div style={{display:"flex",flexWrap:"wrap",gap:"2px",justifyContent:"center",padding:"12px",background:"rgba(0,0,0,0.2)",borderRadius:"6px",border:"1px solid rgba(255,255,255,0.06)"}}>
        {squares.map((col, i) => (
          <div key={i} style={{width:"8px",height:"8px",borderRadius:"1px",background:col,opacity:.85}}/>
        ))}
      </div>
    );
  };

  return (
    <div style={{padding:"28px 24px",maxWidth:"960px",margin:"0 auto"}}>
      {/* header */}
      <div style={{textAlign:"center",marginBottom:"24px"}}>
        <div style={{fontSize:"10px",letterSpacing:"6px",color:GOLD,textTransform:"uppercase",marginBottom:"6px",opacity:.8}}>General Election</div>
        <div style={{fontSize:"26px",fontWeight:"normal",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"4px"}}>Kingdom of Azzuria</div>
        <div style={{fontSize:"11px",color:SOFT,letterSpacing:"3px",textTransform:"uppercase"}}>{season} {year} — 204 Colleges — Majority: {MAJORITY} Seats</div>
        <div style={{width:"80px",height:"1px",background:"linear-gradient(to right,transparent,"+GOLD+",transparent)",margin:"14px auto 0"}}/>
      </div>

      {/* rules */}
      <div style={{marginBottom:"20px",padding:"12px 16px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"6px",fontSize:"10px",color:DIM,lineHeight:"1.9",letterSpacing:"1px"}}>
        <span style={{color:GOLD,letterSpacing:"3px",textTransform:"uppercase",marginRight:"10px"}}>Rules</span>
        For each of the 204 colleges, every candidate rolls a d20 and adds their regional popularity. Highest total wins the seat. First to {MAJORITY} holds a majority.
      </div>

      {/* seat map by region */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"20px",justifyContent:"center"}}>
        {REGIONS.map((r,i) => (
          <div key={r} style={{padding:"5px 9px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"4px",textAlign:"center",minWidth:"62px"}}>
            <div style={{fontSize:"8px",color:GOLD,letterSpacing:"1px",textTransform:"uppercase",marginBottom:"2px"}}>{r}</div>
            <div style={{fontSize:"14px",fontWeight:"bold",color:"#e8dcc8"}}>{REGION_SEATS[i]}</div>
          </div>
        ))}
      </div>

      {/* run button */}
      {!results && (
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <button onClick={runElection} disabled={rolling || candidates.length < 2} style={{
            padding:"14px 40px",cursor:rolling?"wait":"pointer",fontFamily:"Georgia,serif",
            fontSize:"14px",letterSpacing:"4px",textTransform:"uppercase",borderRadius:"4px",
            background:rolling?"rgba(201,168,76,0.1)":"rgba(201,168,76,0.2)",
            border:`1px solid ${rolling?"rgba(201,168,76,0.3)":"rgba(201,168,76,0.6)"}`,
            color:rolling?"rgba(201,168,76,0.5)":GOLD,
            opacity:candidates.length<2?.4:1,
          }}>{rolling?"Rolling...":"Call the Election"}</button>
          {candidates.length < 2 && <div style={{fontSize:"10px",color:DIM,marginTop:"8px",letterSpacing:"2px"}}>Add at least 2 candidates first</div>}
        </div>
      )}

      {results && (
        <div>
          {/* winner banner */}
          <div style={{
            marginBottom:"20px",padding:"20px 24px",textAlign:"center",
            background:results.hasMajority?"rgba(201,168,76,0.08)":"rgba(255,255,255,0.02)",
            border:`1px solid ${results.hasMajority?"rgba(201,168,76,0.35)":"rgba(255,255,255,0.08)"}`,
            borderRadius:"6px",
          }}>
            <div style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>
              {results.hasMajority?"Majority Secured":"Largest Party — No Majority"}
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",marginBottom:"8px"}}>
              <span style={{display:"inline-block",width:"12px",height:"12px",borderRadius:"50%",background:results.winner.color}}/>
              <span style={{fontSize:"22px",color:results.winner.color,letterSpacing:"2px"}}>{results.winner.name}</span>
            </div>
            <div style={{fontSize:"32px",fontWeight:"bold",color:results.winner.color,marginBottom:"4px"}}>
              {results.seatTotals[results.winner.id]} <span style={{fontSize:"14px",opacity:.6}}>/ {TOTAL_SEATS} seats</span>
            </div>
            {!results.hasMajority && (
              <div style={{fontSize:"11px",color:"#c47a5a",letterSpacing:"2px",marginTop:"4px"}}>{MAJORITY - results.seatTotals[results.winner.id]} more seats needed for majority</div>
            )}
          </div>

          {/* parliament grid */}
          <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"10px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",textAlign:"center",marginBottom:"10px"}}>Parliament — 204 Seats</div>
            <ParliamentGrid seatTotals={results.seatTotals}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:"12px",justifyContent:"center",marginTop:"10px"}}>
              {results.ranked.map(c => (
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:"7px",fontSize:"11px"}}>
                  <div style={{width:"10px",height:"10px",borderRadius:"2px",background:c.color}}/>
                  <span style={{color:c.color}}>{c.name}</span>
                  <span style={{fontWeight:"bold",color:"#e8dcc8"}}>{results.seatTotals[c.id]}</span>
                  <span style={{color:DIM,fontSize:"9px"}}>({Math.round(results.seatTotals[c.id]/TOTAL_SEATS*100)}%)</span>
                </div>
              ))}
            </div>
          </div>

          {/* regional breakdown */}
          <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"10px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Regional Breakdown</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:"7px"}}>
              {REGIONS.map((r, rIdx) => {
                const rs = results.regionSeats[rIdx];
                const regionWinnerId = results.ranked.reduce((best, c) => (rs[c.id]||0) > (rs[best]||0) ? c.id : best, results.ranked[0].id);
                const regionWinner = candidates.find(c => c.id === regionWinnerId);
                return (
                  <div key={r} style={{padding:"10px 12px",background:"rgba(255,255,255,0.02)",borderLeft:`3px solid ${regionWinner.color}`,border:`1px solid ${regionWinner.color}22`,borderLeft:`3px solid ${regionWinner.color}`,borderRadius:"4px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"7px"}}>
                      <span style={{fontSize:"10px",color:"#e8dcc8",letterSpacing:"1px",textTransform:"uppercase"}}>{r}</span>
                      <span style={{fontSize:"9px",color:DIM}}>{REGION_SEATS[rIdx]} seats</span>
                    </div>
                    {results.ranked.map(c => {
                      const n = rs[c.id]||0;
                      if (!n) return null;
                      const pct = Math.round(n/REGION_SEATS[rIdx]*100);
                      return (
                        <div key={c.id} style={{marginBottom:"4px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
                            <span style={{fontSize:"9px",color:c.color}}>{c.name}</span>
                            <span style={{fontSize:"9px",color:c.color,fontWeight:"bold"}}>{n} ({pct}%)</span>
                          </div>
                          <div style={{height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                            <div style={{width:pct+"%",height:"100%",background:c.color,borderRadius:"2px"}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>

          {/* college rolls */}
          <div style={{marginBottom:"20px"}}>
            <button onClick={() => setShowRolls(f=>!f)} style={{
              width:"100%",padding:"8px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
              letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",
              background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:SOFT,
            }}>{showRolls?"Hide":"Show"} All 204 College Rolls</button>

            {showRolls && (
              <div style={{marginTop:"12px"}}>
                {/* region filter */}
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px",justifyContent:"center"}}>
                  <button onClick={()=>setFilterR(null)} style={{padding:"3px 9px",cursor:"pointer",fontSize:"9px",fontFamily:"Georgia,serif",letterSpacing:"1px",textTransform:"uppercase",borderRadius:"3px",background:filterR===null?"rgba(201,168,76,0.2)":"transparent",border:`1px solid ${filterR===null?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.1)"}`,color:filterR===null?GOLD:DIM}}>All</button>
                  {REGIONS.map((r,i) => (
                    <button key={r} onClick={()=>setFilterR(i)} style={{padding:"3px 9px",cursor:"pointer",fontSize:"9px",fontFamily:"Georgia,serif",letterSpacing:"1px",textTransform:"uppercase",borderRadius:"3px",background:filterR===i?"rgba(201,168,76,0.2)":"transparent",border:`1px solid ${filterR===i?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.1)"}`,color:filterR===i?GOLD:DIM}}>{r}</button>
                  ))}
                </div>
                <div style={{maxHeight:"420px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"3px"}}>
                  {results.collegeResults.filter(cr => filterR===null || cr.rIdx===filterR).map(cr => (
                    <div key={cr.idx} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 10px",background:"rgba(255,255,255,0.02)",border:`1px solid ${cr.winner.c.color}22`,borderLeft:`2px solid ${cr.winner.c.color}`,borderRadius:"3px",flexWrap:"wrap"}}>
                      <span style={{fontSize:"9px",color:DIM,minWidth:"22px",textAlign:"right"}}>{cr.idx}</span>
                      <span style={{fontSize:"10px",color:"#b0a080",flex:1,minWidth:"100px"}}>{cr.name}</span>
                      <span style={{fontSize:"8px",color:GOLD,letterSpacing:"1px",textTransform:"uppercase"}}>{REGIONS[cr.rIdx]}</span>
                      <span style={{fontSize:"9px",color:cr.winner.c.color,fontWeight:"bold",minWidth:"70px",textAlign:"right"}}>{cr.winner.c.name}</span>
                      <div style={{display:"flex",gap:"4px"}}>
                        {cr.rolls.map((roll,i) => (
                          <span key={i} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"2px",background:roll.c.color+"22",color:roll.c.color,border:`1px solid ${roll.c.color}44`}}>
                            d{roll.d20}{roll.pop>=0?"+":""}{ roll.pop}={roll.total}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* actions */}
          <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
            <button onClick={runElection} style={{padding:"9px 24px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",color:GOLD}}>Re-roll Chamber</button>
            <button onClick={reset} style={{padding:"9px 24px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",color:SOFT}}>Clear Chamber</button>
          </div>
        </div>
      )}

      {/* ══ SENATE ELECTION ══ */}
      <div style={{marginTop:"40px",paddingTop:"28px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{textAlign:"center",marginBottom:"20px"}}>
          <div style={{fontSize:"10px",letterSpacing:"6px",color:"#9b7fba",textTransform:"uppercase",marginBottom:"6px",opacity:.8}}>Senate Election</div>
          <div style={{fontSize:"22px",fontWeight:"normal",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"4px"}}>Kingdom of Azzuria — Upper House</div>
          <div style={{fontSize:"11px",color:SOFT,letterSpacing:"3px",textTransform:"uppercase"}}>{season} {year} — {SENATE_TOTAL} Seats — Majority: {SENATE_MAJORITY}</div>
          <div style={{width:"60px",height:"1px",background:"linear-gradient(to right,transparent,#9b7fba,transparent)",margin:"12px auto 0"}}/>
        </div>

        <div style={{marginBottom:"16px",padding:"10px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"6px",fontSize:"10px",color:DIM,lineHeight:"1.9"}}>
          <span style={{color:"#9b7fba",letterSpacing:"3px",textTransform:"uppercase",marginRight:"10px"}}>Rules</span>
          2 senate seats per division ({SENATE_TOTAL} total). Same d20 + regional popularity mechanic as the Chamber.
          Senate majority holder gains <span style={{color:GOLD}}>+1 action per season</span>.
          {senateHolder && (() => { const h = candidates.find(c=>c.id===senateHolder); return h ? <span style={{color:h.color}}> Current holder: {h.name}.</span> : null; })()}
        </div>

        {/* seat strip */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"16px",justifyContent:"center"}}>
          {REGIONS.map((r,i) => (
            <div key={r} style={{padding:"4px 8px",background:"rgba(155,127,186,0.05)",border:"1px solid rgba(155,127,186,0.12)",borderRadius:"4px",textAlign:"center",minWidth:"58px"}}>
              <div style={{fontSize:"8px",color:"#9b7fba",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"2px"}}>{r}</div>
              <div style={{fontSize:"13px",fontWeight:"bold",color:"#e8dcc8"}}>{SENATE_SEATS_PER_REGION}</div>
            </div>
          ))}
        </div>

        {!senResults && (
          <div style={{textAlign:"center",marginBottom:"20px"}}>
            <button onClick={runSenateElection} disabled={senRolling || candidates.length < 2} style={{
              padding:"12px 36px",cursor:senRolling?"wait":"pointer",fontFamily:"Georgia,serif",
              fontSize:"13px",letterSpacing:"4px",textTransform:"uppercase",borderRadius:"4px",
              background:senRolling?"rgba(155,127,186,0.08)":"rgba(155,127,186,0.18)",
              border:`1px solid ${senRolling?"rgba(155,127,186,0.2)":"rgba(155,127,186,0.5)"}`,
              color:senRolling?"rgba(155,127,186,0.4)":"#9b7fba",
              opacity:candidates.length<2?.4:1,
            }}>{senRolling?"Rolling...":"Hold Senate Election"}</button>
          </div>
        )}

        {senResults && (
          <div>
            {/* winner banner */}
            <div style={{
              marginBottom:"16px",padding:"16px 20px",textAlign:"center",
              background:senResults.hasSenMajority?"rgba(155,127,186,0.08)":"rgba(255,255,255,0.02)",
              border:`1px solid ${senResults.hasSenMajority?"rgba(155,127,186,0.35)":"rgba(255,255,255,0.08)"}`,
              borderRadius:"6px",
            }}>
              <div style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>
                {senResults.hasSenMajority?"Senate Majority — +1 Action Per Season":"No Senate Majority"}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",marginBottom:"6px"}}>
                <span style={{display:"inline-block",width:"10px",height:"10px",borderRadius:"50%",background:senResults.senWinner.color}}/>
                <span style={{fontSize:"18px",color:senResults.senWinner.color,letterSpacing:"2px"}}>{senResults.senWinner.name}</span>
              </div>
              <div style={{fontSize:"28px",fontWeight:"bold",color:senResults.senWinner.color,marginBottom:"3px"}}>
                {senResults.senTotals[senResults.senWinner.id]} <span style={{fontSize:"12px",opacity:.6}}>/ {SENATE_TOTAL} seats</span>
              </div>
              {!senResults.hasSenMajority && (
                <div style={{fontSize:"10px",color:"#c47a5a",letterSpacing:"2px",marginTop:"3px"}}>{SENATE_MAJORITY - senResults.senTotals[senResults.senWinner.id]} more needed for majority</div>
              )}
            </div>

            {/* seat tally */}
            <div style={{display:"flex",flexWrap:"wrap",gap:"10px",justifyContent:"center",marginBottom:"16px"}}>
              {senResults.senRanked.map(c => (
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:"7px",padding:"8px 14px",background:"rgba(255,255,255,0.02)",border:`1px solid ${c.color}22`,borderRadius:"4px"}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"2px",background:c.color}}/>
                  <span style={{fontSize:"11px",color:c.color}}>{c.name}</span>
                  <span style={{fontSize:"18px",fontWeight:"bold",color:"#e8dcc8"}}>{senResults.senTotals[c.id]}</span>
                  <span style={{fontSize:"9px",color:DIM}}>({Math.round(senResults.senTotals[c.id]/SENATE_TOTAL*100)}%)</span>
                  {senateHolder===c.id && <span style={{fontSize:"8px",color:"#9b7fba",border:"1px solid rgba(155,127,186,0.4)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>MAJORITY</span>}
                </div>
              ))}
            </div>

            {/* per-region breakdown */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:"6px",marginBottom:"16px"}}>
              {REGIONS.map((r, rIdx) => {
                const regionCols = senResults.senColleges.filter(c => c.rIdx===rIdx);
                const tally = {};
                candidates.forEach(c => { tally[c.id]=0; });
                regionCols.forEach(col => { tally[col.winner.c.id]++; });
                const regionWinner = senResults.senRanked.find(c => tally[c.id]===Math.max(...Object.values(tally)));
                return (
                  <div key={r} style={{padding:"8px 10px",background:"rgba(255,255,255,0.02)",borderLeft:`3px solid ${regionWinner.color}`,border:`1px solid ${regionWinner.color}18`,borderLeft:`3px solid ${regionWinner.color}`,borderRadius:"4px"}}>
                    <div style={{fontSize:"9px",color:"#e8dcc8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"5px"}}>{r}</div>
                    {senResults.senRanked.map(c => tally[c.id]>0 ? (
                      <div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:"9px",marginBottom:"2px"}}>
                        <span style={{color:c.color}}>{c.name}</span>
                        <span style={{color:c.color,fontWeight:"bold"}}>{tally[c.id]}</span>
                      </div>
                    ) : null)}
                  </div>
                );
              })}
            </div>

            {/* senate rolls toggle */}
            <button onClick={() => setShowSenRolls(f=>!f)} style={{
              width:"100%",padding:"7px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
              letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",marginBottom:"10px",
              background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",color:SOFT,
            }}>{showSenRolls?"Hide":"Show"} Senate Rolls</button>

            {showSenRolls && (
              <div style={{maxHeight:"320px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"3px",marginBottom:"12px"}}>
                {senResults.senColleges.map((col,idx) => (
                  <div key={idx} style={{display:"flex",alignItems:"center",gap:"8px",padding:"4px 10px",background:"rgba(255,255,255,0.015)",borderLeft:`2px solid ${col.winner.c.color}`,borderRadius:"3px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"9px",color:DIM,minWidth:"18px"}}>{idx+1}</span>
                    <span style={{fontSize:"9px",color:"#b0a080",flex:1}}>{col.region} Seat {col.seat}</span>
                    <span style={{fontSize:"9px",color:col.winner.c.color,fontWeight:"bold",minWidth:"70px",textAlign:"right"}}>{col.winner.c.name}</span>
                    <div style={{display:"flex",gap:"3px"}}>
                      {col.rolls.map((roll,i) => (
                        <span key={i} style={{fontSize:"8px",padding:"1px 4px",borderRadius:"2px",background:roll.c.color+"18",color:roll.c.color,border:`1px solid ${roll.c.color}33`}}>
                          d{roll.d20}+{roll.pop}={roll.total}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
              <button onClick={runSenateElection} style={{padding:"8px 20px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"rgba(155,127,186,0.12)",border:"1px solid rgba(155,127,186,0.35)",color:"#9b7fba"}}>Re-roll Senate</button>
              <button onClick={resetSenate} style={{padding:"8px 20px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",color:SOFT}}>Clear Senate</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────

function App() {
  const [loaded,       setLoaded]       = useState(false);
  const [tab,          setTab]          = useState(0);
  const [data,         setData]         = useState(INITIAL_DATA.map(r => [...r]));
  const [candidates,   setCandidates]   = useState([{id:1,name:"Candidate A",color:"#7a9cc4",laws:[],actions:[],actionsLeft:BASE_ACTIONS}]);
  const [activeCand,   setActiveCand]   = useState(1);
  const [agitation,    setAgitation]    = useState(Array(8).fill(0));
  const [turn,         setTurn]         = useState(1);
  const [senateHolder, setSenateHolder] = useState(null);
  const [government,     setGovernment]     = useState({pm:null,interior:null,finance:null,war:null,church:null,justice:null,foreign:null,education:null,decrees:[]});
  const [pendingParties, setPendingParties] = useState([]);
  const [syncStatus,   setSyncStatus]   = useState("idle");
  const [binId,        setBinId]        = useState(typeof JSONBIN_BIN_ID !== "undefined" ? JSONBIN_BIN_ID : "");
  const saveTimer = useRef(null);
  const isFirstRender = useRef(true);

  // Load saved state on mount
  useEffect(() => {
    (async () => {
      try {
        // Try Claude shared storage first, fall back to localStorage
        let s = null;
        // Try localStorage first (fastest)
        const raw = localStorage.getItem("azzuria-gamestate");
        if (raw) { try { s = JSON.parse(raw); } catch(e) {} }
        // If nothing local, try JSONbin
        if (!s) { try { s = await jsonbinLoad(); } catch(e) {} }
        // Also try Claude storage
        if (!s) { try { const r = await window.storage.get("azzuria-gamestate",true); if(r&&r.value) s=JSON.parse(r.value); } catch(e) {} }
        if (s) {
          if (s.data)       setData(s.data);
          if (s.candidates) { setCandidates(s.candidates); setActiveCand(s.candidates[0]?.id ?? 1); }
          if (s.agitation)  setAgitation(s.agitation);
          if (s.turn)       setTurn(s.turn);
          if (s.senateHolder !== undefined) setSenateHolder(s.senateHolder);
          if (s.government)       setGovernment(s.government);
          if (s.pendingParties)   setPendingParties(s.pendingParties);
        }
      } catch(e) { /* no saved state, use defaults */ }
      setLoaded(true);
    })();
  }, []);

  // Poll JSONbin for new pending parties every 20s
  useEffect(() => {
    if (!loaded) return;
    const t = setInterval(async () => {
      try {
        const res  = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
          headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
        });
        const d = await res.json();
        if (d.record && d.record.pendingParties) setPendingParties(d.record.pendingParties);
      } catch(e) {}
    }, 10000);
    return () => clearInterval(t);
  }, [loaded]);

  // Auto-save whenever state changes (skip the very first render tick)
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSyncStatus("saving");
      try {
        // Fetch latest pendingParties from JSONbin so we never clobber a fresh submission
        let livePending = pendingParties;
        if (window.location.protocol !== "file:") {
          try {
            const pr = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
              headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
            });
            const pd = await pr.json();
            if (pd.record && Array.isArray(pd.record.pendingParties)) {
              // Merge: keep anything in JSONbin not already in local state
              const localIds = new Set(pendingParties.map(p => p.id));
              const merged   = [...pendingParties, ...pd.record.pendingParties.filter(p => !localIds.has(p.id))];
              livePending = merged;
              if (merged.length !== pendingParties.length) setPendingParties(merged);
            }
          } catch(e) { /* keep local pendingParties on fetch error */ }
        }
        const state = { turn, agitation, candidates, data, senateHolder, government, pendingParties: livePending, savedAt: Date.now() };
        const json = JSON.stringify(state);
        // Save to localStorage always
        localStorage.setItem("azzuria-gamestate", json);
        // Save to JSONbin (for Discord bot)
        // JSONbin only works when hosted (not from file://)
        if (window.location.protocol !== "file:") {
          try {
            await jsonbinSave(state);
            setBinId(JSONBIN_BIN_ID);
          } catch(e) { console.error("JSONbin error:", e); }
        }
        // Also try Claude storage if available
        try { await window.storage.set("azzuria-gamestate", json, true); } catch(e) {}
        setSyncStatus("saved");
        setTimeout(() => setSyncStatus("idle"), 2000);
      } catch(e) {
        setSyncStatus("error");
      }
    }, 800);
  }, [turn, agitation, candidates, data, loaded]);

  const syncDot = {
    idle:   { color:"#5a4a30", label:"" },
    saving: { color:"#c9a84c", label:"Saving..." },
    saved:  { color:"#6db87a", label:"Saved" },
    error:  { color:"#c4605a", label:"Save error" },
  }[syncStatus];

  const natUnrest = calcNatUnrest(agitation);

  if (!loaded) return (
    <div style={{...PAGE, display:"flex", alignItems:"center", justifyContent:"center"}}>
      <div style={{fontSize:"10px", letterSpacing:"6px", color:"#5a4a30", textTransform:"uppercase"}}>Loading saved state...</div>
    </div>
  );

  return (
    <div style={PAGE}>
      <SeasonHeader turn={turn} natUnrest={natUnrest} agitation={agitation} candidates={candidates}/>
      {syncStatus !== "idle" && (
        <div style={{position:"fixed",bottom:"14px",right:"16px",zIndex:999,display:"flex",alignItems:"center",gap:"6px",padding:"6px 12px",background:"rgba(20,16,10,0.92)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px",fontSize:"10px",color:syncDot.color,letterSpacing:"2px",textTransform:"uppercase",backdropFilter:"blur(6px)"}}>
          <span style={{width:"6px",height:"6px",borderRadius:"50%",background:syncDot.color,display:"inline-block"}}/>
          {syncDot.label}
        </div>
      )}
      {binId && (
        <div
          onClick={() => { navigator.clipboard?.writeText(binId); alert("Bin ID copied: " + binId); }}
          style={{position:"fixed",bottom:"14px",left:"16px",zIndex:999,cursor:"pointer",
            padding:"6px 12px",background:"rgba(20,16,10,0.92)",border:"1px solid rgba(155,127,186,0.35)",
            borderRadius:"20px",fontSize:"10px",color:"#9b7fba",letterSpacing:"2px",
            textTransform:"uppercase",backdropFilter:"blur(6px)"}}>
          📋 BIN ID (tap to copy)
        </div>
      )}
      <TabBar active={tab} onChange={setTab}/>
      {tab===0 && <RegionsTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest}/>}
      {tab===1 && <CandidatesTab data={data} setData={setData} candidates={candidates} setCandidates={setCandidates} activeCand={activeCand} setActiveCand={setActiveCand} agitation={agitation} setAgitation={setAgitation} natUnrest={natUnrest} pendingParties={pendingParties} setPendingParties={setPendingParties}/>}
      {tab===2 && <GameStateTab agitation={agitation} setAgitation={setAgitation} natUnrest={natUnrest} turn={turn} setTurn={setTurn} candidates={candidates} setCandidates={setCandidates} senateHolder={senateHolder}/>}
      {tab===3 && <InfluenceTab data={data} setData={setData}/>}
      {tab===4 && <LawRegistryTab candidates={candidates} government={government}/>}
      {tab===5 && <ElectionTab candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} turn={turn} senateHolder={senateHolder} setSenateHolder={setSenateHolder}/>}
      {tab===6 && <GovernmentTab candidates={candidates} government={government} setGovernment={setGovernment} setData={setData} turn={turn}/>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
