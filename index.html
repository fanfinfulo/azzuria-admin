          const nonMembers = candidates.filter(c => !coal.memberIds.includes(c.id));

          return (
            <div key={coal.id} style={{background:"rgba(255,255,255,0.02)",
              border:`1px solid ${coal.color}33`,borderTop:`3px solid ${coal.color}`,
              borderRadius:"5px",padding:"12px 14px"}}>

              {/* Header row */}
              <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:"100px"}}>
                  <div style={{fontSize:"13px",color:coal.color,letterSpacing:"1px",marginBottom:"2px"}}>{coal.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"9px",color:DIM}}>{members.length} {members.length===1?"party":"parties"}</span>
                    {lastChamber && <>
                      <span style={{fontSize:"9px",color:DIM}}>·</span>
                      <span style={{fontSize:"11px",fontWeight:"bold",color:hasMaj?"#6db87a":"#e8dcc8"}}>{seats}</span>
                      <span style={{fontSize:"9px",color:DIM}}>/ {totalSeats} seats</span>
                      <span style={{fontSize:"9px",color:hasMaj?"#6db87a":DIM}}>{pct}%</span>
                      {hasMaj && <span style={{fontSize:"8px",color:"#6db87a",border:"1px solid rgba(109,184,122,0.35)",
                        borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>MAJORITY</span>}
                    </>}
                  </div>
                </div>
                {lastChamber && (
                  <div style={{width:"120px",flexShrink:0}}>
                    <div style={{height:"5px",background:"rgba(255,255,255,0.06)",borderRadius:"3px",overflow:"hidden"}}>
                      <div style={{width:pct+"%",height:"100%",background:hasMaj?"#6db87a":coal.color,
                        borderRadius:"3px",transition:"width 0.3s"}}/>
                    </div>
                    {/* majority line marker */}
                    <div style={{position:"relative",height:"4px",marginTop:"1px"}}>
                      <div style={{position:"absolute",left:(MAJORITY/totalSeats*100)+"%",top:0,
                        width:"1px",height:"4px",background:"rgba(201,168,76,0.6)"}}/>
                    </div>
                  </div>
                )}
                <button onClick={()=>dissolve(coal.id)}
                  style={{padding:"3px 10px",cursor:"pointer",background:"rgba(200,60,60,0.07)",
                    border:"1px solid rgba(200,60,60,0.2)",borderRadius:"3px",color:"#c4605a",
                    fontSize:"9px",fontFamily:"Georgia,serif",letterSpacing:"1px",flexShrink:0}}>Dissolve</button>
              </div>

              {/* Seat breakdown per member */}
              {members.length > 0 && (
                <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}}>
                  {members.map(c => (
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:"5px",padding:"3px 9px",
                      background:c.color+"14",border:`1px solid ${c.color}44`,borderRadius:"3px",cursor:"pointer"}}
                      onClick={()=>toggleMember(coal.id, c.id)}
                      title="Click to remove">
                      <span style={{width:"6px",height:"6px",borderRadius:"50%",background:c.color,display:"inline-block",flexShrink:0}}/>
                      <span style={{fontSize:"10px",color:c.color}}>{c.name}</span>
                      {lastChamber && <span style={{fontSize:"9px",color:DIM,marginLeft:"2px"}}>{seatTotals[c.id]||0}</span>}
                      <span style={{fontSize:"9px",color:"#c4605a",marginLeft:"2px",opacity:.6}}>×</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Add member buttons */}
              {nonMembers.length > 0 && (
                <div style={{display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginRight:"2px"}}>Add</span>
                  {nonMembers.map(c => (
                    <button key={c.id} onClick={()=>toggleMember(coal.id, c.id)}
                      style={{padding:"2px 9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                        background:"rgba(255,255,255,0.03)",border:`1px solid ${c.color}33`,
                        borderRadius:"3px",color:c.color}}>
                      + {c.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── PARTY REGISTRY ───────────────────────────────────────────────────────────

function PartyRegistry({candidates, setCandidates, data, agitation, natUnrest, government, turn, coalitions, setCoalitions, electionHistory}) {
  const [sel,       setSel]       = useState(candidates[0]?.id ?? null);
  const [editName,  setEditName]  = useState(false);
  const [draftName, setDraftName] = useState("");
  const [editDesc,  setEditDesc]  = useState(false);
  const [draftDesc, setDraftDesc] = useState("");

  const cand = candidates.find(c => c.id === sel);
  const update = patch => setCandidates(p => p.map(c => c.id===sel ? {...c,...patch} : c));

  const toggleBase   = idx => {
    const base = cand.classBase||[];
    update({classBase: base.includes(idx) ? base.filter(i=>i!==idx) : [...base, idx]});
  };
  const toggleRegion = idx => {
    const rb = cand.regionBase||[];
    update({regionBase: rb.includes(idx) ? rb.filter(i=>i!==idx) : [...rb, idx]});
  };
  const removeLaw = lid => update({laws: cand.laws.filter(l=>l.id!==lid)});
  const removeAct = aid => update({actions: (cand.actions||[]).filter(a=>a.id!==aid)});

  const addParty = () => {
    const id = Date.now();
    const color = CAND_COLORS[candidates.length % CAND_COLORS.length];
    const np = {id, name:"New Party", color, laws:[], actions:[], actionsLeft:BASE_ACTIONS, classBase:[], regionBase:[]};
    setCandidates(p => [...p, np]);
    setSel(id);
  };
  const deleteParty = () => {
    setCandidates(p => {
      const n = p.filter(c => c.id !== sel);
      setSel(n[0]?.id ?? null);
      return n;
    });
  };
  const pasteParty = () => {
    // Извлекаем нужные поля из входящего объекта data
    let data = JSON.parse(prompt('paste data of party'))
    const { 
      id, 
      color, 
      name, 
      regions, 
      classBase, 
      tags 
    } = data;

    const np = {
      id,
      name: name || "New Party", // Используем имя из данных или дефолтное
      color: color || "#ffffff",
      laws: [],
      actions: [],
      actionsLeft: BASE_ACTIONS,
      classBase: classBase || [],
      regionBase: regions || [], // Массив ID регионов из входных данных
      tags: tags || [],          // Сохраняем тэги (Public Works и т.д.)
      submittedAt: data.submittedAt
    };

    setCandidates(p => [...p, np]);
    setSel(id);
  };

  const pops = cand ? calcPopularity(cand, data, agitation, natUnrest, government?.tariffs||0, turn, candidates) : [];
  const totalPop = pops.reduce((a,b)=>a+b, 0);
  const bestIdx  = pops.indexOf(Math.max(...pops));
  const worstIdx = pops.indexOf(Math.min(...pops));

  const ministriesHeld = government ? Object.entries(government)
    .filter(([k,v]) => v === sel && !["decrees","ministerialUsed","azzuriaMilInvest","tariffs","pendingInvestments"].includes(k))
    .map(([k]) => ({
      pm:"Prime Minister", interior:"Interior", trade:"Trade", war:"War",
      works:"Public Works", foreign:"Foreign Affairs", church:"Religion",
      justice:"Justice", education:"Education"
    }[k] || k))
    : [];

  const S = {padding:"5px 10px",background:"rgba(255,255,255,0.04)",
    border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",
    color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px"};

  return (
    <div style={{padding:"16px 14px", maxWidth:"1000px", margin:"0 auto"}}>

      {/* Party selector */}
      <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap",marginBottom:"18px"}}>
        {candidates.map(c => (
          <button key={c.id} onClick={()=>setSel(c.id)}
            style={{padding:"6px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",
              letterSpacing:"1px",borderRadius:"4px",
              background:sel===c.id?c.color+"22":"rgba(255,255,255,0.03)",
              border:`1px solid ${sel===c.id?c.color:"rgba(255,255,255,0.08)"}`,
              color:sel===c.id?c.color:SOFT}}>
            <span style={{display:"inline-block",width:"7px",height:"7px",borderRadius:"50%",
              background:c.color,marginRight:"6px",verticalAlign:"middle"}}/>
            {c.name}
          </button>
        ))}
        <button onClick={addParty}
          style={{padding:"6px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
            letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",
            background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:DIM}}>
          + New
        </button>
        <button onClick={pasteParty}
          style={{padding:"6px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",
            letterSpacing:"2px",textTransform:"uppercase",borderRadius:"4px",
            background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:DIM}}>
          + Paste
        </button>
      </div>

      {/* Coalitions */}
      <CoalitionsPanel coalitions={coalitions} setCoalitions={setCoalitions} candidates={candidates} electionHistory={electionHistory}/>

      {!cand ? (
        <div style={{textAlign:"center",padding:"40px",color:DIM,fontSize:"11px",fontStyle:"italic"}}>No parties yet</div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"16px",alignItems:"start"}}>

          {/* LEFT: Identity */}
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{padding:"16px",background:"rgba(255,255,255,0.02)",
              border:`1px solid ${cand.color}30`,borderTop:`3px solid ${cand.color}`,borderRadius:"5px"}}>

              {/* Colour + Name */}
              <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
                <input type="color" value={cand.color} onChange={e=>update({color:e.target.value})}
                  style={{width:"32px",height:"32px",border:"none",borderRadius:"4px",cursor:"pointer",padding:0,flexShrink:0}}/>
                {editName ? (
                  <div style={{display:"flex",gap:"5px",flex:1}}>
                    <input value={draftName} onChange={e=>setDraftName(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"){update({name:draftName});setEditName(false);}}}
                      autoFocus style={{...S,flex:1,color:cand.color,fontSize:"14px",border:`1px solid ${cand.color}66`}}/>
                    <button onClick={()=>{update({name:draftName});setEditName(false);}}
                      style={{padding:"4px 10px",cursor:"pointer",background:`${cand.color}22`,
                        border:`1px solid ${cand.color}55`,borderRadius:"3px",color:cand.color,fontSize:"11px"}}>✓</button>
                  </div>
                ) : (
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1}}>
                    <span style={{fontSize:"17px",color:cand.color}}>{cand.name}</span>
                    <button onClick={()=>{setDraftName(cand.name);setEditName(true);}}
                      style={{padding:"2px 7px",cursor:"pointer",background:"rgba(255,255,255,0.04)",
                        border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:DIM,fontSize:"9px"}}>edit</button>
                  </div>
                )}
              </div>

              {/* Description */}
              <div style={{marginBottom:"14px"}}>
                <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"5px"}}>Description</div>
                {editDesc ? (
                  <div>
                    <textarea value={draftDesc} onChange={e=>setDraftDesc(e.target.value)} rows={3}
                      style={{width:"100%",padding:"6px 8px",background:"rgba(255,255,255,0.04)",
                        border:"1px solid rgba(255,255,255,0.12)",borderRadius:"3px",
                        color:SOFT,fontFamily:"Georgia,serif",fontSize:"11px",resize:"vertical",lineHeight:"1.6"}}/>
                    <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                      <button onClick={()=>{update({desc:draftDesc});setEditDesc(false);}}
                        style={{padding:"4px 12px",cursor:"pointer",background:"rgba(80,160,100,0.12)",
                          border:"1px solid rgba(80,160,100,0.3)",borderRadius:"3px",color:"#6db87a",fontSize:"10px",fontFamily:"Georgia,serif"}}>Save</button>
                      <button onClick={()=>setEditDesc(false)}
                        style={{padding:"4px 10px",cursor:"pointer",background:"none",
                          border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px",color:DIM,fontSize:"10px",fontFamily:"Georgia,serif"}}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div onClick={()=>{setDraftDesc(cand.desc||"");setEditDesc(true);}}
                    style={{minHeight:"32px",padding:"6px 8px",background:"rgba(255,255,255,0.02)",
                      border:"1px solid rgba(255,255,255,0.07)",borderRadius:"3px",cursor:"text",
                      fontSize:"11px",color:cand.desc?SOFT:DIM,fontStyle:"italic",lineHeight:"1.6"}}>
                    {cand.desc || "Click to add description…"}
                  </div>
                )}
              </div>

              {/* Class base */}
              <div style={{marginBottom:"14px"}}>
                <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>
                  Base Classes <span style={{color:SOFT,fontSize:"8px",letterSpacing:"0",textTransform:"none"}}>(×2 multiplier)</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                  {CLASSES.map((cls,i) => {
                    const isBase = (cand.classBase||[]).includes(i);
                    return (
                      <button key={i} onClick={()=>toggleBase(i)}
                        style={{padding:"3px 9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                          borderRadius:"3px",
                          background:isBase?CLASS_COLORS[i]+"22":"rgba(255,255,255,0.03)",
                          border:`1px solid ${isBase?CLASS_COLORS[i]+"66":"rgba(255,255,255,0.08)"}`,
                          color:isBase?CLASS_COLORS[i]:DIM}}>
                        {cls}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Home regions */}
              <div style={{marginBottom:"14px"}}>
                <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>
                  Home Regions <span style={{color:SOFT,fontSize:"8px",letterSpacing:"0",textTransform:"none"}}>(×1.25 popularity multiplier)</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                  {REGIONS.map((r,i) => {
                    const isHome = (cand.regionBase||[]).includes(i);
                    return (
                      <button key={i} onClick={()=>toggleRegion(i)}
                        style={{padding:"3px 9px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                          borderRadius:"3px",
                          background:isHome?cand.color+"22":"rgba(255,255,255,0.03)",
                          border:`1px solid ${isHome?cand.color+"66":"rgba(255,255,255,0.08)"}`,
                          color:isHome?cand.color:DIM}}>
                        {r}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Ministry posts */}
              {ministriesHeld.length > 0 && (
                <div style={{paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"5px"}}>Government Posts</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                    {ministriesHeld.map(m => (
                      <span key={m} style={{fontSize:"9px",padding:"2px 8px",borderRadius:"3px",
                        background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.22)",color:GOLD}}>{m}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Popularity */}
            <div style={{padding:"14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px"}}>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>Popularity</div>
              <div style={{display:"flex",gap:"12px",marginBottom:"10px"}}>
                <div style={{textAlign:"center",flex:1}}>
                  <div style={{fontSize:"8px",color:DIM,marginBottom:"2px"}}>Total</div>
                  <div style={{fontSize:"20px",color:totalPop>=0?cand.color:"#c4605a",fontWeight:"bold"}}>{totalPop>0?"+":""}{totalPop}</div>
                </div>
                <div style={{textAlign:"center",flex:1}}>
                  <div style={{fontSize:"8px",color:DIM,marginBottom:"2px"}}>Avg</div>
                  <div style={{fontSize:"20px",color:SOFT,fontWeight:"bold"}}>{Math.round(totalPop/14)>0?"+":""}{Math.round(totalPop/14)}</div>
                </div>
              </div>
              <div style={{marginBottom:"6px"}}>
                <div style={{fontSize:"8px",color:"#6db87a",marginBottom:"3px"}}>▲ Best: {REGIONS[bestIdx]}</div>
                <div style={{height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                  <div style={{width:popPct(pops[bestIdx])+"%",height:"100%",background:"#6db87a",borderRadius:"2px"}}/>
                </div>
              </div>
              <div style={{marginBottom:"10px"}}>
                <div style={{fontSize:"8px",color:"#c4605a",marginBottom:"3px"}}>▼ Worst: {REGIONS[worstIdx]}</div>
                <div style={{height:"4px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                  <div style={{width:popPct(pops[worstIdx])+"%",height:"100%",background:"#c4605a",borderRadius:"2px"}}/>
                </div>
              </div>
              <div style={{paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"7px"}}>By Region</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px"}}>
                  {REGIONS.map((r,i) => (
                    <div key={r}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
                        <span style={{fontSize:"8px",color:SOFT}}>{r}</span>
                        <span style={{fontSize:"8px",color:pops[i]>=0?cand.color:"#c4605a",fontWeight:"bold"}}>{pops[i]>0?"+":""}{pops[i]}</span>
                      </div>
                      <div style={{height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                        <div style={{width:popPct(pops[i])+"%",height:"100%",background:pops[i]>=0?cand.color:"#c4605a",borderRadius:"2px"}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Delete */}
            <div style={{padding:"10px 12px",background:"rgba(196,96,90,0.04)",border:"1px solid rgba(196,96,90,0.15)",borderRadius:"5px"}}>
              <ConfirmDelete onDelete={deleteParty}/>
            </div>
          </div>

          {/* RIGHT: Laws & Actions */}
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>

            {/* Laws */}
            <div style={{padding:"14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px"}}>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>
                Enacted Laws <span style={{color:SOFT,fontSize:"9px",letterSpacing:"0",textTransform:"none",marginLeft:"6px"}}>{cand.laws.length} on record</span>
              </div>
              {cand.laws.length === 0 ? (
                <div style={{textAlign:"center",padding:"16px",color:DIM,fontSize:"10px",fontStyle:"italic"}}>No laws enacted</div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                  {cand.laws.map(law => {
                    const hasBonus  = law.effects.some(e=>e.type==="bonus");
                    const hasMalus  = law.effects.some(e=>e.type==="malus");
                    const typeColor = hasBonus&&hasMalus?"#c4a96b":hasBonus?"#80c890":"#e08060";
                    const typeLabel = hasBonus&&hasMalus?"Reform":hasBonus?"Progressive":"Restrictive";
                    const age       = Math.max(0, turn - (law.enactedTurn || 1));
                    const expired   = age >= 12;
                    const turnsLeft = Math.max(0, (law.enactedTurn||1) + 12 - turn);
                    const expColor  = turnsLeft <= 2 ? "#c4605a" : turnsLeft <= 4 ? "#c9a84c" : "#6db87a";
                    return (
                      <div key={law.id} style={{padding:"10px 12px",background:"rgba(255,255,255,0.015)",
                        borderLeft:`3px solid ${expired?"#5a4a30":cand.color}`,border:`1px solid ${cand.color}18`,borderRadius:"3px",
                        display:"flex",alignItems:"flex-start",gap:"8px",opacity:expired?0.45:1}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px",flexWrap:"wrap"}}>
                            <span style={{fontSize:"12px",color:"#e8dcc8"}}>{law.name}</span>
                            <span style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",
                              background:typeColor+"18",border:`1px solid ${typeColor}44`,color:typeColor}}>{typeLabel}</span>
                            {expired
                              ? <span style={{fontSize:"8px",color:"#c4605a",border:"1px solid rgba(200,80,60,0.3)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>EXPIRED</span>
                              : <span style={{fontSize:"8px",color:expColor,border:`1px solid ${expColor}44`,borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>T+{turnsLeft}</span>
                            }
                          </div>
                          {law.desc&&<div style={{fontSize:"10px",color:SOFT,fontStyle:"italic",marginBottom:"5px"}}>{law.desc}</div>}
                          <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                            {law.effects.map(({classIdx,type},i) => {
                              const ant = ANTAGONISTS[classIdx];
                              return [
                                <span key={`d${i}`} style={{fontSize:"8px",padding:"2px 6px",borderRadius:"3px",
                                  background:type==="bonus"?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                                  border:`1px solid ${type==="bonus"?"rgba(80,160,100,0.25)":"rgba(200,80,60,0.25)"}`,
                                  color:type==="bonus"?"#80c890":"#e08060"}}>
                                  {type==="bonus"?"+":"−"} {CLASSES[classIdx]}
                                </span>,
                                ant!==undefined && <span key={`a${i}`} style={{fontSize:"8px",padding:"2px 6px",borderRadius:"3px",
                                  background:type==="bonus"?"rgba(200,80,60,0.07)":"rgba(80,160,100,0.07)",
                                  border:`1px solid ${type==="bonus"?"rgba(200,80,60,0.18)":"rgba(80,160,100,0.18)"}`,
                                  color:type==="bonus"?"#c47a5a":"#6db87a",opacity:.8}}>
                                  {type==="bonus"?"−":"+"} {CLASSES[ant]}
                                </span>
                              ];
                            })}
                          </div>
                        </div>
                        <button onClick={()=>removeLaw(law.id)}
                          style={{flexShrink:0,padding:"3px 7px",cursor:"pointer",
                            background:"rgba(200,60,60,0.07)",border:"1px solid rgba(200,60,60,0.2)",
                            borderRadius:"3px",color:"#c4605a",fontSize:"10px",fontFamily:"Georgia,serif"}}>✕</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Campaign actions */}
            <div style={{padding:"14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"5px"}}>
              <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"10px"}}>
                Campaign Actions <span style={{color:SOFT,fontSize:"9px",letterSpacing:"0",textTransform:"none",marginLeft:"6px"}}>{(cand.actions||[]).length} on record</span>
              </div>
              {(cand.actions||[]).length === 0 ? (
                <div style={{textAlign:"center",padding:"16px",color:DIM,fontSize:"10px",fontStyle:"italic"}}>No actions recorded</div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                  {(cand.actions||[]).map(act => {
                    const nonzero = act.bonuses.map((b,i)=>({r:REGIONS[i],b})).filter(x=>x.b!==0);
                    return (
                      <div key={act.id} style={{padding:"9px 11px",background:"rgba(255,255,255,0.015)",
                        border:"1px solid rgba(255,255,255,0.06)",borderRadius:"3px",
                        display:"flex",alignItems:"flex-start",gap:"8px"}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px"}}>
                            <span style={{fontSize:"12px",color:"#e8dcc8"}}>{act.name}</span>
                            <span style={{fontSize:"8px",color:DIM,border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px",padding:"1px 5px"}}>{act.type}</span>
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                            {nonzero.map(({r,b})=>(
                              <span key={r} style={{fontSize:"8px",padding:"2px 6px",borderRadius:"3px",
                                background:b>0?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                                border:`1px solid ${b>0?"rgba(80,160,100,0.25)":"rgba(200,80,60,0.25)"}`,
                                color:b>0?"#80c890":"#e08060"}}>
                                {r} {b>0?"+":""}{b}
                              </span>
                            ))}
                          </div>
                        </div>
                        <button onClick={()=>removeAct(act.id)}
                          style={{flexShrink:0,padding:"3px 7px",cursor:"pointer",
                            background:"rgba(200,60,60,0.07)",border:"1px solid rgba(200,60,60,0.2)",
                            borderRadius:"3px",color:"#c4605a",fontSize:"10px",fontFamily:"Georgia,serif"}}>✕</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Two-click delete — no window.confirm needed
function ConfirmDelete({onDelete}) {
  const [armed, setArmed] = useState(false);
  if (!armed) return (
    <button onClick={()=>setArmed(true)}
      style={{padding:"3px 10px",cursor:"pointer",background:"rgba(200,60,60,0.08)",
        border:"1px solid rgba(200,60,60,0.2)",borderRadius:"3px",color:"#c4605a",
        fontSize:"10px",flexShrink:0}}>✕</button>
  );
  return (
    <div style={{display:"flex",gap:"4px",flexShrink:0}}>
      <button onClick={onDelete}
        style={{padding:"3px 10px",cursor:"pointer",background:"rgba(200,60,60,0.25)",
          border:"1px solid rgba(200,60,60,0.5)",borderRadius:"3px",color:"#e87070",
          fontSize:"10px",fontWeight:"bold"}}>Delete</button>
      <button onClick={()=>setArmed(false)}
        style={{padding:"3px 8px",cursor:"pointer",background:"none",
          border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:"#6a5a3a",fontSize:"10px"}}>Cancel</button>
    </div>
  );
}

// ── NATION EDITOR ─────────────────────────────────────────────────────────────
function NationEditor({nation, onChange, onDelete, wars, deals, nations}) {
  const [tab, setTab] = useState("stats"); // "stats" | "regions" | "diplo"
  const [newRegName, setNewRegName] = useState("");
  const [newRegPop,  setNewRegPop]  = useState(2);

  const upd = patch => onChange({...nation, ...patch});
  const adjStat = (key, d, lo=0, hi=50) =>
    upd({[key]: Math.max(lo, Math.min(hi, (nation[key]||0) + d))});

  const addRegion = () => {
    if (!newRegName.trim()) return;
    upd({regions: [...(nation.regions||[]), {id: Date.now(), name: newRegName.trim(), pop: newRegPop}]});
    setNewRegName(""); setNewRegPop(2);
  };
  const removeRegion = id => upd({regions: (nation.regions||[]).filter(r => r.id !== id)});
  const adjRegPop = (id, d) => upd({regions: (nation.regions||[]).map(r =>
    r.id===id ? {...r, pop: Math.max(1, Math.min(10, (r.pop||1)+d))} : r
  )});

  const { pop, eco, milStr, avail } = calcNationEco(nation);
  const az = nation.diplo?.azzuria ?? 0;
  const atWar = (wars||[]).some(w => w.attId===nation.id || w.defId===nation.id);

  return (
    <div style={{background:`${nation.color}08`, border:`1px solid ${nation.color}30`,
      borderTop:`3px solid ${nation.color}`, borderRadius:"5px", overflow:"hidden"}}>

      {/* Header */}
      <div style={{padding:"12px 16px", display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap",
        borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <input type="color" value={nation.color}
          onChange={e=>upd({color:e.target.value})}
          style={{width:"28px",height:"28px",border:"none",borderRadius:"3px",cursor:"pointer",padding:0,background:"none",flexShrink:0}}/>
        <input value={nation.name} onChange={e=>upd({name:e.target.value})}
          style={{flex:1,minWidth:"100px",padding:"4px 8px",background:"rgba(255,255,255,0.05)",
            border:`1px solid ${nation.color}44`,borderRadius:"3px",
            color:nation.color,fontFamily:"Georgia,serif",fontSize:"15px"}}/>
        <select value={nation.regime||""} onChange={e=>upd({regime:e.target.value})}
          style={{padding:"4px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",
            borderRadius:"3px",color:SOFT,fontFamily:"Georgia,serif",fontSize:"10px",flexShrink:0}}>
          {REGIME_TYPES.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        {atWar && <span style={{fontSize:"9px",color:"#c4605a",border:"1px solid rgba(196,96,90,0.35)",borderRadius:"3px",padding:"2px 7px",flexShrink:0}}>⚔ At War</span>}
        <ConfirmDelete onDelete={onDelete}/>
      </div>

      {/* Sub-tabs */}
      <div style={{display:"flex", borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        {[["stats","Stats"],["regions","Regions"],["diplo","Diplomacy"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"7px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
              letterSpacing:"2px",textTransform:"uppercase",background:"none",border:"none",
              borderBottom:`2px solid ${tab===k?nation.color:"transparent"}`,
              color:tab===k?"#e8dcc8":DIM}}>
            {l}
          </button>
        ))}
      </div>

      {/* Stats tab */}
      {tab==="stats" && (
        <div style={{padding:"14px 16px"}}>
          {/* Derived stats bar */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(70px,1fr))",gap:"6px",marginBottom:"14px"}}>
            {[["Population",pop,"#e8dcc8"],["Economy",eco,eco>0?"#c9a84c":"#c4605a"],
              ["Mil Str",milStr,"#c47a5a"],["Avail",avail,"#4a90c0"]].map(([l,v,c])=>(
              <div key={l} style={{textAlign:"center",padding:"7px",background:"rgba(0,0,0,0.2)",borderRadius:"3px"}}>

                color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px",textAlign:"center"}}/>
            <button onClick={addRegion}

                          <button key={v} onClick={()=>upd({standingVs:{...(nation.standingVs||{}),[other.id]:v}})}

                              background:sv===v?dcol+"22":"transparent",
                              border:`1px solid ${sv===v?dcol:"rgba(255,255,255,0.07)"}`,
                              color:sv===v?dcol:DIM}}>{v}</button>
                        ))}
                      </div>
                      <span style={{fontSize:"8px",color:dcol,minWidth:"38px",textAlign:"right"}}>{dlbl.slice(0,5)}</span>

              </div>

          {(wars||[]).filter(w=>w.attId===nation.id||w.defId===nation.id).length > 0 && (
            <div style={{marginBottom:"10px"}}>
              <div style={{fontSize:"8px",color:"#c4605a",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Active Wars</div>

                const oId = w.attId===nation.id ? w.defId : w.attId;

                  <div key={w.id} style={{marginBottom:"5px",padding:"7px 10px",
                    background:"rgba(196,96,90,0.06)",border:"1px solid rgba(196,96,90,0.2)",

                    fontSize:"10px",color:SOFT}}>
                    {isAtt?"⚔ Attacking":"🛡 Defending vs"} <span style={{color:"#e8dcc8"}}>{oName}</span>
                    {" — score "}{w.score>0?"+":""}{w.score||0}{", turn "}{w.turns||0}

          {(deals||[]).filter(d=>d.aId===nation.id||d.bId===nation.id).length > 0 && (
            <div style={{marginBottom:"10px"}}>
              <div style={{fontSize:"8px",color:"#6db87a",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Trade Deals</div>
