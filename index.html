      { id:"pm_unity",     label:"Call for Unity",       desc:"Lower the most agitated class by 1.", type:"auto" },
      { id:"pm_stability", label:"Royal Proclamation",   desc:"Lower all class agitation by 1.", type:"auto" },
      { id:"pm_peace",     label:"Offer Peace Treaty",   desc:"Resolve an active war based on current score.", type:"pickWar" },
    ]
  },
  { id:"interior", title:"Interior Minister",   desc:"Internal order and administration.",
    actions:[
      { id:"int_suppress", label:"Suppress Unrest",      desc:"Lower one class's agitation by 1.", type:"pickClass" },
      { id:"int_expand",   label:"Impose Order",         desc:"Lower one class's agitation by 2.", type:"pickClass" },
    ]
  },
  { id:"trade",    title:"Minister of Trade",   desc:"Commerce and tariff policy.",
    actions:[
      { id:"trd_deal",     label:"Negotiate Trade Deal", desc:"Open a trade deal with a nation (requires standing ≥ 0).", type:"pickNation" },
      { id:"trd_cancel",   label:"Cancel Trade Deal",    desc:"End an active trade deal.", type:"pickDeal" },
      { id:"trd_tariff_up",label:"Raise Tariffs",        desc:"+1 tariff level: agitates Merchants, Bureaucrats, Industrialists, Rural Workers and Factory Workers.", type:"auto" },
      { id:"trd_tariff_dn",label:"Lower Tariffs",        desc:"−1 tariff level: calms the same classes and improves standing with trade partners.", type:"auto" },
    ]
  },
  { id:"war",      title:"War Minister",        desc:"Commands the armed forces.",
    actions:[
      { id:"war_fund",     label:"Fund Military",        desc:"+1 Military Investment.", type:"auto" },
      { id:"war_defund",   label:"Defund Military",      desc:"−1 Military Investment.", type:"auto" },
    ]
  },
  { id:"works",    title:"Public Works",        desc:"Infrastructure and development.",
    actions:[
      { id:"wrk_invest",   label:"Invest in Region",     desc:"+1 population in a chosen nation region.", type:"pickNation" },
    ]
  },
  { id:"foreign",  title:"Foreign Affairs",     desc:"Diplomatic relations.",
    actions:[
      { id:"for_envoy",    label:"Send Envoy",            desc:"Improve standing +1 with a nation.", type:"pickNation", delta:+1 },
      { id:"for_condemn",  label:"Issue Condemnation",    desc:"Worsen standing −1 with a nation.", type:"pickNationReason", delta:-1 },
    ]
  },
  { id:"church",   title:"Minister of Religion",desc:"Church relations and public morale.",
    actions:[
      { id:"chu_soothe",   label:"Pastoral Address",     desc:"Lower any one class's agitation by 1.", type:"pickClass" },
      { id:"chu_feast",    label:"Religious Festival",   desc:"Lower Church and Rural Workers agitation by 1 each.", type:"auto" },
    ]
  },
  { id:"justice",  title:"Justice Minister",    desc:"Courts and the rule of law.",
    actions:[
      { id:"jus_reform",   label:"Legal Review",         desc:"Lower any one class's agitation by 1.", type:"pickClass" },
      { id:"jus_enforce",  label:"Enforce the Law",      desc:"Lower Rural Workers and Factory Workers agitation by 1 each.", type:"auto" },
    ]
  },
  { id:"education",title:"Education Minister",  desc:"Schools, universities and literacy.",
    actions:[
      { id:"edu_school",    label:"Literacy Campaign",   desc:"Lower any one class's agitation by 1.", type:"pickClass" },
      { id:"edu_vocational",label:"Skills Programme",    desc:"Lower Factory Workers agitation by 1.", type:"auto" },
    ]
  },
];

function GovernmentTab({candidates, government, setGovernment, setData, turn, agitation, setAgitation, nations, setNations, wars, setWars, deals, setDeals}) {
  const season = getSeason(turn), year = getYear(turn);
  const [editMinistry, setEditMinistry] = useState(null); // ministry id being assigned
  const [showDecreeForm, setShowDecreeForm] = useState(false);
  const [decreeName,   setDecreeName]   = useState("");
  const [decreeDesc,   setDecreeDesc]   = useState("");
  const [decreeFx,     setDecreeFx]     = useState(CLASSES.map(() => "neutral"));
  const [decreeRegion, setDecreeRegion] = useState("all");
  // Extended decree powers
  const [decreeAgitClass,   setDecreeAgitClass]   = useState(-1);   // -1 = none
  const [decreeAgitDir,     setDecreeAgitDir]     = useState(-1);   // -1 lower, +1 raise
  const [decreeDiploNation, setDecreeDiploNation] = useState("");
  const [decreeDiploDir,    setDecreeDiploDir]    = useState(+1);
  const [decreeMilDelta,    setDecreeMilDelta]    = useState(0);    // -1, 0, +1
  const [decreeTariffDelta, setDecreeTariffDelta] = useState(0);   // -1, 0, +1
  const decreeLimit = 1; // Queen may issue 1 decree per turn
  const decreesThisTurn = (government.decrees||[]).filter(d=>d.turn===turn).length;

  const pm = government.pm ? candidates.find(c => c.id === government.pm) : null;

  // ministerialUsed: { [ministryId]: turnNumber } — reset each turn naturally by comparing to current turn
  const hasActed   = (mid) => (government.ministerialUsed || {})[mid] === turn;
  const markActed  = (mid) => setGovernment(g => ({...g, ministerialUsed:{...(g.ministerialUsed||{}), [mid]: turn}}));

  // picker state: {ministryId, action, reasonIdx?}
  const [activePicker, setActivePicker] = useState(null);
  const [condemnReason, setCondemnReason] = useState(0);
  const CONDEMN_REASONS = [
    "Rival's ally — your enemy's friend cannot be trusted.",
    "Economic competition — their trade undermines our interests.",
    "Border tensions — disputed territory and frontier incidents.",
    "Ideological threat — their regime spreads dangerous ideas.",
    "Military threat — their arms build-up is destabilising.",
    "Treaty violation — they have dishonoured prior agreements.",
  ];

  // Helper: envoy suggestions — prioritise low-standing nations and active partners
  const getEnvoySuggestions = () => {
    return (nations||[]).map(n => {
      const st = n.diplo?.azzuria ?? 0;
      const hasDeal = (deals||[]).some(d => (d.aId===n.id||d.bId===n.id) && (d.aId==="azzuria"||d.bId==="azzuria"));
      const atWar   = (wars||[]).some(w => w.attId===n.id||w.defId===n.id);
      const reason  = atWar ? "At war — improve for peace talks" :
                      hasDeal ? "Active trade partner" :
                      st < 0 ? "Reduce hostility" :
                      st < 3 ? "Strengthen ties" : "Already allied";
      return {n, st, hasDeal, atWar, reason};
    }).sort((a,b) => a.st - b.st); // lowest standing first
  };

  const execAction = (ministryId, action, extra) => {
    switch(action.id) {

      // ── PM ────────────────────────────────────────────────────────
      case "pm_unity": {
        const maxAgit = Math.max(...agitation);
        if (maxAgit === 0) break;
        const idx = agitation.indexOf(maxAgit);
        setAgitation(p => { const n=[...p]; n[idx]=Math.max(0,n[idx]-1); return n; });
        break;
      }
      case "pm_stability": {
        // Royal Proclamation: calm all classes by 1 (governance, not campaigning)
        setAgitation(p => p.map(a => Math.max(0, a - 1)));
        break;
      }
      case "pm_peace": {
        if (!extra?.warId) { setActivePicker({ministryId, action, step:"war"}); return; }
        const war = (wars||[]).find(w=>w.id===extra.warId);
        if (!war) break;
        const score = war.score || 0;
        const WAR_OUTCOMES = [
          {min:5,  label:"Decisive attacker victory", defPopDelta:-2},
          {min:3,  label:"Attacker victory",          defPopDelta:-1},
          {min:1,  label:"Minor attacker advantage",  defPopDelta:-1},
          {min:-1, label:"White peace",               defPopDelta:0},
          {min:-3, label:"Minor defender advantage",  attPopDelta:-1},
          {min:-5, label:"Defender victory",          attPopDelta:-1},
          {min:-99,label:"Decisive defender victory", attPopDelta:-2},
        ];
        const outcome = WAR_OUTCOMES.find(o => score >= o.min) || WAR_OUTCOMES[WAR_OUTCOMES.length-1];
        const applyPeace = (nId, popDelta) => {
          if (!nId || nId==="azzuria") return;
          setNations(prev => prev.map(n => {
            if (n.id !== nId) return n;
            let regions = n.regions||[];
            if (popDelta < 0 && regions.length) {
              const biggest = regions.reduce((a,b)=>(a.pop||1)>(b.pop||1)?a:b);
              regions = regions.map(r=>r.id===biggest.id?{...r,pop:Math.max(1,(r.pop||1)+popDelta)}:r);
            }
            return {...n, regions, unrest:Math.min(10,(n.unrest||0)+1),
              events:[{season:getSeason(turn),year:getYear(turn),action:`Peace: ${outcome.label}`},...(n.events||[]).slice(0,9)]};
          }));
        };
        applyPeace(war.defId, outcome.defPopDelta||0);
        applyPeace(war.attId, outcome.attPopDelta||0);
        setWars(prev => prev.filter(w=>w.id!==extra.warId));
        break;
      }

      // ── INTERIOR ─────────────────────────────────────────────────
      case "int_suppress": {
        if (extra?.classIdx == null) { setActivePicker({ministryId, action}); return; }
        setAgitation(p => { const n=[...p]; n[extra.classIdx]=Math.max(0,n[extra.classIdx]-1); return n; });
        break;
      }
      case "int_expand": {
        if (extra?.classIdx == null) { setActivePicker({ministryId, action}); return; }
        setAgitation(p => { const n=[...p]; n[extra.classIdx]=Math.max(0,n[extra.classIdx]-2); return n; });
        break;
      }

      // ── TRADE ────────────────────────────────────────────────────
      case "trd_deal": {
        if (!extra?.nationId) { setActivePicker({ministryId, action}); return; }
        const tgt = (nations||[]).find(n=>n.id===extra.nationId);
        if (!tgt || (tgt.diplo?.azzuria??0) < 0) break;
        const already = (deals||[]).some(d=>(d.aId===extra.nationId||d.bId===extra.nationId)&&(d.aId==="azzuria"||d.bId==="azzuria"));
        if (already) break;
        setDeals(prev => [...prev, {id:Date.now(), aId:"azzuria", bId:extra.nationId, turnsLeft:6}]);
        break;
      }
      case "trd_cancel": {
        if (!extra?.dealId) { setActivePicker({ministryId, action}); return; }
        setDeals(prev => prev.filter(d=>d.id!==extra.dealId));
        break;
      }
      case "trd_tariff_up": {
        setGovernment(g => ({...g, tariffs: Math.min(5, (g.tariffs||0)+1)}));
        // Agitates: Merchants(2), Bureaucrats(1), Industrialists(3), Rural Workers(6), Factory Workers(7)
        setAgitation(p => {
          const n=[...p];
          [1,2,3,6,7].forEach(i => { n[i]=Math.min(6,n[i]+1); });
          return n;
        });
        const partnerIds = (deals||[])
          .filter(d=>d.aId==="azzuria"||d.bId==="azzuria")
          .map(d=>d.aId==="azzuria"?d.bId:d.aId);
        if (partnerIds.length) setNations(prev => prev.map(n =>
          partnerIds.includes(n.id)
            ? {...n, diplo:{...(n.diplo||{}), azzuria: Math.max(-3,(n.diplo?.azzuria||0)-1)}}
            : n
        ));
        break;
      }
      case "trd_tariff_dn": {
        setGovernment(g => ({...g, tariffs: Math.max(0, (g.tariffs||0)-1)}));
        setAgitation(p => {
          const n=[...p];
          [1,2,3,6,7].forEach(i => { n[i]=Math.max(0,n[i]-1); });
          return n;
        });
        const partnerIds2 = (deals||[])
          .filter(d=>d.aId==="azzuria"||d.bId==="azzuria")
          .map(d=>d.aId==="azzuria"?d.bId:d.aId);
        if (partnerIds2.length) setNations(prev => prev.map(n =>
          partnerIds2.includes(n.id)
            ? {...n, diplo:{...(n.diplo||{}), azzuria: Math.min(3,(n.diplo?.azzuria||0)+1)}}
            : n
        ));
        break;
      }

      // ── WAR ──────────────────────────────────────────────────────
      case "war_fund": {
        setGovernment(g => ({...g, azzuriaMilInvest: Math.min(10,(g.azzuriaMilInvest||0)+1)}));
        break;
      }
      case "war_defund": {
        setGovernment(g => ({...g, azzuriaMilInvest: Math.max(0,(g.azzuriaMilInvest||0)-1)}));
        break;
      }

      // ── PUBLIC WORKS ─────────────────────────────────────────────
      case "wrk_invest": {
        // Step 1: pick nation. Step 2: pick one of its regions. Adds +1 pop immediately.
        if (!extra?.nationId) { setActivePicker({ministryId, action, step:"nation"}); return; }
        if (!extra?.regionId) { setActivePicker({ministryId, action, step:"region", nationId:extra.nationId}); return; }
        setNations(prev => prev.map(n => {
          if (n.id !== extra.nationId) return n;
          return {...n, regions: (n.regions||[]).map(r =>
            r.id === extra.regionId ? {...r, pop: Math.min(10, (r.pop||1)+1)} : r
          )};
        }));
        break;
      }

      // ── FOREIGN AFFAIRS ──────────────────────────────────────────
      case "for_envoy": {
        if (!extra?.nationId) { setActivePicker({ministryId, action}); return; }
        setNations(prev => prev.map(n => n.id!==extra.nationId ? n : {
          ...n, diplo:{...(n.diplo||{}), azzuria: Math.max(-3,Math.min(3,(n.diplo?.azzuria||0)+1))}
        }));
        break;
      }
      case "for_condemn": {
        if (extra?.reasonIdx == null) { setActivePicker({ministryId, action, step:"reason"}); return; }
        if (!extra?.nationId) { setActivePicker({ministryId, action, step:"nation", reasonIdx:extra.reasonIdx}); return; }
        setNations(prev => prev.map(n => {
          if (n.id !== extra.nationId) return n;
          const newSt = Math.max(-3, Math.min(3, (n.diplo?.azzuria||0) - 1));
          if (newSt < 0) setDeals(prev2 => prev2.filter(d=>d.aId!==n.id&&d.bId!==n.id));
          return {...n, diplo:{...(n.diplo||{}), azzuria: newSt},
            condemnLog:[{turn, reason:CONDEMN_REASONS[extra.reasonIdx]}, ...(n.condemnLog||[]).slice(0,4)]};
        }));
        break;
      }

      // ── RELIGION ─────────────────────────────────────────────────
      case "chu_soothe": {
        if (extra?.classIdx == null) { setActivePicker({ministryId, action}); return; }
        setAgitation(p => { const n=[...p]; n[extra.classIdx]=Math.max(0,n[extra.classIdx]-1); return n; });
        break;
      }
      case "chu_feast": {
        setAgitation(p => { const n=[...p]; n[4]=Math.max(0,n[4]-1); n[6]=Math.max(0,n[6]-1); return n; });
        break;
      }

      // ── JUSTICE ──────────────────────────────────────────────────
      case "jus_reform": {
        if (extra?.classIdx == null) { setActivePicker({ministryId, action}); return; }
        setAgitation(p => { const n=[...p]; n[extra.classIdx]=Math.max(0,n[extra.classIdx]-1); return n; });
        break;
      }
      case "jus_enforce": {
        setAgitation(p => { const n=[...p]; n[6]=Math.max(0,n[6]-1); n[7]=Math.max(0,n[7]-1); return n; });
        break;
      }

      // ── EDUCATION ────────────────────────────────────────────────
      case "edu_school": {
        if (extra?.classIdx == null) { setActivePicker({ministryId, action}); return; }
        setAgitation(p => { const n=[...p]; n[extra.classIdx]=Math.max(0,n[extra.classIdx]-1); return n; });
        break;
      }
      case "edu_vocational": {
        setAgitation(p => { const n=[...p]; n[7]=Math.max(0,n[7]-1); return n; });
        break;
      }

      default: break;
    }
    markActed(ministryId);
    setActivePicker(null);
  };

  const assignMinistry = (ministryId, candId) => {
    setGovernment(g => ({...g, [ministryId]: candId || null}));
    setEditMinistry(null);
  };

  const addDecree = () => {
    if (!decreeName.trim()) return;
    if (decreesThisTurn >= decreeLimit) return;
    const effects = decreeFx.map((e,i) => ({classIdx:i,type:e})).filter(e => e.type !== "neutral");
    const decree = {
      id: Date.now(),
      name: decreeName.trim(),
      desc: decreeDesc.trim(),
      effects,
      region: decreeRegion,
      status: "pending",
      turn,
      // Extended powers
      agitClass:   decreeAgitClass >= 0 ? decreeAgitClass : null,
      agitDir:     decreeAgitClass >= 0 ? decreeAgitDir : null,
      diploNation: decreeDiploNation || null,
      diploDir:    decreeDiploNation ? decreeDiploDir : null,
      milDelta:    decreeMilDelta || null,
      tariffDelta: decreeTariffDelta || null,
    };
    setGovernment(g => ({...g, decrees:[...(g.decrees||[]), decree]}));
    // Reset form
    setDecreeName(""); setDecreeDesc(""); setDecreeFx(CLASSES.map(()=>"neutral")); setDecreeRegion("all");
    setDecreeAgitClass(-1); setDecreeAgitDir(-1); setDecreeDiploNation(""); setDecreeDiploDir(+1);
    setDecreeMilDelta(0); setDecreeTariffDelta(0);
    setShowDecreeForm(false);
  };

  const resolveDecree = (did, resolution) => {
    const decree = (government.decrees||[]).find(d => d.id===did);
    if (resolution === "passed" && decree) {
      // Class influence effects
      if (decree.effects && decree.effects.length) {
        setData(prev => {
          const next = prev.map(row => [...row]);
          decree.effects.forEach(({classIdx, type}) => {
            const delta = type==="bonus" ? +1 : -1;
            const ant = ANTAGONISTS[classIdx];
            if (decree.region === "all") {
              next[classIdx] = next[classIdx].map(v => Math.max(1, Math.min(10, v + delta)));
              if (ant !== undefined) next[ant] = next[ant].map(v => Math.max(1, Math.min(10, v - delta)));
            } else {
              next[classIdx][decree.region] = Math.max(1, Math.min(10, next[classIdx][decree.region] + delta));
              if (ant !== undefined) next[ant][decree.region] = Math.max(1, Math.min(10, next[ant][decree.region] - delta));
            }
          });
          return next;
        });
      }
      // Agitation effect
      if (decree.agitClass != null) {
        setAgitation(p => { const n=[...p]; n[decree.agitClass]=Math.max(0,Math.min(6,n[decree.agitClass]+decree.agitDir)); return n; });
      }
      // Diplomatic effect
      if (decree.diploNation) {
        setNations(prev => prev.map(n => n.id!==decree.diploNation ? n : {
          ...n, diplo:{...(n.diplo||{}), azzuria: Math.max(-3,Math.min(3,(n.diplo?.azzuria||0)+decree.diploDir))}
        }));
      }
      // Military investment
      if (decree.milDelta) {
        setGovernment(g => ({...g, azzuriaMilInvest: Math.max(0,Math.min(10,(g.azzuriaMilInvest||0)+decree.milDelta))}));
      }
      // Tariff adjustment
      if (decree.tariffDelta) {
        setGovernment(g => ({...g, tariffs: Math.max(0,Math.min(5,(g.tariffs||0)+decree.tariffDelta))}));
        // Tariff agitation side-effects
        const agitDelta = decree.tariffDelta > 0 ? 1 : -1;
        setAgitation(p => { const n=[...p]; [1,2,3,6,7].forEach(i=>{n[i]=Math.max(0,Math.min(6,n[i]+agitDelta));}); return n; });
      }
    }
    setGovernment(g => ({...g, decrees: (g.decrees||[]).map(d => d.id===did ? {...d, status:resolution} : d)}));
  };

  const removeDecree = did => setGovernment(g => ({...g, decrees:(g.decrees||[]).filter(d=>d.id!==did)}));

  const pendingDecrees  = (government.decrees||[]).filter(d => d.status==="pending");
  const resolvedDecrees = (government.decrees||[]).filter(d => d.status!=="pending");

  return (
    <div style={{maxWidth:"720px",margin:"0 auto",padding:"16px 12px"}}>

      {/* ── header ── */}
      <div style={{textAlign:"center",marginBottom:"28px"}}>
        <div style={{fontSize:"9px",letterSpacing:"6px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Royal Government</div>
        <div style={{fontSize:"22px",color:"#e8dcc8",letterSpacing:"3px",textTransform:"uppercase"}}>Kingdom of Azzuria</div>
        <div style={{fontSize:"10px",color:GOLD,letterSpacing:"3px",marginTop:"4px"}}>{season} {year}</div>
        <div style={{width:"60px",height:"1px",background:"linear-gradient(to right,transparent,"+GOLD+",transparent)",margin:"12px auto 0"}}/>
      </div>

      {/* ── Azzuria nation editor ── */}
      {(() => {
        const az = government.azzuria || {
          regions: [], productivity: 2, milInvest: government.azzuriaMilInvest || 0,
          unrest: 0, desc: ""
        };
        const updAz = patch => setGovernment(g => ({...g, azzuria: {...(g.azzuria||{}), ...patch}}));
        const adjAzStat = (key, d, lo, hi) =>
          updAz({[key]: Math.max(lo, Math.min(hi, (az[key]||0)+d))});
        const azPop  = (az.regions||[]).reduce((s,r)=>s+(r.pop||1),0);
        const azProd = az.productivity || 2;
        const azMil  = az.milInvest ?? (government.azzuriaMilInvest||0);
        const azUnr  = az.unrest || 0;
        const azEco  = Math.max(0, azPop*azProd - azMil*0.5 - azUnr*1.5);
        const azMilStr = Math.round((azEco/2 + azMil)*10)/10;
        const azAvail  = Math.max(0, Math.round((azMilStr - Math.floor(azUnr/2))*10)/10);
        const [azTab, setAzTab] = React.useState("stats");
        const [newRegN, setNewRegN] = React.useState("");
        const [newRegP, setNewRegP] = React.useState(2);
        const addAzRegion = () => {
          if (!newRegN.trim()) return;
          updAz({regions:[...(az.regions||[]),{id:Date.now(),name:newRegN.trim(),pop:newRegP}]});
          setNewRegN(""); setNewRegP(2);
        };
        const adjAzRegPop = (id,d) => updAz({regions:(az.regions||[]).map(r=>r.id===id?{...r,pop:Math.max(1,Math.min(10,(r.pop||1)+d))}:r)});
        const removeAzRegion = id => updAz({regions:(az.regions||[]).filter(r=>r.id!==id)});
        return (
          <div style={{marginBottom:"24px",background:`rgba(201,168,76,0.04)`,border:"1px solid rgba(201,168,76,0.2)",borderTop:"3px solid rgba(201,168,76,0.6)",borderRadius:"5px",overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"9px",letterSpacing:"4px",color:GOLD,textTransform:"uppercase",flex:1}}>Kingdom of Azzuria</span>
              {(wars||[]).some(w=>w.attId==="azzuria"||w.defId==="azzuria") && <span style={{fontSize:"9px",color:"#c4605a",border:"1px solid rgba(196,96,90,0.35)",borderRadius:"3px",padding:"2px 7px"}}>⚔ At War</span>}
            </div>
            {/* Derived stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(70px,1fr))",gap:"6px",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              {[["Population",azPop,"#e8dcc8"],["Economy",Math.round(azEco*10)/10,azEco>0?"#c9a84c":"#c4605a"],["Mil Str",azMilStr,"#c47a5a"],["Avail",azAvail,"#4a90c0"]].map(([l,v,c])=>(
                <div key={l} style={{textAlign:"center",padding:"6px",background:"rgba(0,0,0,0.2)",borderRadius:"3px"}}>
                  <div style={{fontSize:"7px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"3px"}}>{l}</div>
                  <div style={{fontSize:"16px",color:c,fontFamily:"Georgia,serif"}}>{v}</div>
                </div>
              ))}
            </div>
            {/* Sub-tabs */}
            <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              {[["stats","Stats"],["regions","Regions"]].map(([k,l])=>(
                <button key={k} onClick={()=>setAzTab(k)}
                  style={{flex:1,padding:"7px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                    letterSpacing:"2px",textTransform:"uppercase",background:"none",border:"none",
                    borderBottom:`2px solid ${azTab===k?GOLD:"transparent"}`,color:azTab===k?"#e8dcc8":DIM}}>
                  {l}
                </button>
              ))}
            </div>
            {azTab==="stats" && (
              <div style={{padding:"12px 16px"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:"8px",marginBottom:"10px"}}>
                  {[
                    {label:"Productivity",key:"productivity",lo:1,hi:5,val:azProd,hint:"1–5 · econ multiplier"},
                    {label:"Mil. Investment",key:"milInvest",lo:0,hi:20,val:azMil,hint:"Direct mil boost"},
                    {label:"Unrest",key:"unrest",lo:0,hi:10,val:azUnr,hint:"Hurts eco + avail"},
                  ].map(s=>(
                    <div key={s.key} style={{padding:"9px 10px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"3px"}}>
                      <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>{s.label}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                        <AdjBtn onClick={()=>adjAzStat(s.key,-1,s.lo,s.hi)} red>-</AdjBtn>
                        <span style={{fontSize:"18px",fontWeight:"bold",color:"#e8dcc8",flex:1,textAlign:"center"}}>{s.val}</span>
                        <AdjBtn onClick={()=>adjAzStat(s.key,+1,s.lo,s.hi)}>+</AdjBtn>
                      </div>
                      <div style={{fontSize:"8px",color:DIM,marginTop:"4px",textAlign:"center"}}>{s.hint}</div>
                    </div>
                  ))}
                </div>
                <textarea value={az.desc||""} onChange={e=>updAz({desc:e.target.value})}
                  placeholder="Kingdom description (optional)…" rows={2}
                  style={{width:"100%",padding:"6px 8px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px",color:SOFT,fontFamily:"Georgia,serif",fontSize:"11px",resize:"vertical",lineHeight:"1.5"}}/>
              </div>
            )}
            {azTab==="regions" && (
              <div style={{padding:"12px 16px"}}>
                <div style={{fontSize:"9px",color:DIM,marginBottom:"8px",letterSpacing:"1px"}}>Each region contributes population. Pop × Productivity = base economy.</div>
                {(az.regions||[]).length===0 && <div style={{fontSize:"10px",color:DIM,fontStyle:"italic",marginBottom:"10px"}}>No regions yet</div>}
                <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"10px"}}>
                  {(az.regions||[]).map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 10px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"3px"}}>
                      <span style={{flex:1,fontSize:"11px",color:"#e8dcc8"}}>{r.name}</span>
                      <span style={{fontSize:"8px",color:DIM}}>pop</span>
                      <AdjBtn onClick={()=>adjAzRegPop(r.id,-1)} red>-</AdjBtn>
                      <span style={{fontSize:"14px",fontWeight:"bold",color:GOLD,minWidth:"18px",textAlign:"center"}}>{r.pop||1}</span>
                      <AdjBtn onClick={()=>adjAzRegPop(r.id,+1)}>+</AdjBtn>
                      <button onClick={()=>removeAzRegion(r.id)} style={{padding:"1px 7px",cursor:"pointer",background:"rgba(200,60,60,0.07)",border:"1px solid rgba(200,60,60,0.2)",borderRadius:"3px",color:"#c4605a",fontSize:"10px"}}>✕</button>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  <input value={newRegN} onChange={e=>setNewRegN(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addAzRegion()}
                    placeholder="Region name…"
                    style={{flex:1,padding:"5px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px"}}/>
                  <span style={{fontSize:"9px",color:DIM}}>pop</span>
                  <input type="number" min={1} max={10} value={newRegP}
                    onChange={e=>setNewRegP(parseInt(e.target.value)||1)}
                    style={{width:"44px",padding:"5px 6px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px",textAlign:"center"}}/>
                  <button onClick={addAzRegion}
                    style={{padding:"5px 14px",cursor:"pointer",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:"3px",color:GOLD,fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",flexShrink:0}}>
                    + Add
                  </button>
                </div>
                {(az.regions||[]).length>0 && (
                  <div style={{marginTop:"8px",fontSize:"10px",color:SOFT,textAlign:"right"}}>
                    Total pop: <span style={{color:GOLD,fontWeight:"bold"}}>{azPop}</span>
                    {" · "}Eco at prod {azProd}: <span style={{color:"#c9a84c",fontWeight:"bold"}}>{Math.round(Math.max(0,azPop*azProd-azMil*0.5-azUnr*1.5)*10)/10}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })()}

      {/* ── cabinet ── */}
      <div style={{marginBottom:"32px"}}>
        <div style={{fontSize:"9px",letterSpacing:"5px",color:DIM,textTransform:"uppercase",marginBottom:"14px"}}>Cabinet</div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
          {MINISTRIES.map(m => {
            const holder = government[m.id] ? candidates.find(c=>c.id===government[m.id]) : null;
            const isEditing = editMinistry === m.id;
            const isPM = m.id === "pm";
            return (
              <div key={m.id} style={{
                padding:"10px 14px",
                background: holder ? "rgba(255,255,255,0.025)" : "rgba(255,255,255,0.01)",
                border:`1px solid ${holder?(isPM?"rgba(201,168,76,0.3)":holder.color+"33"):"rgba(255,255,255,0.06)"}`,
                borderLeft: holder ? `3px solid ${isPM?GOLD:holder.color}` : "3px solid rgba(255,255,255,0.08)",
                borderRadius:"5px",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px"}}>
                      {isPM && <span style={{fontSize:"9px",color:GOLD}}>👑</span>}
                      <span style={{fontSize:"11px",color:"#e8dcc8",letterSpacing:"1px"}}>{m.title}</span>
                      {isPM && holder && <span style={{fontSize:"8px",color:GOLD,border:"1px solid rgba(201,168,76,0.3)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>+1 ACTION</span>}
                    </div>
                    <div style={{fontSize:"9px",color:DIM}}>{m.desc}</div>
                  </div>
                  {holder ? (
                    <div style={{display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
                      <div style={{width:"7px",height:"7px",borderRadius:"50%",background:holder.color}}/>
                      <span style={{fontSize:"10px",color:holder.color}}>{holder.name}</span>
                      <button onClick={()=>setEditMinistry(isEditing?null:m.id)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:SOFT,cursor:"pointer",fontSize:"9px",padding:"2px 6px",fontFamily:"Georgia,serif"}}>✎</button>
                      <button onClick={()=>assignMinistry(m.id,null)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"9px",padding:"2px 6px",fontFamily:"Georgia,serif"}}>×</button>
                    </div>
                  ) : (
                    <button onClick={()=>setEditMinistry(isEditing?null:m.id)} style={{
                      padding:"5px 12px",background:"rgba(255,255,255,0.03)",border:"1px dashed rgba(255,255,255,0.12)",
                      borderRadius:"4px",color:DIM,cursor:"pointer",fontSize:"9px",fontFamily:"Georgia,serif",letterSpacing:"1px",flexShrink:0,
                    }}>Appoint</button>
                  )}
                </div>
                {/* candidate picker */}
                {isEditing && (
                  <div style={{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"5px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                    {candidates.map(c => (
                      <button key={c.id} onClick={()=>assignMinistry(m.id,c.id)} style={{
                        padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",letterSpacing:"1px",
                        background:government[m.id]===c.id?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",
                        border:`1px solid ${government[m.id]===c.id?c.color+"66":"rgba(255,255,255,0.1)"}`,
                        borderRadius:"4px",color:c.color,
                      }}>{c.name}</button>
                    ))}
                    <button onClick={()=>assignMinistry(m.id,null)} style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"10px",background:"transparent",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"4px",color:"#c4605a",letterSpacing:"1px"}}>Vacate</button>
                  </div>
                )}

                {/* ministerial actions — only shown when ministry is filled */}
                {holder && (m.actions||[]).length > 0 && (
                  <div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                    <div style={{fontSize:"8px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>Ministerial Action</div>
                    {hasActed(m.id) ? (
                      <div style={{fontSize:"10px",color:DIM,fontStyle:"italic",padding:"4px 0"}}>Action used this turn.</div>
                    ) : (
                      <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                        {(m.actions||[]).map(action => (
                          <div key={action.id} style={{position:"relative"}}>
                            <button
                              onClick={() => execAction(m.id, action, null)}
                              title={action.desc}
                              style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"1px",
                                background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.2)",
                                borderRadius:"4px",color:GOLD,textTransform:"uppercase"}}>
                              {action.label}
                            </button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* sub-picker for actions that need a target */}
                    {activePicker && activePicker.ministryId === m.id && (
                      <div style={{marginTop:"8px",padding:"10px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:"4px"}}>
                        <div style={{fontSize:"9px",color:GOLD,letterSpacing:"2px",marginBottom:"6px",textTransform:"uppercase"}}>{activePicker.action.label} — {activePicker.step==="reason" ? "Choose Reason" : activePicker.step==="war" ? "Choose War" : "Choose Target"}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                          {activePicker.action.type === "pickClass" && CLASSES.map((cls,ci) => (
                            <button key={ci} onClick={() => execAction(m.id, activePicker.action, {classIdx:ci})}
                              style={{padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",
                                borderRadius:"3px",color:CLASS_COLORS[ci]}}>
                              {cls} ({agitation[ci]})
                            </button>
                          ))}

                          {/* Send Envoy — sorted by economic benefit */}
                          {activePicker.action.type === "pickNation" && activePicker.action.id === "for_envoy" && getEnvoySuggestions().map(({n, st, reason}) => (
                            <button key={n.id} onClick={() => execAction(m.id, activePicker.action, {nationId:n.id})}
                              style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                background:"rgba(255,255,255,0.03)",border:`1px solid ${n.color}44`,
                                borderRadius:"3px",color:n.color,textAlign:"left",display:"flex",flexDirection:"column",gap:"1px"}}>
                              <span>{n.name}</span>
                              <span style={{fontSize:"8px",color:SOFT}}>{reason} · now {st>0?"+":""}{st}</span>
                            </button>
                          ))}

                          {/* Issue Condemnation — step 1: reason */}
                          {activePicker.action.id === "for_condemn" && activePicker.step === "reason" && CONDEMN_REASONS.map((r,ri) => (
                            <button key={ri} onClick={() => setActivePicker(p => ({...p, step:"nation", reasonIdx:ri}))}
                              style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                background:"rgba(196,96,90,0.06)",border:"1px solid rgba(196,96,90,0.2)",
                                borderRadius:"3px",color:"#c4605a",width:"100%",textAlign:"left"}}>
                              {r}
                            </button>
                          ))}

                          {/* Issue Condemnation — step 2: nation */}
                          {activePicker.action.id === "for_condemn" && activePicker.step === "nation" && (nations||[]).map(n => {
                            const st = n.diplo?.azzuria ?? 0;
                            return (
                              <button key={n.id} onClick={() => execAction(m.id, activePicker.action, {nationId:n.id, reasonIdx:activePicker.reasonIdx})}
                                style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                  background:"rgba(196,96,90,0.06)",border:`1px solid ${n.color}44`,
                                  borderRadius:"3px",color:n.color,textAlign:"left",display:"flex",flexDirection:"column",gap:"1px"}}>
                                <span>{n.name}</span>
                                <span style={{fontSize:"8px",color:st<=-2?"#c4605a":SOFT}}>Standing {st>0?"+":""}{st} → {st-1>=0?"+":(st-1)}{st-1<=-2?" ⚔ casus belli":""}</span>
                              </button>
                            );
                          })}

                          {activePicker.action.type === "pickRegion" && REGIONS.map((r,ri) => (
                            <button key={ri} onClick={() => execAction(m.id, activePicker.action, {regionIdx:ri})}
                              style={{padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",
                                borderRadius:"3px",color:SOFT}}>
                              {r}
                            </button>
                          ))}
                          {/* Public Works — step 1: pick nation, step 2: pick region */}
                          {activePicker.action.id === "wrk_invest" && activePicker.step === "nation" && (
                            (nations||[]).length === 0
                              ? <span style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No nations registered.</span>
                              : (nations||[]).map(n => (
                                  <button key={n.id}
                                    onClick={()=>setActivePicker(p=>({...p, step:"region", nationId:n.id}))}
                                    style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                      background:"rgba(255,255,255,0.03)",border:`1px solid ${n.color}44`,
                                      borderRadius:"3px",color:n.color}}>
                                    {n.name}
                                  </button>
                                ))
                          )}
                          {activePicker.action.id === "wrk_invest" && activePicker.step === "region" && (() => {
                            const nat = (nations||[]).find(n=>n.id===activePicker.nationId);
                            if (!nat || !(nat.regions||[]).length)
                              return <span style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No regions — add regions to this nation first.</span>;
                            return (nat.regions||[]).map(r => (
                              <button key={r.id}
                                onClick={()=>execAction(activePicker.ministryId, activePicker.action, {nationId:nat.id, regionId:r.id})}
                                style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                  background:"rgba(255,255,255,0.03)",border:`1px solid ${nat.color}44`,
                                  borderRadius:"3px",color:nat.color,display:"flex",flexDirection:"column",gap:"1px"}}>
                                <span>{r.name}</span>
                                <span style={{fontSize:"8px",color:DIM}}>pop {r.pop||1} → {Math.min(10,(r.pop||1)+1)}</span>
                              </button>
                            ));
                          })()}

                          {/* Trade Deal — nation picker for trd_deal */}
                          {activePicker.action.type === "pickNation" && activePicker.action.id === "trd_deal" && (
                            (nations||[]).length === 0
                              ? <span style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No nations.</span>
                              : (nations||[]).map(n => {
                                  const st = n.diplo?.azzuria ?? 0;
                                  const hasDeal = (deals||[]).some(d=>(d.aId===n.id||d.bId===n.id)&&(d.aId==="azzuria"||d.bId==="azzuria"));
                                  const blocked = st < 0 || hasDeal;
                                  return (
                                    <button key={n.id} onClick={() => !blocked && execAction(m.id, activePicker.action, {nationId:n.id})}
                                      style={{padding:"5px 12px",cursor:blocked?"not-allowed":"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                        background:"rgba(255,255,255,0.03)",border:`1px solid ${blocked?"rgba(255,255,255,0.06)":n.color+"44"}`,
                                        borderRadius:"3px",color:blocked?DIM:n.color,textAlign:"left",display:"flex",flexDirection:"column",gap:"1px"}}>
                                      <span>{n.name}</span>
                                      <span style={{fontSize:"8px",color:SOFT}}>{hasDeal?"Deal active":st<0?"Hostile (need ≥0)":"Standing "+st}</span>
                                    </button>
                                  );
                                })
                          )}

                          {/* Cancel Trade Deal — pick from active deals */}
                          {activePicker.action.type === "pickDeal" && (
                            (deals||[]).filter(d=>d.aId==="azzuria"||d.bId==="azzuria").length === 0
                              ? <span style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No active deals.</span>
                              : (deals||[]).filter(d=>d.aId==="azzuria"||d.bId==="azzuria").map(d => {
                                  const partnerId = d.aId==="azzuria" ? d.bId : d.aId;
                                  const partner = (nations||[]).find(n=>n.id===partnerId);
                                  return (
                                    <button key={d.id} onClick={() => execAction(m.id, activePicker.action, {dealId:d.id})}
                                      style={{padding:"5px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                        background:"rgba(255,255,255,0.03)",border:"1px solid rgba(74,154,106,0.3)",
                                        borderRadius:"3px",color:"#6db87a",textAlign:"left",display:"flex",flexDirection:"column",gap:"1px"}}>
                                      <span>{partner?.name||partnerId}</span>
                                      <span style={{fontSize:"8px",color:SOFT}}>{d.turnsLeft} turns left</span>
                                    </button>
                                  );
                                })
                          )}

                          {/* Peace Treaty — list wars (for pm_peace) */}
                          {activePicker.action.id === "pm_peace" && activePicker.step === "war" && (
                            (wars||[]).length === 0
                              ? <span style={{fontSize:"10px",color:DIM,fontStyle:"italic"}}>No active wars.</span>
                              : (wars||[]).map(w => {
                                  const attName = w.attId==="azzuria"?"Azzuria":(nations||[]).find(n=>n.id===w.attId)?.name||w.attId;
                                  const defName = w.defId==="azzuria"?"Azzuria":(nations||[]).find(n=>n.id===w.defId)?.name||w.defId;
                                  const sc = w.score||0;
                                  return (
                                    <button key={w.id} onClick={() => execAction(m.id, activePicker.action, {warId:w.id})}
                                      style={{padding:"6px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                                        background:"rgba(196,96,90,0.06)",border:"1px solid rgba(196,96,90,0.25)",
                                        borderRadius:"3px",color:"#c4605a",textAlign:"left",display:"flex",flexDirection:"column",gap:"2px",width:"100%"}}>
                                      <span>{attName} vs {defName} — T{w.turns||0}</span>
                                      <span style={{fontSize:"8px",color:SOFT}}>Score {sc>0?"+":""}{sc}</span>
                                    </button>
                                  );
                                })
                          )}

                          <button onClick={() => setActivePicker(null)}
                            style={{padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                              background:"transparent",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a"}}>
                            Cancel
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── royal decrees ── */}
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
          <div style={{fontSize:"9px",letterSpacing:"5px",color:DIM,textTransform:"uppercase"}}>Royal Decrees</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            {decreesThisTurn >= decreeLimit && (
              <span style={{fontSize:"8px",color:DIM,letterSpacing:"1px"}}>Limit reached this turn</span>
            )}
            <button onClick={()=>setShowDecreeForm(f=>!f)} disabled={decreesThisTurn>=decreeLimit&&!showDecreeForm}
              style={{padding:"5px 12px",
                background:showDecreeForm?"rgba(155,127,186,0.1)":"rgba(255,255,255,0.03)",
                border:`1px solid ${showDecreeForm?"rgba(155,127,186,0.4)":"rgba(255,255,255,0.1)"}`,
                borderRadius:"4px",color:showDecreeForm?"#9b7fba":SOFT,cursor:"pointer",fontSize:"9px",
                fontFamily:"Georgia,serif",letterSpacing:"2px",textTransform:"uppercase",
                opacity:decreesThisTurn>=decreeLimit&&!showDecreeForm?.4:1}}>
              {showDecreeForm?"Cancel":"+ Issue Decree"}
            </button>
          </div>
        </div>

        {/* decree form */}
        {showDecreeForm && (
          <div style={{background:"rgba(155,127,186,0.04)",border:"1px solid rgba(155,127,186,0.2)",borderRadius:"6px",padding:"16px",marginBottom:"14px"}}>
            <input value={decreeName} onChange={e=>setDecreeName(e.target.value)}
              placeholder="Decree name..." style={{...INPUT,marginBottom:"8px"}}/>
            <textarea value={decreeDesc} onChange={e=>setDecreeDesc(e.target.value)}
              placeholder="Description (optional)" rows={2}
              style={{...INPUT,color:SOFT,fontSize:"12px",marginBottom:"12px",resize:"vertical",lineHeight:"1.5"}}/>

            {/* Region scope */}
            <div style={{marginBottom:"14px"}}>
              <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"6px"}}>Scope</div>
              <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                <button onClick={()=>setDecreeRegion("all")} style={{padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",borderRadius:"3px",
                  background:decreeRegion==="all"?"rgba(201,168,76,0.15)":"transparent",
                  border:`1px solid ${decreeRegion==="all"?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.08)"}`,color:decreeRegion==="all"?GOLD:SOFT}}>National</button>

function ElectionTab({candidates, data, agitation, natUnrest, tariffs, turn, senateHolder, setSenateHolder, onSaveElection, onDeleteElection, electionHistory, coalitions}) {
  // Local roll state — intentionally resets between sessions (it's a roll, not persistent data)
  const [results,      setResults]      = useState(null);
  const [rolling,      setRolling]      = useState(false);
  const [showRolls,    setShowRolls]    = useState(false);
  const [filterR,      setFilterR]      = useState(null);
  const [senResults,   setSenResults]   = useState(null);
  const [senRolling,   setSenRolling]   = useState(false);
  const [chamberSaved, setChamberSaved] = useState(false);
  const [senateSaved,  setSenateSaved]  = useState(false);

  const season = getSeason(turn);
  const year   = getYear(turn);
  const savedHistory = electionHistory || [];

const writeElectionsResult = (type, data, electionHistory, electionType, coalitions, candidates, test) => {
  console.log("writeElectionsResult called with:", {type, data, electionHistory, electionType, coalitions})
  const filteredHistory = electionHistory && electionHistory.filter(e => e.type === electionType)
  const lastElections = filteredHistory && filteredHistory.length > 0 ? filteredHistory[0] : null
  
  if (!data || !data.ranked) {
    console.log("ERROR: data or data.ranked is missing")
    return
  }
  
  // Get total seats for majority calculation
  const totalSeats = data.ranked.reduce((s, p) => s + (data.seatTotals[p.id] || 0), 0)
  const majority = type === "Parliament" ? MAJORITY : SENATE_MAJORITY
  const hasMajority = (data.seatTotals[data.ranked[0]?.id] || 0) >= majority
  
  let text = `# ${type} Elections - ${year} ${season}\n`
  text += `The ${electionType === 'chamber' ? 'parliamentary' : 'senatorial'} election has concluded!\n\n`
  text += `## Results\n`
  
  // Get coalition info
  const coalitionMap = {}
  ;(coalitions || []).forEach(coal => {
    coal.memberIds.forEach(mid => {
      coalitionMap[mid] = coal
    })
  })
  
  // Find candidate full info to get party name and id
  const candidateMap = {}
  ;(candidates || []).forEach(c => {
    candidateMap[c.id] = c
  })
  
  // Group parties by coalition
  const partiesByCoalition = {}
  const unaffiliated = []
  
  data.ranked.forEach(party => {
    const seats = data.seatTotals[party.id] || 0
    const fullCand = candidateMap[party.id]
    const partyInfo = {
      id: party.id,
      name: fullCand?.name || party.name,
      abbr: fullCand?.abbr || party.name.split(' ').map(w => w[0]).join(''),
      color: party.color,
      seats,
      prevSeats: lastElections?.seatTotals[party.id],
      fullCand
    }
    
    const coal = coalitionMap[party.id]
    if (coal) {
      if (!partiesByCoalition[coal.id]) {
        partiesByCoalition[coal.id] = { coal, parties: [] }
      }
      partiesByCoalition[coal.id].parties.push(partyInfo)
    } else {
      unaffiliated.push(partyInfo)
    }
  })
  
  // Build output by coalition
  Object.values(partiesByCoalition).forEach(item => {
    const { coal, parties } = item
    const coalSeats = parties.reduce((s, p) => s + p.seats, 0)
    const coalHasMajority = coalSeats >= majority
    const coalEmoji = coalSeats > (lastElections?.seatTotals[item.coal?.memberIds?.[0]] || 0) ? ' <:IncreaseGood:1485892458427453530>' : coalSeats < (lastElections?.seatTotals[item.coal?.memberIds?.[0]] || 0) ? ' <:DecreaseBad:1485892543349657640>' : ''
    
    text += `### ${coal.name} - ${coalSeats}${coalEmoji}${coalHasMajority ? ' ⭐ MAJORITY' : ''}\n`
    parties.forEach(p => {
      let partyEmoji = ''
      if (p.prevSeats !== undefined && p.prevSeats !== null) {
        if (p.prevSeats > p.seats) partyEmoji = ' <:DecreaseBad:1485892543349657640>'
        if (p.prevSeats < p.seats) partyEmoji = ' <:IncreaseGood:1485892458427453530>'
      }
      text += `- ${p.name} (${p.abbr}) - ${p.seats}${partyEmoji}\n`
    })
    text += `\n`
  })
  
  // Unaffiliated parties
  if (unaffiliated.length > 0) {
    const unaffSeats = unaffiliated.reduce((s, p) => s + p.seats, 0)
    text += `### Unaffiliated - ${unaffSeats}\n`
    unaffiliated.forEach(p => {
      let partyEmoji = ''
      if (p.prevSeats !== undefined && p.prevSeats !== null) {
        if (p.prevSeats > p.seats) partyEmoji = ' <:DecreaseBad:1485892543349657640>'
        if (p.prevSeats < p.seats) partyEmoji = ' <:IncreaseGood:1485892458427453530>'
      }
      text += `- ${p.name} (${p.abbr}) - ${p.seats}${partyEmoji}\n`
    })
  }
  
  console.log("Final text:", text)
  
  // Capture parliament screenshot
  ;(async () => {
    try {
      const parliamentElementId = electionType === 'chamber' ? 'chamber-parliament-display' : 'senate-parliament-display'
      const parliamentElement = document.getElementById(parliamentElementId)
      
      if (parliamentElement) {
        console.log(`Capturing ${parliamentElementId}...`)
        const blob = await captureElections(parliamentElement)
        console.log("Screenshot captured, sending to Discord with image...")
        writeMessageInDiscord(text, test, blob)
      } else {
        console.log(`Element ${parliamentElementId} not found, sending text only`)
        writeMessageInDiscord(text, test)
      }
    } catch (e) {
      console.error("Error capturing screenshot:", e)
      writeMessageInDiscord(text, test)
    }
  })()
} 

  const runElection = () => {
    console.log(candidates);
    console.log(JSON.stringify(candidates));
    setChamberSaved(false);
    setRolling(true);
    setTimeout(() => {
      // Wheel: weight = BASE_WHEEL + pop (min 1). Roll 1..totalWeight, pick party.
      const BASE_WHEEL = 1;
      const wheelSpin = (entries) => {
        const weights = entries.map(({c, pop}) => ({c, pop, weight: Math.max(1, BASE_WHEEL + pop)}));
        const total   = weights.reduce((s, e) => s + e.weight, 0);
        const roll    = Math.floor(Math.random() * total) + 1;
        let cum = 0;
        for (const e of weights) { cum += e.weight; if (roll <= cum) return {winner: e, roll, total, weights}; }
        return {winner: weights[weights.length-1], roll, total, weights};
      };
      // Popularity threshold: parties below this score in a region are simply not on the ballot there.
      // No fallback — if every party is below threshold the region stays uncontested (winner = highest pop).
      const REGION_THRESHOLD = 5;

      const popByRegion = candidates.map(c => ({c, regionPop: calcPopularity(c, data, agitation, natUnrest, tariffs, turn, candidates)}));
      const collegeResults = COLLEGES.map((col, idx) => {
        const rIdx = col.r;
        const eligible = popByRegion.filter(({regionPop}) => regionPop[rIdx] >= REGION_THRESHOLD);
        // If nobody qualifies, ALL parties with max popularity can win (uncontested region)
        // This ensures fair distribution when everyone has 0 or low popularity
        let pool;
        if (eligible.length > 0) {
          pool = eligible;
        } else {
          const maxPop = Math.max(...popByRegion.map(p => p.regionPop[rIdx]));
          pool = popByRegion.filter(p => p.regionPop[rIdx] === maxPop);
        }
        // Eligible parties: weight = BASE_WHEEL + pop. Non-eligible are not in the pool at all.
        const entries = pool.map(({c, regionPop}) => ({c, pop: regionPop[rIdx]}));
        const {winner, roll, total, weights} = wheelSpin(entries);
        // For display: show all candidates with their actual pop, marking who was eligible
        const allRolls = popByRegion.map(({c, regionPop}) => {
          const inPool = pool.some(p => p.c.id === c.id);
          const w = weights.find(ww => ww.c.id === c.id);
          return {c, pop: regionPop[rIdx], weight: inPool ? (w?.weight||0) : 0, total, roll, isWinner: c.id === winner.c.id, excluded: !inPool};
        });
        return {idx: idx+1, name: col.n, rIdx, winner, rolls: allRolls};
      });
      const seatTotals = {};
      const regionSeats = REGIONS.map(() => { const o = {}; candidates.forEach(c=>{o[c.id]=0;}); return o; });
      candidates.forEach(c => { seatTotals[c.id] = 0; });
      collegeResults.forEach(cr => { seatTotals[cr.winner.c.id]++; regionSeats[cr.rIdx][cr.winner.c.id]++; });
      const ranked = [...candidates].sort((a,b) => (seatTotals[b.id]||0) - (seatTotals[a.id]||0));
      setResults({collegeResults, seatTotals, regionSeats, ranked, winner: ranked[0], hasMajority: (seatTotals[ranked[0].id]||0) >= MAJORITY});
      setRolling(false);
    }, 400);
  };

  const runSenateElection = () => {
    setSenateSaved(false);
    setSenRolling(true);
    setTimeout(() => {
      // Wheel: weight = BASE_WHEEL + pop (min 1). Roll 1..totalWeight, pick party.
      const BASE_WHEEL = 1;
      const wheelSpin = (entries) => {
        const weights = entries.map(({c, pop}) => ({c, pop, weight: Math.max(1, BASE_WHEEL + pop)}));
        const total   = weights.reduce((s, e) => s + e.weight, 0);
        const roll    = Math.floor(Math.random() * total) + 1;
        let cum = 0;
        for (const e of weights) { cum += e.weight; if (roll <= cum) return {winner: e, roll, total, weights}; }
        return {winner: weights[weights.length-1], roll, total, weights};
      };
      const REGION_THRESHOLD = 5;
      const pops = candidates.map(c => ({c, regionPop: calcPopularity(c, data, agitation, natUnrest, tariffs, turn, candidates)}));
      const senColleges = REGIONS.flatMap((region, rIdx) =>
        Array.from({length: SENATE_SEATS_PER_REGION}, (_, sIdx) => {
          const eligible = pops.filter(({regionPop}) => regionPop[rIdx] >= REGION_THRESHOLD);
          // If nobody qualifies, ALL parties with max popularity can win
          let pool;
          if (eligible.length > 0) {
            pool = eligible;
          } else {
            const maxPop = Math.max(...pops.map(p => p.regionPop[rIdx]));
            pool = pops.filter(p => p.regionPop[rIdx] === maxPop);
          }
          const entries = pool.map(({c, regionPop}) => ({c, pop: regionPop[rIdx]}));
          const {winner, roll, total, weights} = wheelSpin(entries);
          const rolls = weights.map(e => ({c: e.c, pop: e.pop, weight: e.weight, total, roll, isWinner: e.c.id === winner.c.id}));
          return {region, rIdx, seat: sIdx+1, winner, rolls};
        })
      );
      const senTotals = {};
      candidates.forEach(c => { senTotals[c.id] = 0; });
      senColleges.forEach(col => { senTotals[col.winner.c.id]++; });
      const senRanked = [...candidates].sort((a,b) => (senTotals[b.id]||0) - (senTotals[a.id]||0));
      const senWinner = senRanked[0];
      const hasSenMajority = (senTotals[senWinner.id]||0) >= SENATE_MAJORITY;
      if (hasSenMajority) setSenateHolder(senWinner.id); else setSenateHolder(null);
      setSenResults({senColleges, senTotals, senRanked, senWinner, hasSenMajority});
      setSenRolling(false);
    }, 400);
  };

  const handleSave = (type) => {
    const res = type === "chamber" ? results : senResults;
    if (!res) return;
    const dataForDiscord = type==="chamber" ? {
      seatTotals: res.seatTotals,
      ranked: res.ranked.map(c=>({id:c.id,name:c.name,color:c.color})),
      winner: res.ranked.map(c=>({id:c.id,name:c.name,color:c.color}))[0],
    } : {
      seatTotals: res.senTotals,
      ranked: res.senRanked.map(c=>({id:c.id,name:c.name,color:c.color})),
      winner: res.senRanked.map(c=>({id:c.id,name:c.name,color:c.color}))[0],
    }
    const electionTypeForDiscord = type === 'chamber' ? 'chamber' : 'senate';
    const discordType = type === 'chamber' ? 'Parliament' : 'Senate';
    writeElectionsResult(discordType, dataForDiscord, electionHistory, electionTypeForDiscord, coalitions, candidates, true);
    onSaveElection({
      id: Date.now(), season, year, turn, type,

      winner: {
        id:    (type==="chamber" ? res.winner : res.senWinner).id,
        name:  (type==="chamber" ? res.winner : res.senWinner).name,
        color: (type==="chamber" ? res.winner : res.senWinner).color,
      },
      hasMajority: type==="chamber" ? res.hasMajority : res.hasSenMajority,
    });
      if (type==="chamber") setChamberSaved(true); else setSenateSaved(true);
  };

  return (
    <div style={{padding:"20px 14px",maxWidth:"960px",margin:"0 auto"}}>

      {/* ── Saved history at top ── */}
      {savedHistory.length > 0 && (
        <div style={{marginBottom:"32px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"12px"}}>Saved Election Results</div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {savedHistory.map(el => {
              const sortedR = [...(el.ranked||[])].sort((a,b)=>(el.seatTotals[b.id]||0)-(el.seatTotals[a.id]||0));
              return (
                <div key={el.id} style={{padding:"14px 16px",background:"rgba(255,255,255,0.02)",border:`1px solid ${el.winner.color}30`,borderLeft:`3px solid ${el.winner.color}`,borderRadius:"4px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase"}}>{el.type==="chamber"?"Chamber":"Senate"}</span>
                    <span style={{fontSize:"10px",color:SOFT}}>{el.season} {el.year}</span>
                    <button onClick={() => onDeleteElection(el.id)} style={{marginLeft:"auto",background:"rgba(200,80,60,0.2)",border:"1px solid rgba(200,80,60,0.4)",color:"#e08060",cursor:"pointer",fontSize:"8px",padding:"4px 8px",borderRadius:"3px",letterSpacing:"1px",textTransform:"uppercase",transition:"all 0.2s"}}>Delete</button>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <span style={{width:"8px",height:"8px",borderRadius:"50%",background:el.winner.color,display:"inline-block"}}/>
                      <span style={{fontSize:"13px",color:el.winner.color}}>{el.winner.name}</span>
                      <span style={{fontSize:"16px",fontWeight:"bold",color:"#e8dcc8"}}>{el.seatTotals[el.winner.id]}</span>
                      <span style={{fontSize:"9px",color:DIM}}>/{el.totalSeats}</span>
                      {el.hasMajority && <span style={{fontSize:"8px",color:"#6db87a",border:"1px solid rgba(109,184,122,0.4)",borderRadius:"3px",padding:"1px 5px",letterSpacing:"1px"}}>MAJORITY</span>}
                    </div>
                  </div>
                  <SemiParliament seatTotals={el.seatTotals} cands={el.ranked} coalitions={coalitions}/>
                  <div style={{display:"flex",flexDirection:"column",gap:"5px",marginTop:"10px"}}>
                    {sortedR.map(r => {
                      const s   = el.seatTotals[r.id]||0;
                      const pct = Math.round(s/el.totalSeats*100);
                      if (!s) return null;
                      return (
                        <div key={r.id}>
                          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px"}}>

              {senRolling?"Rolling...":"Hold Senate Election"}

          <div>

            <div style={{display:"flex",flexDirection:"column",gap:"5px",marginBottom:"14px"}}>
              <div style={{marginBottom:"12px"}} id="senate-parliament-display"><SemiParliament seatTotals={senResults.senTotals} cands={senResults.senRanked} total={SENATE_TOTAL} majority={SENATE_MAJORITY} coalitions={coalitions}/></div>
              {senResults.senRanked.map(c => {
                const seats = senResults.senTotals[c.id]||0;
                const pct   = Math.round(seats/SENATE_TOTAL*100);
                const prev  = savedHistory.find(h=>h.type==="senate");
                const prevS = prev ? (prev.seatTotals[c.id]||0) : null;

                      <span style={{fontSize:"13px",fontWeight:"bold",color:"#e8dcc8"}}>{seats}</span>
                      <span style={{fontSize:"9px",color:DIM,minWidth:"28px",textAlign:"right"}}>{pct}%</span>
                      {delta!==null && (

                          color:delta>0?"#6db87a":delta<0?"#c4605a":DIM,fontWeight:"bold"}}>

                        </span>
                      )}
                    </div>
                    <div style={{height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>

              <button onClick={runSenateElection} style={{padding:"8px 20px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",borderRadius:"4px",background:"rgba(155,127,186,0.12)",border:"1px solid rgba(155,127,186,0.35)",color:"#9b7fba"}}>Re-roll</button>

// ── DIPLOMACY PANEL ───────────────────────────────────────────────────────────
function DiplomacyPanel({nations, setNations, wars, setWars, deals, setDeals}) {
  const [warForm,  setWarForm]  = useState({attId:"", defId:""});
  const [dealForm, setDealForm] = useState({aId:"azzuria", bId:"", turns:6});
  const [showWar,  setShowWar]  = useState(false);
  const [showDeal, setShowDeal] = useState(false);

  const nationName = id => id==="azzuria" ? "Azzuria" : nations.find(n=>n.id===id)?.name || id;

  const declareWar = () => {
    if (!warForm.attId || !warForm.defId || warForm.attId===warForm.defId) return;
    setWars(p => [...(p||[]), {
      id:`war_${Date.now()}`, attId:warForm.attId, defId:warForm.defId,
      score:0, turns:0, attMilLost:0, defMilLost:0, battleLog:[]
    }]);
    setNations(p => p.map(n => {
      if (n.id===warForm.attId) return {...n, unrest:Math.min(10,(n.unrest||0)+1)};
      if (n.id===warForm.defId) return {...n, unrest:Math.min(10,(n.unrest||0)+2)};
      return n;
    }));
    setWarForm({attId:"", defId:""}); setShowWar(false);
  };

  const openDeal = () => {
    if (!dealForm.bId || dealForm.aId===dealForm.bId) return;
    setDeals(p => [...(p||[]).filter(d=>
      !(d.aId===dealForm.aId&&d.bId===dealForm.bId) &&
      !(d.aId===dealForm.bId&&d.bId===dealForm.aId)
    ), {id:`deal_${Date.now()}`, aId:dealForm.aId, bId:dealForm.bId, turnsLeft:Number(dealForm.turns)}]);
    setDealForm({aId:"azzuria", bId:"", turns:6}); setShowDeal(false);
  };

function EventBuilderPanel({nations, gmEvents, setGmEvents, randomEventDeck, setRandomEventDeck}) {
  const blank = {name:"", desc:"", scope:"global", targetId:"", destination:"queue"};
  const [form, setForm]       = useState(blank);
  const [rows, setRows]       = useState([]); // [{field, value}]
  const [deckTab, setDeckTab] = useState("queue");

  const FIELDS = ["unrest","productivity","milInvest","regime","diplo"];
  const LABELS = {unrest:"Unrest",productivity:"Productivity",milInvest:"Military",regime:"Regime",diplo:"Diplo vs Azzuria"};

  const addRow = () => {
    const used = rows.map(r=>r.field);
    const next = FIELDS.find(f=>!used.includes(f));
    if (next) setRows(p=>[...p, {field:next, value:next==="regime"?"Republic":0}]);
  };

  const buildPatches = () => {
    if (!rows.length) return {};
    const obj = {};
    rows.forEach(r => { obj[r.field] = r.field==="regime" ? r.value : Number(r.value); });
    const patches = {};
    if (form.scope==="global") nations.forEach(n=>{ patches[n.id]={...obj}; });
    else if (form.targetId) patches[form.targetId] = {...obj};
    return patches;
  };

  const submit = () => {
    if (!form.name.trim()) return;
    const ev = {id:Date.now(), name:form.name.trim(), desc:form.desc.trim(),
      scope:form.scope, targetId:form.targetId, patches:buildPatches()};
    if (form.destination==="deck") setRandomEventDeck(p=>[...p,ev]);
    else setGmEvents(p=>[...p,ev]);
    setForm(blank); setRows([]);
    setDeckTab(form.destination==="deck"?"deck":"queue");

const DIPLO_LABELS = ["Hostile","Cold","Wary","Neutral","Warm","Friendly","Allied"];
const DIPLO_COLORS = ["#c46060","#c47a5a","#a09060","#6a5a3a","#6a8a5a","#4a9a6a","#4a90c0"];
const REGIME_TYPES = ["Absolute Monarchy","Constitutional Monarchy","Republic","Revolutionary","Theocracy","Oligarchy","Empire","Military Junta","Occupied"];
const NATION_COLORS = ["#c47a5a","#7a9cc4","#6db87a","#9b7fba","#c9a84c","#4a90c0","#e08060","#80c890","#a08060","#c4a96b"];

// Economy: pop comes from regions, not a raw stat
// pop = sum(region.pop) for all regions the nation holds
// eco = pop × productivity − mil × 0.5 − unrest × 1.5
// mil_str = eco/2 + milInvest
// avail = max(0, mil_str − floor(unrest/2))
function calcNationEco(n) {
  const pop  = (n.regions||[]).reduce((s,r) => s + (r.pop||1), 0);
  const prod = n.productivity || 2;
  const mil  = n.milInvest || 0;
  const unr  = n.unrest || 0;
  const eco  = Math.max(0, pop * prod - mil * 0.5 - unr * 1.5);
  const milStr = Math.round((eco / 2 + mil) * 10) / 10;
  const avail  = Math.max(0, Math.round((milStr - Math.floor(unr / 2)) * 10) / 10);
  return { pop, eco: Math.round(eco * 10) / 10, milStr, avail };
}

function CoalitionsPanel({coalitions, setCoalitions, candidates, electionHistory}) {

  const [newColor, setNewColor] = useState("#9b7fba");
  const [showForm, setShowForm] = useState(false);

  const lastChamber = (electionHistory||[]).find(e => e.type==="chamber");
  const seatTotals  = lastChamber?.seatTotals || {};
  const totalSeats  = lastChamber?.totalSeats  || TOTAL_SEATS;

  const createCoalition = () => {
    if (!newName.trim()) return;
    setCoalitions(p => [...p, {id:Date.now(), name:newName.trim(), color:newColor, memberIds:[]}]);
    setNewName(""); setShowForm(false);
  };

  const dissolve = id => setCoalitions(p => p.filter(c => c.id !== id));

  const toggleMember = (coalId, candId) => {
    setCoalitions(p => p.map(c => {
      if (c.id !== coalId) return c;
      const already = c.memberIds.includes(candId);
      return {...c, memberIds: already ? c.memberIds.filter(x=>x!==candId) : [...c.memberIds, candId]};
    }));
  };

  const coalitionSeats = (coal) =>
    coal.memberIds.reduce((s, id) => s + (seatTotals[id]||0), 0);

  if (!coalitions.length && !showForm) return (

              style={{width:"32px",height:"32px",border:"none",borderRadius:"4px",cursor:"pointer",padding:0,flexShrink:0}}/>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
