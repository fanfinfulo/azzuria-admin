// Literacy: 1-5 scale (Very Low → Very High)
// Driven by Intellectuals influence (+), Bureaucrats (+), Church (−)
const litLevel = (data, col) => {
  const raw   = data[5][col] * 3 + data[1][col] - data[4][col] * 0.5 + 5;
  const score = raw / 15;
  if (score < 0.6)  return { n:1, label:"Very Low",  color:"#c4605a" };
  if (score < 0.9)  return { n:2, label:"Low",        color:"#c47a5a" };
  if (score < 1.2)  return { n:3, label:"Average",    color:"#c9a84c" };
  if (score < 1.5)  return { n:4, label:"High",       color:"#8fae7a" };
  return                    { n:5, label:"Very High",  color:"#6db87a" };
};

// National unrest: auto-derived from agitation
// Restless (3-4) = +1 each, Agitated (5-6) = +2 each, capped 0-10
const calcNatUnrest = (agitation) => {
  const restless = agitation.filter(a => a >= 3 && a < 5).length;
  const agitated = agitation.filter(a => a >= 5).length;
  return Math.min(10, restless + agitated * 2);
};

const POP_SCALE = 50;
const popPct = (v) => v <= 0 ? 0 : Math.min(100, Math.round(v / POP_SCALE * 100));

const calcPopularity = (cand, data, agitation, natUnrest, tariffs, currentTurn, allCandidates) =>
  REGIONS.map((_, rIdx) => {
    let score = 0;
    const base = cand.classBase || [];
    const regionBase = cand.regionBase || [];
    const litData = litLevel(data, rIdx);
    
    // === ЗАКОНЫ ===
    // Популярность закона = (влияние_класса * 1.25 если выбран, иначе как есть) / 2 - влияние_антагониста / 4
    // Применить коэффициент затухания
    cand.laws.forEach(law => {
      const lawAge = currentTurn ? Math.max(0, currentTurn - (law.enactedTurn || 1)) : 0;
      
      // Коэффициент затухания: 1 для первых 3 ходов, затем −10% за каждый следующий ход
      const decayBonus = lawAge <= 3 ? 1 : Math.max(0, 1 - (lawAge - 3) * 0.10);
      
      law.effects.forEach(({classIdx, type}) => {
        const inf = data[classIdx][rIdx];
        const chosenMult = base.includes(classIdx) ? 1.25 : 1;
        const classValue = (inf * chosenMult) / 2;
        
        const ant = ANTAGONISTS[classIdx];
        const antValue = ant !== undefined ? (data[ant][rIdx] / 4) : 0;
        
        let lawPopularity = classValue - antValue;
        
        // Применить коэффициент затухания
        lawPopularity *= decayBonus;
        
        if (type === "malus") lawPopularity *= -1;
        
        score += lawPopularity;
      });
    });
    
    // === ДЕЙСТВИЯ ===
    // Популярность действия = бонус_действия * грамотность_региона * коэф_затухания
    // Грамотность ограничена максимум на 3 для механических целей
    // Применить коэффициент затухания: 1 для первых 3 ходов, затем −10% за каждый следующий ход
    const litCapped = Math.min(3, litData.n);
    (cand.actions || []).filter(a => !a.negative).forEach(a => {
      const actionAge = currentTurn ? Math.max(0, currentTurn - (a.addedTurn || 1)) : 0;
      const decayBonus = actionAge <= 3 ? 1 : Math.max(0, 1 - (actionAge - 3) * 0.10);
      
      score += (a.bonuses[rIdx] || 0) * litCapped * decayBonus;
    });
    
    // === ВХОДЯЩИЕ ОТРИЦАТЕЛЬНЫЕ ДЕЙСТВИЯ ===
    if (allCandidates) {
      allCandidates.filter(c => c.id !== cand.id).forEach(attacker => {
        (attacker.actions || []).filter(a => a.negative && a.targetPartyId === cand.id).forEach(a => {
          const actionAge = currentTurn ? Math.max(0, currentTurn - (a.addedTurn || 1)) : 0;
          const decayBonus = actionAge <= 3 ? 1 : Math.max(0, 1 - (actionAge - 3) * 0.10);
          
          score -= (a.bonuses[rIdx] || 0) * litCapped * decayBonus;
        });
      });
    }

    // === ВЛИЯНИЕ ЭКОНОМИЧЕСКОЙ СИТУАЦИИ ===
    const ur = unrestInfo(natUnrest);
    if (ur.label === "Volatile" || ur.label === "Crisis") score -= 2;
    
    // === РЕГИОНАЛЬНЫЙ МНОЖИТЕЛЬ ===
    // Применить ×1.25 ко ВСЕМУ счёту если регион в региональной базе партии
    // (только если счёт положительный)
    if (regionBase.includes(rIdx) && score > 0) {
      score *= 1.25;
    }
    
    return Math.round(score);
  });

                  ))}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"center",marginTop:"14px"}}>
          <button onClick={onClose} style={{padding:"7px 20px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",color:SOFT,cursor:"pointer",fontSize:"11px",letterSpacing:"2px",fontFamily:"Georgia,serif"}}>Close</button>
        </div>
      </div>
    </div>
  );
}

              <thead>

// ── CANDIDATES TAB ────────────────────────────────────────────────────────────

function CandidatesTab({data, setData, candidates, setCandidates, activeCand, setActiveCand, agitation, setAgitation, natUnrest, tariffs, turn, pendingParties, setPendingParties}) {
  const [newCandName, setNewCandName] = useState("");
  const [newLawName,  setNewLawName]  = useState("");
  const [newLawDesc,  setNewLawDesc]  = useState("");
  const [newLawFx,    setNewLawFx]    = useState(CLASSES.map(() => "neutral"));
  const [showLawForm, setShowLawForm] = useState(false);
  const [showActForm, setShowActForm] = useState(false);
  const [newActName,  setNewActName]  = useState("");
  const [newActType,  setNewActType]  = useState("Newspaper");
  const [newActBon,   setNewActBon]   = useState(REGIONS.map(() => 0));
  const [newActNeg,   setNewActNeg]   = useState(false);          // negative action toggle
  const [newActTarget,setNewActTarget]= useState(null);           // target party id
  const [newActClass, setNewActClass] = useState(0);              // target class idx
  const [selRegion,   setSelRegion]   = useState(null);

  const addCand = () => {
    const name = newCandName.trim(); if (!name) return;
    const id = Date.now(), color = CAND_COLORS[candidates.length % CAND_COLORS.length];
    setCandidates(p => [...p, {id,name,color,laws:[],actions:[],actionsLeft:BASE_ACTIONS}]);
    setActiveCand(id); setNewCandName("");
  };
  const removeCand = id => setCandidates(p => {
    const n = p.filter(c => c.id !== id);
    if (activeCand === id && n.length > 0) setActiveCand(n[0].id);
    return n;
  });
  const updateCandColor = (id, color) => setCandidates(p => p.map(c => c.id===id ? {...c, color} : c));
  const updateCandName  = (id, name)  => setCandidates(p => p.map(c => c.id===id ? {...c, name}  : c));
  const addLaw = () => {
    if (!newLawName.trim()) return;
    const effects = newLawFx.map((e,i) => ({classIdx:i,type:e})).filter(e => e.type !== "neutral");
    if (!effects.length) return;
    setCandidates(p => p.map(c => c.id===activeCand
      ? {...c, laws:[...c.laws,{id:Date.now(),name:newLawName.trim(),desc:newLawDesc.trim(),effects,enactedTurn:turn}]} : c));
    // Apply agitation deltas immediately: bonus=-1, malus=+2 (doubled at Crisis), capped 0-6
    const isCrisis = calcNatUnrest(agitation) >= 7;
    setAgitation(prev => {
      const next = [...prev];
      effects.forEach(({classIdx, type}) => {
        const delta = type==="bonus" ? -1 : (isCrisis ? +4 : +2);
        next[classIdx] = Math.max(0, Math.min(6, next[classIdx] + delta));
      });
      return next;
    });
    // Apply influence delta: bonus=+1 to class, −1 to antagonist; malus reverses
    setData(prev => {
      const next = prev.map(row => [...row]);
      effects.forEach(({classIdx, type}) => {
        const delta = type==="bonus" ? +1 : -1;
        next[classIdx] = next[classIdx].map(v => Math.max(1, Math.min(10, v + delta)));
        // Antagonist moves opposite direction
        const ant = ANTAGONISTS[classIdx];
        if (ant !== undefined) {
          next[ant] = next[ant].map(v => Math.max(1, Math.min(10, v - delta)));
        }
      });
      return next;
    });
    setNewLawName(""); setNewLawDesc(""); setNewLawFx(CLASSES.map(()=>"neutral")); setShowLawForm(false);
    // Spend 1 action — flat cost regardless of unrest
    setCandidates(p => p.map(c => c.id===activeCand
      ? {...c, actionsLeft: Math.max(0, (c.actionsLeft ?? BASE_ACTIONS) - 1)} : c));
  };
  const removeLaw    = lid => setCandidates(p => p.map(c => c.id===activeCand ? {...c, laws:c.laws.filter(l=>l.id!==lid)} : c));
  const addAction = () => {
    if (!newActName.trim() || newActBon.every(b=>b===0)) return;
    if (newActNeg && !newActTarget) return; // negative action needs a target
    const actionData = {
      id: Date.now(),
      name: newActName.trim(),
      type: newActType,
      bonuses: [...newActBon],
      addedTurn: turn,
      negative: newActNeg,
      targetPartyId: newActNeg ? newActTarget : null,
      targetClassIdx: newActNeg ? newActClass : null,
    };
    // Spend 1 action — flat cost
    setCandidates(p => p.map(c => c.id===activeCand
      ? {...c,
          actions:[...(c.actions||[]), actionData],
          actionsLeft: Math.max(0, (c.actionsLeft ?? BASE_ACTIONS) - 1),
        }
      : c));
    setNewActName(""); setNewActType("Newspaper"); setNewActBon(REGIONS.map(()=>0));
    setNewActNeg(false); setNewActTarget(null); setNewActClass(0);
    setShowActForm(false);
  };
  const removeAction = aid => setCandidates(p => p.map(c => c.id===activeCand
    ? {...c, actions:(c.actions||[]).filter(a=>a.id!==aid)} : c));

  const cand    = candidates.find(c => c.id === activeCand);
  const myPop   = c => calcPopularity(c, data, agitation, natUnrest, tariffs, turn, candidates);
  const hasContent = c => c.laws.length > 0 || (c.actions||[]).length > 0;

  // Projected agitation after the current law form selections
  const projectedAgit = CLASSES.map((_, i) => {
    const fx = newLawFx[i];
    const delta = fx==="bonus" ? -1 : fx==="malus" ? +2 : 0;
    return Math.max(0, Math.min(6, agitation[i] + delta));
  });

  // Mini agitation bar used in law form
  const AgitBar = ({current, projected, classIdx}) => {
    const curPh  = agitPhase(current);
    const projPh = agitPhase(projected);
    const delta  = projected - current;
    const changed = delta !== 0;
    return (
      <div style={{display:"flex",alignItems:"center",gap:"6px",flex:1}}>
        {/* bar */}
        <div style={{position:"relative",flex:1,height:"5px",background:"rgba(255,255,255,0.06)",borderRadius:"3px",overflow:"hidden"}}>
          {/* current fill */}
          <div style={{
            position:"absolute",left:0,top:0,height:"100%",borderRadius:"3px",
            width:(current/6*100)+"%",
            background:curPh.color,
            opacity: changed ? 0.35 : 0.9,
            transition:"width .3s",
          }}/>
          {/* projected fill overlay */}
          {changed && (
            <div style={{
              position:"absolute",left:0,top:0,height:"100%",borderRadius:"3px",
              width:(projected/6*100)+"%",
              background:projPh.color,
              opacity:0.9,
              transition:"width .3s",
            }}/>
          )}
        </div>
        {/* label */}
        {changed ? (
          <span style={{fontSize:"9px",whiteSpace:"nowrap",color:delta>0?"#c4605a":"#6db87a",fontWeight:"bold"}}>
            {delta>0?"+"+delta:delta} → {projPh.label.slice(0,4)}
          </span>
        ) : (
          <span style={{fontSize:"9px",whiteSpace:"nowrap",color:curPh.color,opacity:.7}}>{curPh.label.slice(0,4)}</span>
        )}
      </div>
    );
  };

  // Agitation impact summary for an enacted law
  const lawAgitSummary = law => law.effects.map(({classIdx, type}) => {
    const delta = type==="bonus" ? -1 : +2;
    return {classIdx, delta, label: CLASSES[classIdx]};
  });

  const smBtn = (active, onClick, label) => (
    <button onClick={onClick} style={{
      padding:"5px 12px", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:"10px",
      letterSpacing:"2px", textTransform:"uppercase", borderRadius:"4px",
      background:active?"rgba(201,168,76,0.18)":"rgba(255,255,255,0.03)",
      border:`1px solid ${active?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.08)"}`,
      color:active?GOLD:SOFT,
    }}>{label}</button>
  );

  return (
    <div style={{padding:"24px 20px"}}>
      {selRegion !== null && (
        <RegionModal rIdx={selRegion} candidates={candidates} data={data} agitation={agitation} natUnrest={natUnrest} regionDescs={regionDescs} setRegionDescs={setRegionDescs} tariffs={tariffs} turn={turn} onClose={() => setSelRegion(null)}/>
      )}

      {/* ── pending parties ── */}
      {(pendingParties||[]).length > 0 && (
        <div style={{marginBottom:"24px",padding:"16px",background:"rgba(196,120,60,0.04)",border:"1px solid rgba(196,120,60,0.18)",borderRadius:"6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
            <span style={{fontSize:"9px",letterSpacing:"5px",color:"#c47a5a",textTransform:"uppercase"}}>Pending Approval</span>
            <span style={{fontSize:"9px",color:"#c47a5a",border:"1px solid rgba(196,122,90,0.3)",borderRadius:"3px",padding:"1px 6px"}}>{pendingParties.length}</span>
            <button onClick={async () => {
              try {
                const res = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
                  headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
                });
                const d = await res.json();
                if (d.record && Array.isArray(d.record.pendingParties)) {
                  const localIds = new Set(pendingParties.map(p => p.id));
                  const merged   = [...pendingParties, ...d.record.pendingParties.filter(p => !localIds.has(p.id))];
                  setPendingParties(merged);
                }
              } catch(e) {}
            }} style={{marginLeft:"auto",padding:"2px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",background:"rgba(196,122,90,0.08)",border:"1px solid rgba(196,122,90,0.2)",borderRadius:"3px",color:"#c47a5a"}}>
              ↻ Refresh
            </button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {pendingParties.map(party => (
              <div key={party.id} style={{padding:"12px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderLeft:"3px solid "+party.color,borderRadius:"4px"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px",marginBottom:"8px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px"}}>
                      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:party.color,flexShrink:0}}/>
                      <span style={{fontSize:"14px",color:party.color,letterSpacing:"1px"}}>{party.name}</span>
                    </div>
                    {party.desc && <div style={{fontSize:"11px",color:SOFT,fontStyle:"italic",marginBottom:"5px"}}>{party.desc}</div>}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"3px"}}>
                      {(party.classBase||[]).map(i => (
                        <span key={i} style={{fontSize:"8px",padding:"1px 7px",borderRadius:"3px",fontFamily:"Georgia,serif",
                          background:CLASS_COLORS[i]+"18",border:"1px solid "+CLASS_COLORS[i]+"44",color:CLASS_COLORS[i]}}>
                          {CLASSES[i]}
                        </span>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom:"3px"}}>
                      {(party.regions||[]).map(i => (
                        <span key={i} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.2)",color:GOLD}}>{REGIONS[i]}</span>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                      {(party.tags||[]).map(t => (
                        <span key={t} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:SOFT}}>{t}</span>
                      ))}
                    </div>
                    {(party.chars||[]).length > 0 && (
                      <div style={{marginTop:"6px",paddingTop:"6px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                        {party.chars.map(ch => (
                          <div key={ch.name} style={{fontSize:"10px",color:SOFT,display:"flex",gap:"6px"}}>
                            <span style={{color:"#e8dcc8"}}>{ch.name}</span>
                            {ch.role && <span style={{color:DIM,fontStyle:"italic"}}>{ch.role}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",gap:"7px"}}>
                  <button onClick={() => {
                    const c = {id:party.id, name:party.name, color:party.color, classBase:party.classBase||[], laws:[], actions:[], actionsLeft:3};
                    setCandidates(p => [...p, c]);
                    setPendingParties(p => p.filter(x => x.id !== party.id));
                    setActiveCand(c.id);
                  }} style={{padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                    background:"rgba(80,160,100,0.12)",border:"1px solid rgba(80,160,100,0.35)",borderRadius:"4px",color:"#6db87a"}}>
                    ✓ Approve
                  </button>
                  <button onClick={async () => {
                    const updated = pendingParties.filter(x => x.id !== party.id);
                    setPendingParties(updated);
                    // Write removal back to JSONbin immediately so it doesn't reappear on next poll
                    try {
                      const pr = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest?t=" + Date.now(), {
                        headers:{"X-Access-Key":JSONBIN_ACCESS_KEY,"Cache-Control":"no-cache"}, cache:"no-store"
                      });
                      const pd = await pr.json();
                      const current = pd.record || {};
                      await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID, {
                        method:"PUT",
                        headers:{"Content-Type":"application/json","X-Access-Key":JSONBIN_ACCESS_KEY},
                        body: JSON.stringify({...current, pendingParties: updated}),
                      });
                    } catch(e) { console.error("Deny sync failed:", e); }
                  }} style={{
                    padding:"6px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",
                    background:"rgba(200,80,60,0.08)",border:"1px solid rgba(200,80,60,0.22)",borderRadius:"4px",color:"#c4605a"}}>
                    ✗ Deny
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── candidate switcher ── */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center",marginBottom:"24px",alignItems:"flex-start"}}>
        {candidates.map(c => (
          <div key={c.id} style={{
            display:"flex",flexDirection:"column",alignItems:"stretch",gap:"4px",
            padding:"10px 12px",
            background:activeCand===c.id?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.01)",
            border:`1px solid ${activeCand===c.id?c.color+"55":"rgba(255,255,255,0.07)"}`,
            borderRadius:"6px",minWidth:"160px",cursor:"pointer",
          }} onClick={() => setActiveCand(c.id)}>
            {/* top row: color swatch + editable name + delete */}
            <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
              {/* color picker — clicking the swatch opens native color input */}
              <div style={{position:"relative",flexShrink:0}}>
                <div style={{width:"14px",height:"14px",borderRadius:"50%",background:c.color,border:"2px solid rgba(255,255,255,0.15)",cursor:"pointer"}}/>
                <input
                  type="color"
                  value={c.color}
                  onChange={e => { e.stopPropagation(); updateCandColor(c.id, e.target.value); }}
                  onClick={e => e.stopPropagation()}
                  style={{position:"absolute",top:0,left:0,width:"14px",height:"14px",opacity:0,cursor:"pointer",padding:0,border:"none"}}
                />
              </div>
              {/* editable name */}
              <input
                value={c.name}
                onChange={e => { e.stopPropagation(); updateCandName(c.id, e.target.value); }}
                onClick={e => e.stopPropagation()}
                style={{
                  background:"transparent",border:"none",outline:"none",
                  fontFamily:"Georgia,serif",fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",
                  color:activeCand===c.id?c.color:SOFT,
                  flex:1,minWidth:0,cursor:"text",
                }}
              />
              {candidates.length > 1 && (
                <button onClick={e => { e.stopPropagation(); removeCand(c.id); }} style={{background:"none",border:"none",color:"#5a3a30",cursor:"pointer",fontSize:"13px",padding:"0 2px",flexShrink:0}}>×</button>
              )}
            </div>
            {/* actions remaining pip row */}
            <div style={{display:"flex",gap:"3px",alignItems:"center"}}>
              {Array.from({length: BASE_ACTIONS}).map((_,i) => (
                <div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:i < (c.actionsLeft??BASE_ACTIONS)?c.color:"rgba(255,255,255,0.07)"}}/>
              ))}
              <span style={{fontSize:"8px",color:DIM,marginLeft:"4px",letterSpacing:"1px"}}>{c.actionsLeft??BASE_ACTIONS} left</span>
            </div>
          </div>
        ))}
        {/* add new */}
        <div style={{display:"flex",flexDirection:"column",gap:"4px",justifyContent:"center",padding:"10px 12px",border:"1px dashed rgba(255,255,255,0.06)",borderRadius:"6px",minWidth:"130px"}}>
          <input value={newCandName} onChange={e=>setNewCandName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCand()}
            placeholder="New candidate..." style={{...INPUT,width:"100%",padding:"5px 8px",fontSize:"11px",background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.1)",borderRadius:0,outline:"none"}}/>
          <button onClick={addCand} style={{padding:"5px",background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"10px",fontFamily:"Georgia,serif",letterSpacing:"2px",textTransform:"uppercase"}}>+ Add</button>
        </div>
      </div>

      {cand && (
        <div style={{maxWidth:"720px",margin:"0 auto"}}>

          {/* ── LAWS SECTION ── */}
          <div style={{marginBottom:"28px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>Laws & Policies</span>
              {smBtn(showLawForm, () => { setShowLawForm(f=>!f); setShowActForm(false); }, showLawForm?"Cancel":"+ New Law")}
            </div>

            {/* law form */}
            {showLawForm && (
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:"6px",padding:"16px",marginBottom:"12px"}}>
                <input value={newLawName} onChange={e=>setNewLawName(e.target.value)}
                  placeholder="Law name..." style={{...INPUT,marginBottom:"8px"}}/>
                <textarea value={newLawDesc} onChange={e=>setNewLawDesc(e.target.value)}
                  placeholder="Description (optional)" rows={2}
                  style={{...INPUT,color:SOFT,fontSize:"12px",marginBottom:"14px",resize:"vertical",lineHeight:"1.5"}}></textarea>

                <div style={{fontSize:"9px",letterSpacing:"3px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>Class Reactions & Agitation Impact</div>

                <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"14px"}}>
                  {CLASSES.map((cls, i) => {
                    const fx = newLawFx[i];
                    const antIdx = ANTAGONISTS[i];
                    const antName = antIdx !== undefined ? CLASSES[antIdx] : null;
                    return (
                      <div key={cls} style={{
                        display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",
                        background:fx==="bonus"?"rgba(80,160,100,0.04)":fx==="malus"?"rgba(200,80,60,0.04)":"rgba(255,255,255,0.015)",
                        border:`1px solid ${agitation[i]>=5?"rgba(200,80,60,0.2)":agitation[i]>=3?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.05)"}`,
                        borderRadius:"4px",
                      }}>
                        <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"2px",background:CLASS_COLORS[i],flexShrink:0}}/>
                        <div style={{width:"110px",flexShrink:0}}>
                          <div style={{fontSize:"10px",color:"#b0a080",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cls}</div>
                          {antName && fx !== "neutral" && (
                            <div style={{fontSize:"8px",color:fx==="bonus"?"#c4605a":"#6db87a",whiteSpace:"nowrap",marginTop:"1px"}}>
                              {fx==="bonus"?"⚡ angers":"✓ pleases"} {antName}
                            </div>
                          )}
                        </div>
                        <AgitBar current={agitation[i]} projected={projectedAgit[i]} classIdx={i}/>
                        {fx !== "neutral" && (
                          <span style={{
                            fontSize:"8px",whiteSpace:"nowrap",flexShrink:0,
                            padding:"1px 5px",borderRadius:"3px",
                            background:fx==="bonus"?"rgba(80,160,100,0.12)":"rgba(200,80,60,0.12)",
                            border:`1px solid ${fx==="bonus"?"rgba(80,160,100,0.3)":"rgba(200,80,60,0.3)"}`,
                            color:fx==="bonus"?"#6db87a":"#c4605a",
                          }}>inf {fx==="bonus"?"+1":"−1"}</span>
                        )}
                        <div style={{display:"flex",gap:"2px",flexShrink:0}}>
                          {["bonus","neutral","malus"].map(type => {
                            const isA = fx === type;
                            const col = type==="bonus"?"#6db87a":type==="malus"?"#c4605a":SOFT;
                            const lbl = type==="bonus"?"Y":type==="malus"?"N":"–";
                            return (
                              <button key={type} onClick={() => setNewLawFx(p=>{const n=[...p];n[i]=type;return n;})} style={{
                                width:"24px",height:"24px",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif",padding:0,borderRadius:"3px",
                                background:isA?col+"28":"transparent",
                                border:`1px solid ${isA?col:"rgba(255,255,255,0.08)"}`,
                                color:isA?col:"#5a4a30",
                              }}>{lbl}</button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"9px",color:DIM}}>Y = +pop, agit−1 · N = −pop, agit+2 · Laws expire after 12 turns — re-legislate to maintain effect</span>
                  <button onClick={addLaw} style={{padding:"6px 18px",background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.35)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif"}}>Enact</button>
                </div>
              </div>
            )}

            {/* enacted laws list */}
            {cand.laws.length === 0 ? (
              <div style={{textAlign:"center",padding:"14px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>No laws enacted</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {cand.laws.map(law => {
                  const agitSummary = lawAgitSummary(law);
                  const gains  = agitSummary.filter(x=>x.delta<0);
                  const losses = agitSummary.filter(x=>x.delta>0);
                  const age      = Math.max(0, turn - (law.enactedTurn || 1));
                  const expired  = age >= 12;
                  const expireAt = (law.enactedTurn || 1) + 12;
                  const turnsLeft = Math.max(0, expireAt - turn);
                  const expColor = turnsLeft <= 2 ? "#c4605a" : turnsLeft <= 4 ? "#c9a84c" : "#6db87a";
                  return (
                    <div key={law.id} style={{background:expired?"rgba(255,255,255,0.01)":"rgba(255,255,255,0.02)",border:`1px solid ${expired?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.06)"}`,borderRadius:"5px",padding:"10px 12px",opacity:expired?0.45:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"7px"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"12px",color:"#e8dcc8",marginBottom:law.desc?"2px":"0"}}>{law.name}</div>
                          {law.desc && <div style={{fontSize:"10px",color:SOFT,fontStyle:"italic"}}>{law.desc}</div>}
                        </div>
                        {expired
                          ? <span style={{fontSize:"8px",color:"#c4605a",border:"1px solid rgba(200,80,60,0.3)",borderRadius:"3px",padding:"1px 6px",flexShrink:0,letterSpacing:"1px"}}>EXPIRED</span>
                          : <span style={{fontSize:"8px",color:expColor,border:`1px solid ${expColor}44`,borderRadius:"3px",padding:"1px 6px",flexShrink:0,letterSpacing:"1px"}}>T+{turnsLeft}</span>
                        }
                        <button onClick={() => removeLaw(law.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"12px",padding:"1px 5px",flexShrink:0}}>×</button>
                      </div>
                      {/* popularity tags */}
                      <div style={{display:"flex",flexWrap:"wrap",gap:"3px",marginBottom: agitSummary.length?"6px":"0"}}>
                        {law.effects.map(({classIdx,type}) => {
                          const isAg = agitation[classIdx]>=5;
                          return (
                            <span key={classIdx} style={{fontSize:"9px",padding:"1px 7px",borderRadius:"3px",
                              background:type==="bonus"?"rgba(80,160,100,0.1)":"rgba(200,80,60,0.1)",
                              border:`1px solid ${type==="bonus"?"rgba(80,160,100,0.25)":isAg?"rgba(200,80,60,0.5)":"rgba(200,80,60,0.25)"}`,
                              color:type==="bonus"?"#80c890":isAg?"#ff8070":"#e08060",
                            }}>{type==="bonus"?"+":"-"} {CLASSES[classIdx]}{type==="malus"&&isAg?" (!)":""}</span>
                          );
                        })}
                      </div>
                      {/* agitation impact row */}
                      {agitSummary.length > 0 && (
                        <div style={{display:"flex",gap:"3px",flexWrap:"wrap",alignItems:"center",paddingTop:"5px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",marginRight:"3px"}}>Agit</span>
                          {gains.map(x => (
                            <span key={x.classIdx} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:"rgba(80,160,100,0.1)",border:"1px solid rgba(80,160,100,0.2)",color:"#6db87a"}}>
                              {x.label.slice(0,4)} −1
                            </span>
                          ))}
                          {losses.map(x => {
                            const cur = agitation[x.classIdx];
                            const isAg = cur>=5;
                            return (
                              <span key={x.classIdx} style={{fontSize:"8px",padding:"1px 6px",borderRadius:"3px",background:isAg?"rgba(200,80,60,0.15)":"rgba(200,80,60,0.08)",border:`1px solid ${isAg?"rgba(200,80,60,0.5)":"rgba(200,80,60,0.2)"}`,color:isAg?"#ff8070":"#e08060"}}>
                                {x.label.slice(0,4)} +2{isAg?" (!)":""}
                              </span>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── CAMPAIGN ACTIONS SECTION ── */}
          <div style={{marginBottom:"28px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>Campaign Actions</span>
              {smBtn(showActForm, () => { setShowActForm(f=>!f); setShowLawForm(false); }, showActForm?"Cancel":"+ New Action")}
            </div>

            {/* literacy strip */}
            <div style={{display:"flex",gap:"3px",flexWrap:"wrap",marginBottom:"10px",padding:"6px 10px",background:"rgba(100,160,200,0.04)",border:"1px solid rgba(100,160,200,0.12)",borderRadius:"4px",alignItems:"center"}}>
              <span style={{fontSize:"8px",color:"#7ab0d0",letterSpacing:"2px",textTransform:"uppercase",marginRight:"4px",flexShrink:0}}>Literacy</span>
              {REGIONS.map((r,i) => {
                const lit = litLevel(data,i);
                return <span key={r} style={{fontSize:"8px",color:lit.color,padding:"1px 5px",borderRadius:"3px",background:lit.color+"12",border:`1px solid ${lit.color}25`}}>{r.slice(0,3)} ×{lit.n}</span>;
              })}
            </div>

            {/* action form */}
            {showActForm && (
              <div style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${newActNeg?"rgba(200,80,60,0.25)":"rgba(100,160,200,0.18)"}`,borderRadius:"6px",padding:"16px",marginBottom:"12px"}}>
                {/* Name + type row */}
                <div style={{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}}>
                  <input value={newActName} onChange={e=>setNewActName(e.target.value)}
                    placeholder="Action name..." style={{...INPUT,flex:"2 1 120px",width:"auto"}}/>
                  <select value={newActType} onChange={e=>setNewActType(e.target.value)}
                    style={{flex:"1 1 90px",padding:"9px 8px",background:"#1e1a12",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",color:"#e8dcc8",fontSize:"11px",fontFamily:"Georgia,serif",outline:"none",cursor:"pointer"}}>
                    {ACTION_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>

                {/* Negative toggle */}
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",padding:"8px 10px",
                  background:newActNeg?"rgba(200,80,60,0.06)":"rgba(255,255,255,0.015)",
                  border:`1px solid ${newActNeg?"rgba(200,80,60,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:"4px"}}>
                  <button onClick={()=>setNewActNeg(f=>!f)} style={{
                    padding:"4px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",letterSpacing:"2px",
                    textTransform:"uppercase",borderRadius:"3px",
                    background:newActNeg?"rgba(200,80,60,0.2)":"rgba(255,255,255,0.04)",
                    border:`1px solid ${newActNeg?"rgba(200,80,60,0.5)":"rgba(255,255,255,0.12)"}`,
                    color:newActNeg?"#e08060":DIM}}>
                    {newActNeg?"⚔ Negative Action":"○ Positive Action"}
                  </button>
                  <span style={{fontSize:"9px",color:DIM,flex:1}}>
                    {newActNeg
                      ? "Applies a malus to a rival party in selected regions"
                      : "Adds popularity bonus for this party in selected regions"}
                  </span>
                </div>

                {/* Negative action: target party + class */}
                {newActNeg && (
                  <div style={{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap",padding:"8px 10px",
                    background:"rgba(200,80,60,0.04)",border:"1px solid rgba(200,80,60,0.12)",borderRadius:"4px"}}>
                    <div style={{flex:1,minWidth:"140px"}}>
                      <div style={{fontSize:"8px",color:"#c4605a",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Target Party</div>
                      <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                        {candidates.filter(c=>c.id!==activeCand).map(c=>(
                          <button key={c.id} onClick={()=>setNewActTarget(c.id)}
                            style={{padding:"4px 10px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                              background:newActTarget===c.id?c.color+"22":"rgba(255,255,255,0.02)",
                              border:`1px solid ${newActTarget===c.id?c.color:"rgba(255,255,255,0.1)"}`,
                              borderRadius:"3px",color:newActTarget===c.id?c.color:SOFT}}>
                            {c.name}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div style={{flex:1,minWidth:"140px"}}>
                      <div style={{fontSize:"8px",color:"#c4605a",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"5px"}}>Class to Attack</div>
                      <select value={newActClass} onChange={e=>setNewActClass(Number(e.target.value))}
                        style={{width:"100%",padding:"5px 8px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"3px",color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"11px"}}>
                        {CLASSES.map((cls,i)=><option key={i} value={i}>{cls}</option>)}
                      </select>
                    </div>
                  </div>
                )}

                <div style={{fontSize:"9px",letterSpacing:"2px",color:DIM,textTransform:"uppercase",marginBottom:"8px"}}>
                  {newActNeg ? "Malus strength per region × literacy" : "Bonus per region (0–3) × literacy multiplier"}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"4px",marginBottom:"12px"}}>
                  {REGIONS.map((r,i) => {
                    const lit = litLevel(data,i);
                    const base = newActBon[i];
                    return (
                      <div key={r} style={{display:"flex",alignItems:"center",gap:"6px",
                        background:newActNeg?"rgba(200,60,60,0.04)":"rgba(255,255,255,0.015)",
                        border:"1px solid rgba(255,255,255,0.05)",borderRadius:"4px",padding:"5px 8px"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"10px",color:"#b0a080"}}>{r}</div>
                          {base > 0 && <div style={{fontSize:"8px",color:newActNeg?"#e08060":"#7ab0d0"}}>{newActNeg?"−":"+"}{ base*lit.n}</div>}
                        </div>
                        <div style={{display:"flex",gap:"2px"}}>
                          {[0,1,2,3].map(v => {
                            const isA = newActBon[i]===v;
                            return (
                              <button key={v} onClick={()=>setNewActBon(p=>{const n=[...p];n[i]=v;return n;})} style={{
                                width:"20px",height:"20px",cursor:"pointer",fontSize:"10px",fontFamily:"Georgia,serif",padding:0,borderRadius:"3px",
                                background:isA?(v===0?"rgba(255,255,255,0.04)":newActNeg?"rgba(200,80,60,0.2)":"rgba(100,200,120,0.2)"):"transparent",
                                border:`1px solid ${isA?(v===0?"rgba(255,255,255,0.12)":newActNeg?"rgba(200,80,60,0.45)":"rgba(100,200,120,0.45)"):"rgba(255,255,255,0.06)"}`,
                                color:isA?(v===0?DIM:newActNeg?"#e08060":"#80c890"):SOFT,
                              }}>{v}</button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"9px",color:DIM}}>Costs 1 action</span>
                  <button onClick={addAction}
                    disabled={newActNeg && !newActTarget}
                    style={{padding:"6px 18px",
                      background:newActNeg?"rgba(200,80,60,0.15)":"rgba(100,160,200,0.12)",
                      border:`1px solid ${newActNeg?"rgba(200,80,60,0.4)":"rgba(100,160,200,0.35)"}`,
                      borderRadius:"4px",color:newActNeg?"#e08060":"#7ab0d0",cursor:"pointer",
                      fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif",
                      opacity:(newActNeg&&!newActTarget)?0.4:1}}>Add</button>
                </div>
              </div>
            )}

            {(cand.actions||[]).length === 0 ? (
              <div style={{textAlign:"center",padding:"14px",color:DIM,fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:"5px"}}>No campaign actions</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                {(cand.actions||[]).map(action => {
                  const isNeg = action.negative;
                  const tgt   = isNeg ? candidates.find(c=>c.id===action.targetPartyId) : null;
                  const acol  = isNeg ? "#e08060" : "#7ab0d0";
                  const abdr  = isNeg ? "rgba(200,80,60,0.2)" : "rgba(100,160,200,0.2)";
                  return (
                    <div key={action.id} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${isNeg?"rgba(200,80,60,0.15)":"rgba(100,160,200,0.1)"}`,borderRadius:"5px",padding:"9px 12px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                      <span style={{fontSize:"8px",color:acol,letterSpacing:"1px",textTransform:"uppercase",border:`1px solid ${abdr}`,borderRadius:"3px",padding:"1px 5px",flexShrink:0}}>{isNeg?"⚔":""}{action.type}</span>
                      <span style={{fontSize:"12px",color:"#e8dcc8",flex:1,minWidth:"70px"}}>{action.name}</span>
                      {isNeg && tgt && (
                        <span style={{fontSize:"8px",color:tgt.color,border:`1px solid ${tgt.color}44`,borderRadius:"3px",padding:"1px 6px",flexShrink:0}}>
                          → {tgt.name} · {CLASSES[action.targetClassIdx]}
                        </span>
                      )}
                      <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                        {action.bonuses.map((b,i) => b > 0 ? (
                          <span key={i} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"3px",
                            background:isNeg?"rgba(200,80,60,0.1)":"rgba(100,200,120,0.1)",
                            border:`1px solid ${isNeg?"rgba(200,80,60,0.25)":"rgba(100,200,120,0.25)"}`,
                            color:isNeg?"#e08060":"#80c890"}}>
                            {isNeg?"−":"+"}{b*litLevel(data,i).n} {REGIONS[i]}
                          </span>
                        ) : null)}
                      </div>
                      <button onClick={() => removeAction(action.id)} style={{background:"none",border:"1px solid rgba(200,80,60,0.2)",borderRadius:"3px",color:"#c4605a",cursor:"pointer",fontSize:"12px",padding:"1px 5px"}}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── POPULARITY TABLE ── */}
          {hasContent(cand) && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
                <span style={{fontSize:"10px",letterSpacing:"4px",color:DIM,textTransform:"uppercase"}}>{cand.name} — Popularity</span>
                <span style={{fontSize:"9px",color:DIM}}>Click region to compare all candidates</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"2px"}}>
                  <thead>
                    <tr>
                      {REGIONS.map((r,i) => (
                        <th key={r} onClick={() => setSelRegion(i)}
                          onMouseEnter={e=>{e.currentTarget.style.color=GOLD;}}
                          onMouseLeave={e=>{e.currentTarget.style.color=DIM;}}
                          style={{padding:"5px 3px",textAlign:"center",fontSize:"8px",letterSpacing:"1px",color:DIM,textTransform:"uppercase",fontWeight:"normal",cursor:"pointer",minWidth:"58px"}}>
                          {r}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      {myPop(cand).map((score,i) => (
                        <td key={i} style={{padding:"2px"}}>
                          <div onClick={() => setSelRegion(i)} style={{textAlign:"center",padding:"10px 2px",borderRadius:"4px",background:popColor(score)+"12",border:`1px solid ${popColor(score)}33`,fontSize:"16px",fontWeight:"bold",color:popColor(score),cursor:"pointer"}}>
                            {score>0?"+"+score:score}
                          </div>
                        </td>
                      ))}
                    </tr>
                    {cand.laws.map(law => {
                      const scores = REGIONS.map((_,rIdx) => {
                        let s=0;
                        law.effects.forEach(({classIdx,type}) => {
                          const inf=data[classIdx][rIdx], isAg=agitation[classIdx]>=5;
                          if(type==="bonus") s+=inf;
                          if(type==="malus") s-=isAg?inf:Math.floor(inf/2);
                        });
                        return Math.round(s);
                      });
                      return [
                        <tr key={law.id+"-h"}>
                          <td colSpan={REGIONS.length} style={{paddingTop:"4px",paddingBottom:"1px"}}>
                            <div style={{fontSize:"8px",color:DIM,letterSpacing:"2px",textTransform:"uppercase",paddingLeft:"3px"}}>↳ {law.name}</div>
                          </td>
                        </tr>,
                        <tr key={law.id+"-r"}>
                          {scores.map((s,i) => (
                            <td key={i} style={{padding:"1px 2px"}}>
                              <div style={{textAlign:"center",padding:"3px",borderRadius:"3px",background:"rgba(255,255,255,0.015)",fontSize:"9px",color:popColor(s)}}>{s>0?"+"+s:s===0?"·":""+s}</div>
                            </td>
                          ))}
                        </tr>
                      ];
                    })}
                    {(cand.actions||[]).map(action => {
                      const scores = action.bonuses.map((b,i) => b*litLevel(data,i).n);
                      return [
                        <tr key={action.id+"-h"}>
                          <td colSpan={REGIONS.length} style={{paddingTop:"4px",paddingBottom:"1px"}}>
                            <div style={{fontSize:"8px",color:"#5a8aaa",letterSpacing:"2px",textTransform:"uppercase",paddingLeft:"3px"}}>↳ {action.name}</div>
                          </td>
                        </tr>,
                        <tr key={action.id+"-r"}>
                          {scores.map((s,i) => (
                            <td key={i} style={{padding:"1px 2px"}}>
                              <div style={{textAlign:"center",padding:"3px",borderRadius:"3px",background:"rgba(255,255,255,0.015)",fontSize:"9px",color:s>0?"#80c890":DIM}}>{s>0?"+"+s:"·"}</div>
                            </td>
                          ))}
                        </tr>
                      ];
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ── GAME STATE TAB ────────────────────────────────────────────────────────────

function GameStateTab({agitation, setAgitation, natUnrest, turn, setTurn, candidates, setCandidates, senateHolder, nations, setNations, government, setGovernment, setData, wars, setWars, deals, setDeals, gmEvents, setGmEvents, randomEventDeck, turnLog, setTurnLog, coalitions, revolts, setRevolts, setAzzuriaArmy, setParamilitaries}) {
  const [confirmEnd, setConfirmEnd] = useState(false);

  const adjAgit = (i,d) => setAgitation(p => { const n=[...p]; n[i]=Math.max(0,Math.min(6,n[i]+d)); return n; });
  const adjAct  = (id,d) => setCandidates(p => p.map(c => c.id===id ? {...c, actionsLeft:Math.max(0,Math.min(10,(c.actionsLeft??BASE_ACTIONS)+d))} : c));

  const [aiEvents, setAiEvents] = useState([]);

  function calcNatEco(n) {
    // New formula: pop derived from regions
    const pop  = (n.regions||[]).reduce((s,r) => s+(r.pop||1), 0);
    const prod = n.productivity || n.prod || 2;
    const mi   = n.milInvest || 0;
    const unr  = n.unrest || 0;
    const eco  = Math.max(0, pop*prod - mi*0.5 - unr*1.5);
    const mil  = eco/2 + mi;
    const avail= Math.max(0, mil - Math.floor(unr/2));
    return { pop, eco: Math.round(eco*10)/10, mil: Math.round(mil*10)/10, avail: Math.round(avail*10)/10 };
  }

  const endTurn = () => {
    // No natural agitation decay — agitation only reduces via minister actions and decrees
    const inCoalition = new Set((coalitions||[]).flatMap(coal => coal.memberIds||[]));
    setCandidates(p => p.map(c => ({
      ...c,
      actionsLeft: BASE_ACTIONS
        + (senateHolder === c.id ? 1 : 0)
        + (government.pm === c.id ? 1 : 0)
        + (inCoalition.has(c.id) ? 1 : 0)
    })));

    setTurn(t => t+1);

    // ── Military end-of-turn ─────────────────────────────────────────────
    // Unsuppressed revolts raise their class agitation by 1
    if (revolts && revolts.some(r=>!r.suppressed)) {
      setAgitation(prev => {
        const next = [...prev];
        revolts.filter(r=>!r.suppressed).forEach(r => {
          next[r.classIdx] = Math.min(6, next[r.classIdx]+1);
        });
        return next;
      });
    }
    // Army morale recovers +1 per turn (cap 5)
    setAzzuriaArmy(a => ({...a, morale: Math.min(5, (a.morale||3)+1)}));
    // Paramilitary/police strength recovers +1 per turn (cap 5)
    setParamilitaries(p => p.map(pm => ({...pm, strength: Math.min(5, (pm.strength||1)+1)})));
    setConfirmEnd(false);

    if (nations && nations.length > 0) {
      // ── SIMPLE RULES-BASED NATION AI ─────────────────────────────
      const REGIME_KEY = r => {
        if (!r) return "republic";
        const s = r.toLowerCase();
        if (s.includes("constitutional")) return "constitutional";
        if (s.includes("absolute"))       return "absolute";
        if (s.includes("military"))       return "military";
        if (s.includes("revolution"))     return "revolutionary";
        if (s.includes("theocra"))        return "theocracy";
        if (s.includes("oligarch"))       return "oligarchy";
        if (s.includes("empire"))         return "empire";
        if (s.includes("occupied"))       return "occupied";
        return "republic";
      };
      const REGIME_AGG  = {occupied:0.03,constitutional:0.08,republic:0.10,theocracy:0.18,oligarchy:0.25,absolute:0.40,revolutionary:0.45,empire:0.55,military:0.75};
      const REGIME_UREC = {occupied:-0.50,military:-0.20,revolutionary:-0.30,empire:-0.10,absolute:-0.05,theocracy:0.05,oligarchy:0.10,constitutional:0.25,republic:0.35};
      const REV_TARGET  = {
        "Absolute Monarchy":"Revolutionary","Empire":"Republic","Military":"Occupied",
        "Theocracy":"Republic","Oligarchy":"Republic","Constitutional Monarchy":"Republic",
        "Republic":"Revolutionary","Revolutionary":"Republic","Occupied":"Revolutionary",
      };
      const FLAVOUR = ["consolidates internal affairs","observes regional developments","maintains current policy","focuses on domestic matters","manages the harvest season"];

      const newEvents = [];

      setNations(prev => prev.map(n => {
        const rk     = REGIME_KEY(n.regime);
        const agg    = REGIME_AGG[rk]  ?? 0.3;
        const az     = n.diplo?.azzuria ?? 0;
        const {pop, eco, avail} = calcNatEco(n);
        const isAtWar = (wars||[]).some(w => w.attId===n.id || w.defId===n.id);
        let standingChange = 0;
        let actionText     = "";
        let newRegime      = n.regime;
        let newUnrest      = n.unrest || 0;

        // Unrest recovery — occupied is a pressure-cooker (floor at 4.0)
        let urec;
        if (rk === "occupied") {
          urec = -0.3 + eco / 25;
          newUnrest = Math.max(4.0, Math.min(10, (n.unrest||0) - urec));
        } else {
          urec = (REGIME_UREC[rk] ?? 0) + (eco / 20) + (isAtWar ? 0 : 0.1);
          newUnrest = Math.max(0, Math.min(10, (n.unrest||0) - urec));
        }

        // Revolution (35% at unrest >= 8 — lower threshold for more chances)
        if (newUnrest >= 8 && Math.random() < 0.35) {
          newRegime  = REV_TARGET[n.regime] || "Republic";
          newUnrest  = 4;
          actionText = `REVOLUTION — ${n.regime} collapses into ${newRegime}`;
        }
        // Rule 1 — Crisis
        else if (newUnrest >= 7) {
          if (az < 0) standingChange = +1;
          actionText = `${n.name} in crisis — seeks stability`;
        }
        // Rule 2 — Aggression
        else if (az <= -2 && avail >= 8 && Math.random() < agg * 0.4 && !isAtWar) {
          standingChange = -1;
          actionText = `${n.name} increases pressure on Azzuria`;
        }
        // Rule 3 — Warming
        else if (az >= 1 && Math.random() < (1 - agg) * 0.35 && !isAtWar) {
          standingChange = az < 3 ? +1 : 0;
          actionText = standingChange ? `${n.name} strengthens ties with Azzuria` : `${n.name}: warm relations continue`;
        }
        // Rule 4 — Passive drift
        else {
          if (az <= -2 && Math.random() < 0.2)      { standingChange = +1; actionText = `${n.name}: cautious diplomatic signal`; }
          else if (az >= 2 && Math.random() < 0.1)  { standingChange = -1; actionText = `${n.name}: growing independence`; }
          else { actionText = `${n.name} ${FLAVOUR[Math.floor(Math.random()*FLAVOUR.length)]}`; }
        }

        const newAz = Math.max(-3, Math.min(3, az + standingChange));
        newEvents.push({nationId:n.id, nationName:n.name, action:actionText, standingChange, newUnrest:Math.round(newUnrest*10)/10});
        return {
          ...n, regime: newRegime,
          diplo: {...(n.diplo||{}), azzuria: newAz},
          unrest: Math.round(newUnrest*10)/10,
          events: [{season:getSeason(turn+1),year:getYear(turn+1),action:actionText}, ...(n.events||[]).slice(0,9)],
        };
      }));

      // ── PROCESS QUEUED GM EVENTS ─────────────────────────────────
      const gmLog = [];
      const allEventsToFire = [...(gmEvents||[])];
      // Pick one random deck event if deck is non-empty
      if (randomEventDeck && randomEventDeck.length > 0) {
        const picked = randomEventDeck[Math.floor(Math.random()*randomEventDeck.length)];
        allEventsToFire.push({...picked, _fromDeck: true});
      }
      if (allEventsToFire.length > 0) {
        setNations(prev => {
          let upd = [...prev];
          allEventsToFire.forEach(ev => {
            const label = ev._fromDeck ? `DECK EVENT: ${ev.name}` : `GM EVENT: ${ev.name}`;
            gmLog.push(label);
            if (ev.patches) {
              upd = upd.map(n => {
                const p = ev.patches[n.id];
                if (!p) return n;
                const apply = (key, cur, lo, hi) =>
                  p[key] != null ? Math.max(lo, Math.min(hi, (cur||0) + p[key])) : cur;
                return {
                  ...n,
                  pop:       apply("pop",       n.pop,       0, 30),
                  prod:      apply("prod",      n.prod,      0.1, 10),
                  terr:      apply("terr",      n.terr,      0, 100),
                  milInvest: apply("milInvest", n.milInvest, 0, 20),
                  unrest:    apply("unrest",    n.unrest,    0, 10),
                  diplo:     p.diplo != null
                    ? {...(n.diplo||{}), azzuria: Math.max(-3, Math.min(3, (n.diplo?.azzuria||0) + p.diplo))}
                    : n.diplo,
                  regime:    p.regime ?? n.regime,
                  events:    [{season:getSeason(turn+1),year:getYear(turn+1),
                    action:`${ev._fromDeck?"Deck":"GM"}: ${ev.name} — ${ev.desc}`},
                    ...(n.events||[]).slice(0,9)],
                };
              });
            }
          });
          return upd;
        });
        setGmEvents([]);
      }

      setAiEvents(newEvents);

      // Write to turn log (include standing changes)
      const stChanges = newEvents.filter(e=>e.standingChange!==0)
        .map(e=>`${e.nationName}: standing ${e.standingChange>0?"+":""}${e.standingChange}`);
      setTurnLog(prev => [{
        turn: turn+1, season: getSeason(turn+1), year: getYear(turn+1),
        entries: [...newEvents.map(e=>e.action), ...gmLog, ...stChanges].filter(Boolean),
      }, ...prev].slice(0,20));
    }

    // ── BATTLE SIMULATION (one battle per active war) ─────────────
    if (wars && wars.length > 0) {
      const REGIME_MORALE = {"Military":0.4,"Empire":0.2,"Theocracy":0.3,"Revolutionary":0.2,
        "Republic":0.1,"Constitutional Monarchy":0.1,"Absolute Monarchy":0.1,"Oligarchy":0,"Occupied":-0.2};
      const getNation = (id) => id === "azzuria" ? null : (nations||[]).find(n => n.id === id);
      const getAvail = (id) => {
          if (id === "azzuria") {
            const az = government?.azzuria || {};
            const pop  = (az.regions||[]).reduce((s,r)=>s+(r.pop||1),0) || 3;
            const prod = az.productivity || 2;
            const mi   = az.milInvest ?? (government?.azzuriaMilInvest || 0);
            const unr  = az.unrest || calcNatUnrest(agitation);
            const eco  = Math.max(0, pop*prod - mi*0.5 - unr*1.5);
            const milStr = eco/2 + mi;
            return Math.max(1, Math.round((milStr - Math.floor(unr/2))*10)/10);
          }
          const n = getNation(id);
          if (!n) return 1;
          return calcNatEco(n).avail;
        };

      setWars(prevWars => {
        let updatedNations = [...(nations||[])];
        const newWars = prevWars.map(w => {
          const attAv  = getAvail(w.attId);
          const defAv  = getAvail(w.defId);
          const attN   = getNation(w.attId);
          const defN   = getNation(w.defId);
          const attMor = REGIME_MORALE[attN?.regime] ?? 0;
          const defMor = REGIME_MORALE[defN?.regime] ?? 0;
          const attRoll = attAv + attAv*attMor + Math.floor(Math.random()*6)+1;
          const defRoll = defAv + defAv*defMor + Math.floor(Math.random()*6)+1 + 1; // defender +1
          const margin  = attRoll - defRoll;
          const decisive = Math.abs(margin) >= 4;
          let newScore  = w.score + (margin > 0 ? (decisive ? 2 : 1) : margin < 0 ? (decisive ? -2 : -1) : 0);
          let newAttMilLost = w.attMilLost, newDefMilLost = w.defMilLost;
          let outcomeStr = margin > 0 ? ("Attacker advance" + (decisive ? " (decisive)" : ""))
                         : margin < 0 ? ("Defender holds" + (decisive ? " (decisive)" : ""))
                         : "Skirmish — no advantage";
          // Attrition — on the nation objects
          if (margin < 0 && Math.random() < 0.4 && attN) {
            updatedNations = updatedNations.map(n => n.id===attN.id ? {...n, milInvest:Math.max(0,(n.milInvest||0)-1)} : n);
            newAttMilLost++;
          }
          if (margin > 0 && Math.random() < 0.4 && defN) {
            updatedNations = updatedNations.map(n => n.id===defN.id ? {...n, milInvest:Math.max(0,(n.milInvest||0)-1)} : n);
            newDefMilLost++;
          }
          if (margin === 0) {
            if (Math.random()<0.2 && attN) { updatedNations = updatedNations.map(n => n.id===attN.id ? {...n, milInvest:Math.max(0,(n.milInvest||0)-1)} : n); newAttMilLost++; }
            if (Math.random()<0.2 && defN) { updatedNations = updatedNations.map(n => n.id===defN.id ? {...n, milInvest:Math.max(0,(n.milInvest||0)-1)} : n); newDefMilLost++; }
          }
          const newLog = [...(w.battleLog||[]).slice(-9), {t:turn+1, aR:Math.round(attRoll*10)/10, dR:Math.round(defRoll*10)/10, m:Math.round(margin*10)/10, out:outcomeStr, sc:newScore}];
          return {...w, score:newScore, turns:(w.turns||0)+1, attMilLost:newAttMilLost, defMilLost:newDefMilLost, battleLog:newLog};
        });
        setNations(updatedNations);
        return newWars;
      });
    }

    // ── DEAL TICK (d8 expiry + countdown) ─────────────────────────
    if (deals && deals.length > 0) {
      setDeals(prev => prev.filter(d => {
        if (Math.random() < 1/8) return false;  // d8 early expiry
        return d.turnsLeft > 1;
      }).map(d => ({...d, turnsLeft: d.turnsLeft - 1})));
    }

    // ── ALLY RIPPLE (background standing drift) ───────────────────
    // If Azzuria has standing ≤ -2 with nation A, and nation B is also
    // hostile to Azzuria (≤ -1), the two hostile nations reinforce each other:
    // each has a 15% chance of drifting another -1 toward Azzuria this turn.
    if (nations && nations.length > 0) {
      const enemies = nations.filter(n => (n.diplo?.azzuria??0) <= -2);
      if (enemies.length > 0) {
        setNations(prev => prev.map(n => {
          const az = n.diplo?.azzuria ?? 0;
          // Only cold/hostile nations drift further if there are active enemies
          if (az > -1) return n;
          if (Math.random() > 0.15) return n;
          if (az <= -3) return n;
          return {...n, diplo:{...(n.diplo||{}), azzuria: az - 1}};
        }));
      }
    }
  };

  const ur = unrestInfo(natUnrest);

  return (
    <div style={{padding:"20px 14px",maxWidth:"900px",margin:"0 auto"}}>
      {/* banner */}
      <div style={{marginBottom:"28px",padding:"16px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"6px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:"20px",justifyContent:"space-between"}}>
        <div style={{flex:1,minWidth:"220px"}}>
          <div style={{fontSize:"11px",letterSpacing:"4px",color:DIM,textTransform:"uppercase",marginBottom:"4px"}}>Current Period</div>
          <div style={{fontSize:"26px",color:"#e8dcc8",marginBottom:"4px",letterSpacing:"1px"}}>
            {getSeason(turn)} {getYear(turn)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
            <span style={{fontSize:"11px",color:DIM,letterSpacing:"2px"}}>Turn</span>
            <input type="number" min={1} max={100} value={turn}
              onChange={e=>setTurn(Math.max(1,Math.min(100,parseInt(e.target.value)||1)))}
              style={{width:"52px",padding:"2px 6px",background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.12)",borderRadius:"3px",
                color:"#e8dcc8",fontFamily:"Georgia,serif",fontSize:"13px",textAlign:"center"}}/>
            <span style={{fontSize:"9px",color:DIM}}>({getSeason(turn)} {getYear(turn)})</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px",flexWrap:"wrap"}}>
            <span style={{fontSize:"10px",letterSpacing:"2px",color:DIM,textTransform:"uppercase"}}>National Unrest</span>
            <div style={{width:"100px",height:"5px",background:"rgba(255,255,255,0.07)",borderRadius:"3px",overflow:"hidden"}}>
              <div style={{width:(natUnrest/10*100)+"%",height:"100%",background:ur.color,borderRadius:"3px",transition:"width 0.4s"}}/>
            </div>
            <span style={{fontSize:"14px",fontWeight:"bold",color:ur.color}}>{natUnrest}/10</span>
            <span style={{fontSize:"10px",color:ur.color,letterSpacing:"2px",textTransform:"uppercase",border:`1px solid ${ur.color}44`,padding:"2px 8px",borderRadius:"3px"}}>{ur.label}</span>
          </div>
          {natUnrest > 0 && (
            <div style={{fontSize:"10px",color:ur.color,padding:"4px 8px",background:ur.color+"10",border:`1px solid ${ur.color}22`,borderRadius:"3px",display:"inline-block",marginBottom:"6px"}}>{ur.desc}</div>
          )}
          <div style={{fontSize:"10px",color:DIM,lineHeight:"1.6"}}>
            Unrest = Restless classes x1 + Agitated classes x2 (auto-calculated)<br/>
            On End Turn: all actions reset to {BASE_ACTIONS} (+1 for Senate majority holder)
          </div>
        </div>
        {!confirmEnd ? (
          <button onClick={() => setConfirmEnd(true)} style={{padding:"12px 28px",background:"rgba(201,168,76,0.2)",border:"2px solid rgba(201,168,76,0.6)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"13px",letterSpacing:"3px",textTransform:"uppercase",fontFamily:"Georgia,serif",fontWeight:"bold"}}>
            End {getSeason(turn)}
          </button>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:"8px",alignItems:"flex-end"}}>
            <div style={{fontSize:"11px",color:SOFT}}>End {getSeason(turn)} {getYear(turn)}?</div>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={() => setConfirmEnd(false)} style={{padding:"8px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"4px",color:SOFT,cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif"}}>Cancel</button>
              <button onClick={endTurn} style={{padding:"8px 20px",background:"rgba(201,168,76,0.25)",border:"1px solid rgba(201,168,76,0.6)",borderRadius:"4px",color:GOLD,cursor:"pointer",fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif",fontWeight:"bold"}}>Confirm</button>
            </div>
          </div>
        )}
      </div>

      {/* Diplomatic Dispatches */}
      {aiEvents.length > 0 && (
        <div style={{marginBottom:"24px",padding:"16px 20px",background:"rgba(74,112,192,0.06)",border:"1px solid rgba(74,112,192,0.2)",borderRadius:"5px"}}>
          <div style={{fontSize:"9px",letterSpacing:"4px",color:"#4a90c0",textTransform:"uppercase",marginBottom:"10px"}}>Diplomatic Dispatches</div>
          {aiEvents.map((ev,i) => (
            <div key={i} style={{marginBottom:"6px",fontSize:"11px",lineHeight:"1.6",color:SOFT}}>
              <span style={{color:"#e8dcc8",fontFamily:"Georgia,serif"}}>{ev.nationName}:</span>{" "}
              {ev.action.startsWith("REVOLUTION") ? <span style={{color:"#c47a5a",fontWeight:"bold"}}>{ev.action}</span> : ev.action}
              {ev.standingChange !== 0 && <span style={{color:ev.standingChange>0?"#6db87a":"#c4605a",marginLeft:"6px",fontSize:"10px"}}>{ev.standingChange>0?"▲":"▼"} standing</span>}
            </div>
          ))}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"28px"}}>

        {/* CLASS AGITATION */}
        <div>
          <SecBar>Class Agitation</SecBar>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px",gap:"10px"}}>
            <div style={{fontSize:"10px",color:DIM,lineHeight:"1.7"}}>
              Bonus law −1 · Malus law +2 · Content 0-2 · Restless 3-4 · Agitated 5-6
            </div>
            <button onClick={()=>setAgitation(Array(8).fill(0))}
              style={{flexShrink:0,padding:"4px 12px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"9px",
                letterSpacing:"2px",textTransform:"uppercase",borderRadius:"3px",
                background:"rgba(196,122,90,0.1)",border:"1px solid rgba(196,122,90,0.3)",color:"#c47a5a",
                whiteSpace:"nowrap"}}>
              Reset All
            </button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
            {CLASSES.map((cls,i) => {
              const ph  = agitPhase(agitation[i]);

// ── PARLIAMENT SEMICIRCLE ─────────────────────────────────────────────────────
function SemiParliament({seatTotals, cands, total=TOTAL_SEATS, majority=MAJORITY, coalitions=[]}) {
  const leftClasses = [6, 7];   // Rural Workers, Factory Workers
  const rightClasses = [2, 4];  // Merchants, Church
  const leftTags = ["Land Reform", "State Intervention", "Cooperative Labour", "Grain Price Controls", "Public Works", "Industrialisation", "Railway Expansion", "Secularism", "Anti-Clericalism", "Popular Education", "Press Freedom", "Workers' Rights", "Women's Education", "Poor Relief", "Temperance", "Public Health", "Parliamentary Reform", "Federalism", "Expanded Suffrage", "Universal Suffrage", "Republican Sympathies", "Progressive", "Reformist", "Internationalist", "Mediation", "Peaceful Coexistence", "Defensive Posture", "Diplomatic Primacy"];
  const rightTags = ["Free Trade", "Fiscal Conservatism", "Private Property", "Laissez-faire", "Agrarianism", "Clericalism", "Social Order", "Tradition", "Civic Nationalism", "Cultural Revival", "National Unity", "Absolute Monarchy", "Property Suffrage", "Conservative", "Opportunist", "Reactionary", "Elitist", "Nationalist", "Militarist", "Expansionism", "Isolationism", "Revanchism", "Military Readiness", "Tributary Ambitions"];
  
  const getIdeologyScore = (party) => {
    if (!party) return 0;
    let score = 0;
    
    party.classBase?.forEach(classIdx => {
      if (leftClasses.includes(classIdx)) score -= 2;
      if (rightClasses.includes(classIdx)) score += 2;
    });
    
    const partyTags = party.tags || [];
    partyTags.forEach(tag => {
      if (leftTags.includes(tag)) score -= 1;
      if (rightTags.includes(tag)) score += 1;
    });
    
    return score;
  };

  const sorted = [...(cands||[])].sort((a, b) => {
    const scoreA = getIdeologyScore(a);
    const scoreB = getIdeologyScore(b);
    
    if (scoreA !== scoreB) {
      return scoreA - scoreB;
    }
    return (seatTotals[b.id] || 0) - (seatTotals[a.id] || 0);
  });
  
  const rowSeats=[28,34,41,48,53], rowR=[85,105,125,145,165];
  const W=360, H=200, cx=W/2, cy=H-16;

  const positions=[];
  for(let row=0;row<5;row++){
    const n=rowSeats[row], r=rowR[row];
    for(let i=0;i<n;i++){
      const angle=Math.PI*(i/(n-1));
      positions.push({angle, row, x: cx-r*Math.cos(angle), y: cy-r*Math.sin(angle)});
    }
  }
  positions.sort((a,b)=> Math.abs(a.angle-b.angle)<0.001 ? a.row-b.row : a.angle-b.angle);

  // Создать mapping: партия ID → информация о партии
  const candMap = {};
  sorted.forEach(c => { candMap[c.id] = c; });
  
  // Создать mapping: партия ID → коалиция
  const partyToCoalition = {};
  coalitions.forEach(coal => {
    (coal.memberIds || []).forEach(pId => {
      partyToCoalition[pId] = coal;
    });
  });

  const colors=[];
  const partyForSeat = []; // Track which party each seat belongs to
  sorted.forEach(c=>{ 
    for(let i=0;i<(seatTotals[c.id]||0);i++) {
      colors.push(c.color); 
      partyForSeat.push(c.id);
    }
  });
  while(colors.length<total) {
    colors.push("rgba(255,255,255,0.12)");
    partyForSeat.push(null);
  }
  const dots=positions.map((p,i)=>{
    const partyId = partyForSeat[i];
    const coal = partyId ? partyToCoalition[partyId] : null;
    return {...p, color: colors[i], stroke: coal ? coal.color : null};
  });

  return (
    <div style={{background:"rgba(0,0,0,0.35)",borderRadius:"8px",padding:"10px 4px 2px",overflow:"hidden"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        {rowR.map((r,ri)=>(
          <path key={ri} d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`}
            fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="0.8"/>
        ))}
        <line x1={cx} y1={cy-72} x2={cx} y2={cy-151}
          stroke="rgba(201,168,76,0.6)" strokeWidth="1.5" strokeDasharray="3,3"/>
        <text x={cx+3} y={cy-142} fill="rgba(201,168,76,0.8)" fontSize="7" fontFamily="Georgia,serif">MAJ</text>
        {dots.map((d,i)=>(
          <circle key={i} cx={d.x} cy={d.y} r="4.2"
            fill={d.color} opacity={d.color==="rgba(255,255,255,0.12)"?.2:.9}
            stroke={d.stroke || "none"} strokeWidth={d.stroke ? "1.2" : "0"}/>
        ))}
      </svg>
    </div>
  );
}
